app = 'wuce-staging'
primary_region = 'syd'

[build]

[env]
  PORT = "3000"
  # b1-formed-idea-outer-loop-story-map (2026-07-23 ARCH decision, decisions.md):
  # staging E2E specs that drive a skill turn must run against the mock LLM gateway,
  # never the real model, to avoid real Anthropic API cost on every CI run. This is a
  # plain boolean flag (not a secret value), so it belongs in this committed [env]
  # block rather than `flyctl secrets set` -- see src/web-ui/modules/mock-llm-gateway.js's
  # isMockGatewayEnabled(), which hard-blocks activation whenever NODE_ENV=production
  # regardless of this flag, so it cannot leak into real production traffic even if
  # this file were ever reused for a production app by mistake.
  MOCK_LLM_GATEWAY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  sticky_sessions = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
