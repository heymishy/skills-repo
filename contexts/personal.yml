# personal.yml — sensible defaults for a GitHub-hosted personal or small-team project.
# No ITSM, no regulated data, no multi-team governance.
#
# Usage: copy to .github/context.yml to activate.
#   cp contexts/personal.yml .github/context.yml
#
# Edit the fields below to match your repo before committing.

meta:
  name: "Personal project"          # human label shown in /workflow output
  scope: personal                   # personal | team | programme
  regulated: false                  # true enables compliance bundle prompts

source_control:
  platform: github                  # github | gitlab | bitbucket | azure-devops | other
  base_branch: main                 # main | master | trunk | develop | production
  merge_request_term: "pull request" # "pull request" | "merge request"
  pr_command: "gh pr create --draft" # full CLI command to open a draft MR/PR
  artefact_root: "."                # root dir for skills/, templates/, artefacts/

vcs:
  type: github                      # github | gitlab | bitbucket | azure-devops | other
  # agent_instructions.format controls which file the assembly script emits:
  #   copilot-instructions  → .github/copilot-instructions.md  (GitHub Copilot)
  #   agents-md             → AGENTS.md at repo root           (vendor-neutral AAIF standard)
  # If absent, the format is inferred from vcs.type:
  #   github  → copilot-instructions (default)
  #   other   → agents-md
  # Permitted values: copilot-instructions | agents-md
  # Any other value causes an assembly-time error.
  # agent_instructions:
  #   format: copilot-instructions

agent:
  instruction_file: "copilot-instructions.md"
  # Instruction file loaded automatically by your agent runtime:
  #   GitHub Copilot  → copilot-instructions.md
  #   Claude Code     → AGENTS.md
  #   Cursor          → .cursorrules

architecture:
  ea_registry_repo: "https://github.com/heymishy/ea-registry"
  ea_registry_local_path: "C:/Users/Hamis/code/ea-registry-repo"
  ea_registry_authoritative: true
  # If true, application/interface registry updates are made in ea_registry_repo
  # and referenced from product repos via /ea-registry FEED mode.

optimization:
  token_policy:
    per_turn_soft_budget: 12000
    per_story_budget: 120000
    per_feature_budget: 800000
  routing:
    default_model_class: "balanced"
    escalation_model_class: "deep-reasoning"
    escalation_triggers:
      - "high-severity review findings"
      - "root-cause debugging unresolved after one pass"
      - "cross-system design ambiguity"

mapping:
  stage_aliases: {}
  artefact_aliases: {}

skills_upstream:
  remote: null                      # set to remote name after: git remote add skills-upstream https://github.com/heymishy/skills-repo.git
  repo_url: "https://github.com/heymishy/skills-repo.git"
  sync_paths:
    - .github/skills/
    - .github/templates/
    - scripts/
    - docs/skill-pipeline-instructions.md
  strategy: none                    # none | merge | overwrite — set when remote is configured
  governance:
    gates: []

scaling:
  maturity_level: "team"
  target_team_count: 2
  state_strategy: "per-repo-json"
  shared_skill_pack: false

runtime:
  language: typescript              # primary language: typescript | python | java | go | rust | other
  test_framework: jest              # jest | vitest | pytest | rspec | junit | mocha | other
  dom_environment: jsdom            # jsdom | happy-dom | none
  e2e_framework: playwright         # playwright | cypress | selenium | none
  package_manager: npm              # npm | pnpm | yarn | pip | poetry | cargo | go | maven | other
  ci: github-actions                # github-actions | gitlab-ci | circleci | jenkins | azure-pipelines | none

roles:
  tech_lead: "me"                   # what your team calls the senior technical approver
  qa: "me"
  analyst: "me"
  product: "me"

delivery:
  cycle_term: "iteration"           # sprint | iteration | cycle | week | quarter
  phase_gate: false                 # true enables phase gate prompts in /programme
  change_management:
    process: none                   # none | informal | cab
    tool: null                      # null | servicenow | jira-sm | other

tools:
  project_management: github-issues # github-issues | jira | linear | azure-devops | trello | notion | other
  documentation: null               # null | confluence | notion | github-wiki | sharepoint
  artifact_registry: null           # null | nexus | artifactory | github-packages
  monitoring: null                  # null | dynatrace | datadog | newrelic | grafana
  log_aggregation: null             # null | splunk | elk | cloudwatch | grafana-loki
  alerting: null                    # null | pagerduty | opsgenie | victorops

compliance:
  frameworks: []
  # Add frameworks that apply to this repo, e.g.:
  #   - pci-dss
  #   - gdpr
  #   - hipaa
  #   - sox
  #   - aml-cft
  sensitive_data_categories: []
  # Add sensitive identifier types handled by this codebase, e.g.:
  #   - "card numbers (PANs, CVVs)"
  #   - "account numbers"
  #   - "health record identifiers"

instrumentation:
  enabled: false              # boolean — set true to activate capture; false (default) = no capture
  experiment_id: ""           # string — unique slug, e.g. 2026-04-18-model-comparison
  model_label: ""             # string — descriptive label only, e.g. "claude-sonnet-4-6" (NO API keys — MC-SEC-02)
  cost_tier: ""               # string — standard | premium
# To activate: set enabled: true, fill in experiment_id, model_label, and cost_tier.
# Results are written to workspace/experiments/[experiment-id]/ — see workspace/experiments/README.md.