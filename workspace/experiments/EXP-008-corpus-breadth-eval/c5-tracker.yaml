## S9 Config A C5 Surfacing Analysis

**Story:** S9 (KiwiSaver Online Fund Switching — Digital Self-Service with Regulatory Compliance)

**Config:** A (Sonnet uniform — all five stages)

**C5 Surfaced:** YES ✓ (quality: PARTIAL)

**Surfacing stage:** /discovery (B1 blocker — hardship fee waiver statutory obligation)

**Surfacing mechanism:**
- ELIG-003 note in EA registry directly named KiwiSaver Act s.58 hardship fee waiver obligation
- MPSW-RISK-002 directly stated "Implementing the fee without the hardship waiver is a statutory breach"
- Both at PROHIBITED signal level per CONVENTIONS.md injection design rule
- Model surfaced C5 as B1 blocker with mandatory automatic waiver required; propagated through all five stages

**Injection design test:** FAIL — EA registry file (S9-ea-registry-member-portal-fund-switching.md) over-signaled for C5. File predates CONVENTIONS.md injection design rule codification (rule first applied 2026-05-17). C5 result EXCLUDED from EXP-008 H3 validation.

**Surfacing quality:** PARTIAL (injection-aided)

**C5 propagation path:**
- /discovery: B1 blocker (mandatory automatic fee waiver required for members with active hardship applications)
- /definition: Story 1.2 AC3 (SWITCH_FEE_ENABLED gate requires hardship_waiver_legal_sign_off: true + named reviewer); Story 2.1 AC3 (hardship_active → fee_waiver_applied: true)
- /review: H2 (hardship waiver AC3 missing API failure path — model identified gap not in injection)
- /test-plan: T-FEE-003 (hardship legal gate blocks fee activation), T-FEE-005 (waiver auto-applied), T-ELIG-005 (fail-safe default when API unavailable — pure model reasoning, no injection source)
- /dor: C5 highest-priority in coding agent instructions; T-FEE-003, T-FEE-005, T-ELIG-005 must all pass before any other tests

