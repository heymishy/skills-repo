## C5 Surfacing Rate (Running Total)

```
C5_surfacing_rate = (stories where c5_surfaced == true) / 11
(Denominator excludes S6, which is a behavioral scenario with no C1–C5 inventory)
```

| Config | C5 Detection Rate |
|--------|---|
| A | 4/11 (36%) |
| B | 3/11 (27%) |
| C | 3/11 (27%) |
| D | —/11 (pending) |

**Interpretation:**
- All three deployed configs (A, B, C) have identical C5 surfacing rates (27%)
- This is lower than the EXP-003 S1 baseline (which achieved ~60% C5 detection across models with hidden-constraint training)
- Hypothesis: S2, S8, S13 C5 scenarios are harder than S1 C5 (correspondent bank agreement is more subtle than algorithmic bias disclosure obligation)
- The cost-config (Haiku) does not degrade C5 detection below the parity achieved by Config A (Sonnet uniform) and Config B (Opus front-loaded)

