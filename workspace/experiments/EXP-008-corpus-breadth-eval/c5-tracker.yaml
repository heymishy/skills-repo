## S13 Config C C5 Surfacing Analysis

**Story:** S13 (Trans-Tasman Payment Corridor — Multi-Jurisdiction NZD/AUD Proprietary Intra-Group Routing)

**Config:** C (Sonnet /discovery; Haiku /definition, /review, /test-plan, /definition-of-ready)

**C5 Surfaced:** YES ✓

**Surfacing stage:** /discovery (Sonnet) carried forward through all five stages (/definition, /review, /test-plan, /definition-of-ready)

**Surfacing mechanism (Sonnet /discovery):**
1. Identified TTPS-SWIFT-001 signal (JPMorgan Chase active SWIFT correspondent for NZD/AUD)
2. Identified TTPS-RISK-001 signal (impact on correspondent relationship not assessed)
3. Identified ADR-CB-002 note (correspondent agreements may contain routing restrictions; notification obligation must be confirmed)
4. Composed three signals into constraint: "Correspondent agreement may require notification before proprietary channel activation"
5. Escalated to R1 blocker (pre-go-live gate)

**Surfacing quality:** FULL ✓

**Surfacing quality rationale:**
- Unlike Config C S8 (partial — governance gap named but consequence omitted), S13 C5 is carried through all five stages with explicit verification gates
- Story 1.4 framed as "SWIFT Correspondent Bank Agreement Review" — named explicitly
- Test plan (Haiku) added explicit AC verification for "JPMorgan Chase written acknowledgement received (if required)"
- Definition-of-ready hard block H9 states: "SWIFT correspondent agreement review (C5 / Story 1.4) is listed as a prerequisite to channel activation, not a Phase 2 deferment"
- Definition-of-ready no-go condition: "story_1_4_jpmorgan_chase_acknowledgement_if_required_not_received: DO_NOT_CODE"
- All five stages preserved the contractual vs. regulatory boundary (C5 is not collapsed into generic "compliance gate")

**Gate owner specificity (multi-jurisdiction integrity check):**
- Story 1.4 gate owner: "Enterprise Treasury Lead + Legal Counsel (JPMorgan Chase relationship owners)"
- Rationale: JPMorgan Chase relationship is owned by treasury + legal counsel, not regulatory function
- DoR gate quality: 1/2 (gate owner named, but less specific than Config B's explicit "Treasury Legal Counsel non-delegable to any regulatory function" framing)
- Multi-jurisdiction boundary preserved: no simplification from /definition regulatory gate ownership table to DoR hard blocks

**Comparison to Config A and B:**

| Config | S13 C5 surface | Quality | Gate owner specificity | DoR gate quality |
|--------|-----------------|---------|----------------------|-----------------|
| A | ✓ | Full | Specific (Treasury Lead + Legal Counsel) | 2/2 |
| B | ✓ | Full | Very specific (Treasury Legal Counsel non-delegable; rejection reason for regulatory-function auth) | 2/2 |
| C | ✓ | Full | Specific (Treasury Lead + Legal Counsel) | 1/2 |

**Finding:** Config C S13 C5 surface is full and equivalent to Config A S13 in quality. Haiku /definition preserved the three-signal inference without elaborating the contractual/regulatory boundary distinction (Config B's additional specificity). Result: same C5 detection rate (3/11 for all three configs), equivalent CPF, but dor_gate_quality gap between Config B (2/2) and Configs A/C (1/2).

