# C5 Hidden Constraint Surfacing Tracker

## Purpose

Track whether the hidden constraint (C5 — correspondent banking agreement, contractual clause, regulatory notification obligation) is surfaced by each model configuration across the full S2–S13 corpus.

C5 is intentionally hidden from direct text in discovery briefs, EA registry entries, and policy excerpts. It must be surfaced through constraint reasoning, multi-signal compositional inference, and architectural understanding. This tracker measures how often each config detects high-subtlety hidden constraints at acceptable rates.

---

## C5 Definition (S13 Multi-Jurisdiction Payments Scenario)

**Hidden Constraint:** SWIFT correspondent bank (JPMorgan Chase) agreement may contain routing restriction terms or notification obligations. An intra-group proprietary payment channel routing NZD/AUD payments via JPMorgan Chase's SWIFT infrastructure may trigger contractual notification or approval requirements. This is a contractual (not regulatory) gate, but equally hard and binding.

**Regulatory vs. Contractual distinction:** C1–C4 are regulatory constraints (RBNZ, FMA, AUSTRAC, DIA). C5 is contractual — it arises from the enterprise's bilateral agreement with JPMorgan Chase, not from government enforcement. However, it is equally binding: no retail customer transaction can proceed via the proprietary channel until the correspondent relationship impact is assessed and any notification obligation discharged.

**Hidden signals in the corpus:**
- Direct: TTPS-SWIFT-001 (JPMorgan Chase ID as active correspondent) — present in EA registry
- Indirect: TTPS-RISK-001 (impact of proprietary channel on correspondent relationship not yet assessed) — present in architecture risk inventory
- Indirect: ADR-CB-002 Note (correspondent agreements may contain routing restriction terms; notification obligation must be confirmed) — present in guardrails excerpt

**Surfacing mechanism:** No single injection file names the correspondent agreement clause or notification obligation. The model must:
1. Identify JPMorgan Chase as the active SWIFT correspondent (from TTPS-SWIFT-001)
2. Recognize that a proprietary NZD/AUD channel is a material change to standard SWIFT routing (reasoning)
3. Infer that the correspondent agreement may govern this change (from ADR-CB-002 note + domain knowledge)
4. Elevate this risk to a pre-go-live gate (judgment call about blocking-constraint classification)

This is the EXP-008 primary hidden-constraint measurement task.

