# AQ dimension justifications
aq_justifications:
  problem_framing: >
    Discovery names both an operational efficiency gap (6-8 business day manual cycle,
    40% of analyst time) and a regulatory disclosure gap (RBNZ undisclosed normalisation
    since 2019); personas have scoped roles (Compliance Officer, Finance Operations
    Manager, CFO/designated finance officer); all five success indicators are measurable,
    including "<=2 business days post-pipeline-run" and ">=30 business days BS11
    notification before go-live."
  scope_discipline: >
    MVP scope is explicitly bounded in discovery with 6 numbered deliverables; six items
    are explicitly named out-of-scope (TreasuryLedger API development, FMA Annual
    Financial Statements return, normalisation remediation, return form redesign,
    automated submission without human approval, retrospective correction of historical
    returns); 8 stories across 3 epics are proportionate to the stated MVP.
  story_testability: >
    Most ACs have unambiguous pass/fail conditions, but Story 1.2 AC1 uses "sufficient
    precision for independent reproduction" — T-REG-005 tests structural field presence
    in the specification document but cannot mechanically verify whether the documented
    logic meets the precision threshold without human review; Story 3.2 AC5 uses
    "legible" and "sufficient to independently verify," which are also judgment-dependent
    (partially mitigated by the T-AUDIT-007 human-in-the-loop drill operationalisation).
  nfr_specificity: >
    All 14 NFRs in the test plan table name a concrete threshold, named standard, or
    measurable condition — examples: NFR-C1-02 ">=30 business days (Holidays Act 2003
    Schedule 1)," NFR-C2-02 "<=60 seconds at 7-year data volume," NFR-PERF-01
    "3 retries; <=60 second max delay; alert within 5 minutes of 3rd failure" — no NFR
    reads as a generic statement.
  dor_gate_quality: >
    Gate 3 explicitly names "the Compliance Officer" as the responsible party for setting
    NORMALISATION_LAYER_APPROVED; Gates 1 and 2 specify technically precise conditions
    (document IDs populated in deployment config, producibility-drill-signoff document
    present, business-day CI/CD check) but do not name who must perform the prerequisite
    human action in the gate description itself; adversarial test coverage is strong
    (T-NORM-002, T-WF-001, T-EXTR-002, T-NORM-003, T-NORM-004).

