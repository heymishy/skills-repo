# Review findings summary
review_findings:
  high_count: 3
  high_resolved: 3
  important_count: 2
  important_resolved: 2
  low_count: 2
  low_resolved: 2
  high_findings:
    - id: H1
      story: "1.2"
      ac: "AC3"
      summary: "Deletion confirmation gap — no silent gaps constraint is untestable as stated; no mechanism specified to detect expired-deadline records"
      resolution: "AC3 amended: scheduler must run at minimum every 30 minutes, scan for overdue unescalated deletion records, set diaEscalationRaised=true and dispatch"
    - id: H2
      story: "2.1"
      ac: "AC3"
      summary: "Fail-closed for accreditation check unavailability — downstream retry not specified; thundering-herd risk during DIA outage"
      resolution: "AC3 amended: failed accreditation check cached as negative result with 30-second TTL; prevents thundering-herd timeouts"
    - id: H3
      story: "3.1"
      ac: "AC2"
      summary: "Enriched insights gate — 4-document workflow is post-hoc rollback obligation, not a pre-deployment enforcement mechanism"
      resolution: "AC2 amended: deployment pipeline CI step must validate privacy_act_assessment_reference field before allowing flag=true; T-C5-003/T-C5-004 added"

