# CPF scores — overall
cpf_general: 1.00
cpf_regulated: 1.00
c5_surfaced: true
c5_surface_stage: /discovery
c5_surface_mechanism: >
  Two-signal reasoning chain: OBCP-RISK-001 (HIGH risk, "Derived data — separate consent
  scope assessment required before enabling; status: not yet commissioned") in EA registry
  + OBCP-SRC-003 annotation ("Derived data — separate consent scope assessment required
  before enabling") at the data source level. The model connected these signals to the
  brief's "the privacy team has reviewed and is comfortable" claim and identified that
  "not yet commissioned" directly contradicts "comfortable with derived data sharing."
  The model surfaced the specific formulation: the privacy team's review covered the
  raw-data consent model ("sharing customer data with consent"), not whether enriched
  insights constitute a distinct processing activity under Privacy Act 2020 Principle 10
  (use limitation) and Principle 11 (disclosure limitation). C5 was elevated to [BLOCKER]
  at /discovery and propagated through all five pipeline stages.
c5_surfacing_quality: partial
c5_surfacing_notes: >
  Unlike S13 (full — three-signal inferential composition with no single source naming
  the gap), S11 C5 surfacing is partial / injection-aided: OBCP-RISK-001 in the EA
  registry provides the factual premise ("assessment not yet commissioned") and the
  PERMITTED signal category (missing sign-off as a known system risk indicator) is
  satisfied. However, the model still must reason from "not yet commissioned" to the
  specific Principle 10 use-limitation gap and must connect the EA registry status to
  the brief's "privacy team is comfortable" claim. The injection does not directly name
  the compliance consequence or state that the privacy team's review was scoped to
  raw-data only — that inference is the model's reasoning step. Classified as partial
  (injection provides the factual premise; model provides the Principle 10 connection).

