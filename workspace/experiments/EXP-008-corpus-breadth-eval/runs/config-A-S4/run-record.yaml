c5_surface_mechanism: "EA registry (REDIS-RISK-001 at-rest encryption status: not confirmed; Application Profile 3 at-rest encryption status: not yet confirmed) + PCI DSS policy excerpt (Part B Section 4.2 UNCONFIRMED markers for enterprise Redis) + brief-level signal ('security team has not reviewed whether Redis-at-rest encryption meets PCI DSS requirements') → model composed: Redis caching is architecturally intended but encryption status is unconfirmed → if encryption is not enabled, caching card data is a CDE control deficiency → Redis must be treated as a conditional component, not an assumed one → discovery [PRECONDITION] section surfaced explicitly: 'Story 2.1 must resolve this as a hard prerequisite before the caching design is committed'; C5 propagated through all five pipeline stages"
c5_surfacing_quality: full
c5_surfacing_notes: "Injection design test FAIL pre-fix → PASS post-fix. EA registry REDIS-RISK-001 enforcement consequence ('the Redis cache would be a PCI DSS violation and will fail QSA assessment') and Application Profile 3 Criticality enforcement consequence ('failure of at-rest encryption requirement would be a PCI DSS violation') removed before run. Post-fix: model surfaced C5 through multi-signal compositional inference from permitted factual status indicators only. Brief-level signal ('security team has not reviewed') is a permitted fact; injection files provide system risk indicator (status: unconfirmed) without naming consequence. Classified as FULL — not injection-aided. Valid for EXP-008 H3 validation. C5 propagated correctly through all five pipeline stages as: /discovery [PRECONDITION] → /definition Story 2.1 HARD PREREQUISITE + Story 1.3 gated → /review H1 structural finding (story dependency label insufficient; hard deployment block required) → /test-plan T-REDIS-GATE (blocking CI gate + human verification protocol) → /dor H-REG-3 hard block with named gate owner (Head of Security Architecture) and four explicit confirmation criteria."

# Injection design test
injection_design_test:
  ea_registry: FAIL_then_PASS
  ea_registry_reason_fail: "REDIS-RISK-001 stated 'the Redis cache would be a PCI DSS violation and will fail QSA assessment' (enforcement consequence — prohibited per CONVENTIONS.md). Application Profile 3 Criticality stated 'HIGH (if in-scope CDE) — failure of at-rest encryption requirement would be a PCI DSS violation' (enforcement consequence — prohibited per CONVENTIONS.md)."
  ea_registry_fix_applied: "REDIS-RISK-001: removed enforcement consequence; changed severity from CRITICAL to HIGH; replacement text states 'at-rest encryption status must be confirmed with the security team before the Redis cache is committed to the CDE design'. Application Profile 3 Criticality: removed enforcement consequence clause; replacement text states 'HIGH (if in-scope CDE) — at-rest encryption status is not yet confirmed'."
  ea_registry_reason_pass: "Post-fix: REDIS-RISK-001 severity (HIGH), risk description, and Application Profile 3 Criticality all state factual status indicators (PERMITTED — encryption status not confirmed; unconfirmed markers); model must reason to precondition framing without injection file naming enforcement consequence or QSA failure outcome."
  pci_dss_excerpt: PASS
  pci_dss_excerpt_reason_pass: "Part A general regulatory text (PCI DSS v4.0 Requirements 3.1–3.5) is permitted regulatory framework context. Section 3.5.1.1 note that Basic/Standard tiers are insufficient for CDE is general policy consequence — not org-specific enforcement. Part B Section 4.2 UNCONFIRMED markers for enterprise Redis are permitted factual status indicators. No file states 'your Redis will fail QSA' or names the enforcement consequence for the enterprise's specific Redis instance."
  overall: PASS_after_ea_registry_fix
  consequence: "C5 surfaced as full, not injection-aided; valid for EXP-008 H3 validation; both injection files PASS post-fix; PCI DSS excerpt was clean (PASS without modification)"

