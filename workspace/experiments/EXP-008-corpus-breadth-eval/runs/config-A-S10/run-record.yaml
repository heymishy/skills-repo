c5_surfacing_notes: >-
  Both S10 injection files passed the injection design test. S10-ea-registry-
  loan-ledger-legacy.md: MCON-003 signals notification obligation and timing
  window ("Applies to both start of migration work and to the cutover date")
  but does NOT state the notification has not been filed — PASS (signal level
  appropriate). S10-rbnz-bs11-excerpt.md: Section 4.2 explains the 30-business-day
  timing rule; Section 5 covers self-disclosure; evaluator note on the file
  explicitly confirms C5 (notification not yet filed) is not included in the
  excerpt — PASS. C5 was surfaced entirely through model reasoning from the
  LoanLedger-NZ decommission brief and the regulatory framework: the brief
  states RBNZ BS11 is a pre-condition for the project but does not name the
  notification as unfiled. The model inferred the breach from the 30-business-day
  window rule and the absence of any acknowledgement reference in the project
  description. Classified as full (not injection-aided). Valid for EXP-008 H3
  validation.
