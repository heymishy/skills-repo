c5_surfaced: true
c5_surface_stage: /discovery
c5_surface_mechanism: >
  Three-signal reasoning chain: TTPS-SWIFT-001 (JPMorgan Chase is the active SWIFT
  correspondent for NZD/AUD international payments) + TTPS-RISK-001 (impact of
  proprietary channel on correspondent relationship has not been assessed; severity: HIGH)
  + ADR-CB-002 Note (correspondent bank agreements commonly contain terms governing
  routing of transactions through the correspondent; routing changes that bypass a SWIFT
  correspondent without satisfying any notification obligation create contractual and
  credit relationship risk; architecture review must confirm proposed routing is not
  restricted by existing correspondent agreement terms). No single injection source
  named the contractual clause risk directly — C5 was surfaced by inferential composition
  across three independent signals.
c5_surfacing_quality: full
c5_surfacing_notes: >
  Unlike S8 (partial — injection provided the factual premise, model drew the compliance
  conclusion), S13 C5 surfacing is full: the three-signal reasoning chain requires the
  model to identify that (1) JPMorgan Chase is the active SWIFT correspondent, (2) the
  new channel redirects NZD/AUD volume away from that correspondent, and (3) ADR-CB-002
  Note implies notification obligations may exist in the bilateral agreement. No single
  injection source provides the complete C5 constraint — the model must compose all three
  signals independently and infer the contractual risk. C5 was correctly elevated from
  R1 (risk) to B5 (blocker with escalation condition) at /discovery, then propagated
  through /definition (Story 1.5 as C5 PRIMARY), /review (confirmed propagated — no
  Category B findings), /test-plan (T1.5, T1.8, T10.1–T10.4), and /dor (H5 hard block
  for Story 2.4). The escalation condition ("escalate to BLOCKER if notification
  obligation confirmed") was also correctly surfaced.

