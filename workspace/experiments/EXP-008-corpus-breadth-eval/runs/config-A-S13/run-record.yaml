# AQ dimension justifications (short-form for manifest)
aq_justifications:
  problem_framing: >
    Discovery names both a competitive business gap (NZD $4.2M annual revenue lost to
    Wise/Western Union; SWIFT product at $18-25/transaction vs target ≤$5) and a
    regulatory gap (RBNZ AML/CFT, AUSTRAC originator information, RBNZ FX reporting,
    and DIA registration all unconfirmed for the new channel); personas are named with
    scoped functional roles (Treasury Legal Counsel, RBNZ AML/CFT Compliance Officer,
    Regulatory Affairs Manager, Enterprise's Australian counterpart compliance teams);
    success indicators include specific measurable conditions (≤$5 fee, 2-hour
    settlement SLA, NZD $1M+ revenue recovery within 12 months of rollout, zero RBNZ
    or AUSTRAC compliance findings in first 12 months, zero AU counterpart credit
    instruction rejections).
  scope_discipline: >
    MVP scope explicitly bounded with 8 named out-of-scope items (AU-to-NZ direction
    deferred to future phase, payments above NZD $10,000 via proprietary channel, non-
    Australia international corridors, AML/CFT framework redesign, AU counterpart system
    development, JPMorgan Chase commercial management, retrospective payment volume
    migration, automated submission or settlement without human confirmation); 13 stories
    across 3 epics is proportionate to 5-constraint regulated complexity spanning NZ and
    AU jurisdictions with 5 mandatory pre-launch compliance gates.
  story_testability: >
    Most ACs have unambiguous pass/fail conditions and are coding-agent-executable, but
    AC1 and AC2 in each of the five Epic 1 governance stories describe document-filing
    and regulatory notification deliverables (e.g. Story 1.1 AC1: "RBNZ AML/CFT
    Compliance Officer produces a written confirmation... filed in SharePoint at
    [Document-ID]"; Story 1.5 AC2: "Treasury Legal Counsel files the review memorandum")
    that require human verification of document existence and signatory authority and
    cannot be executed by a coding agent without access to external document management
    systems.
  nfr_specificity: >
    All test assertions in T1–T10 reference specific thresholds or named standards: T5.2
    uses exact NZD $10,000 threshold; T8.1 uses ≤7200 seconds for 2-hour SLA; T3.8 uses
    7-year retention period citing policy s.A.5; T4.2–T4.4 name three specific screening
    lists (RBNZ-designated persons, OFAC SDN, DFAT consolidated); T4.5 specifies
    fail-closed per ADR-CB-004; T7.2 specifies 17:00 NZST settlement cut-off; no NFR
    uses generic "must comply with X" framing without a specific clause or measurable
    condition.
  dor_gate_quality: >
    All five regulated constraints (C1–C5) are gated with named responsible parties in
    the Coding Agent Instructions: AMLCFT_CHANNEL_VALIDATED setter "RBNZ AML/CFT
    Compliance Officer"; AUSTRAC_CONFIRMATION_RECEIVED setter "Payments Compliance
    Officer"; FX_REPORTING_VALIDATED setter "Regulatory Affairs team lead or Enterprise
    Treasury Manager"; DIA_REGISTRATION_CLEARED setter "Regulatory Affairs Manager";
    CORRESPONDENT_AGREEMENT_CLEARED setter "Treasury Legal Counsel"; adversarial
    coverage in test plan includes T1.1–T1.10 (single and multi-flag gate failures
    at intake and transmission stages), T4.5–T4.6 (fail-closed screening service
    unavailability), T6.4 (idempotency on duplicate credit instruction transmission),
    T10.4 (flag revocation mid-operation).

# Scoring notes
scoring_notes: >
  Story testability (1 not 2) is the only close call. The Epic 1 governance ACs are
  precisely stated with crystal-clear pass/fail conditions — they are not vague; the
  1 score reflects the rubric's strict criterion that "each AC could be verified by a
  coding agent or automated test without clarification from the operator." AC1 and AC2
  in each of the five Epic 1 stories describe document-filing events (written
  confirmation in SharePoint with document ID, regulatory notification filed with
  submission reference) that cannot be verified by a coding agent without integration
  to document management systems. The rubric's score-1 criterion focuses on "vague
  language" as the failing pattern; however, the score-2 criterion requires coding-agent
  verifiability, which these ACs fail not due to ambiguity but due to requiring human
  action. This is a structural gap in the AQ rubric: it was designed for pure engineering
  stories, and governance-delivery stories with precise-but-human-executed ACs sit in a
  category the rubric does not directly model. Rubric annotation candidate for future
  runs: "Governance-delivery ACs that are unambiguous but require human verification
  score 1 — they are precise but not coding-agent-executable." DoR gate quality (scored
  2 vs S8's 1): S13 explicitly names a responsible party for every one of its five
  deployment flags in the Coding Agent Instructions block, satisfying the rubric's named
  responsible party criterion without the ambiguity that caused the S8 score-1 (where
  Gates 1 and 2 relied on contextual inference rather than explicit naming in the gate
  condition).

# Review findings summary
review_findings: >
  PASS — 0 HIGH findings, 1 MEDIUM, 6 LOW. MEDIUM D1: Story 2.4 idempotency of credit
  instruction transmission not specified — duplicate credit risk on acknowledgement loss;
  addressed in test plan T6.4. LOW findings: A1 (DIA timeline assumption absent), A2
  (Epic 1 done-definition clarity for engineering team), C1 (Story 2.1 flag check vs.
  originator info field ordering ambiguity), C2 (Story 2.5 threshold reporting window
  deferred to Story 1.1 AC2 confirmation), C3 (Story 3.1 NZST/NZDT DST cut-off
  unaddressed — addressed in T7.3), E1 (no flag revocation mechanism specified —
  addressed in T10.4 and DoR W3). Category B (constraint propagation): PASS, no
  findings.

