# context.yml — Experiment variant: Sonnet 4.6 on Phase 4
# Profile: personal (skills library / tooling repo, non-regulated)
#
# USE THIS CONTEXT FOR: Sonnet 4.6 discovery → definition run on Phase 4 ref doc
# SWITCH TO THIS: cp contexts/experiment-sonnet-phase4.yml .github/context.yml

meta:
  name: "SDLC Skills Pipeline Library"
  scope: personal
  regulated: false

source_control:
  platform: github
  base_branch: master
  merge_request_term: "pull request"
  pr_command: "gh pr create --draft"
  artefact_root: ".github"

agent:
  instruction_file: "copilot-instructions.md"

architecture:
  ea_registry_repo: "https://github.com/heymishy/ea-registry"
  ea_registry_local_path: "C:/Users/Hamis/code/ea-registry-repo"
  ea_registry_authoritative: true

optimization:
  token_policy:
    per_turn_soft_budget: 12000
    per_story_budget: 120000
    per_feature_budget: 800000
  routing:
    default_model_class: "balanced"
    escalation_model_class: "deep-reasoning"

mapping:
  stage_aliases: {}
  artefact_aliases: {}
  governance:
    gates: []

scaling:
  maturity_level: "team"
  target_team_count: 1
  state_strategy: "per-repo-json"

skills_upstream:
  enabled: true
  remote: "skills-upstream"
  url: "https://github.com/heymishy/skills-repo.git"
  sync_paths:
    - .github/skills/
    - .github/templates/
    - scripts/
    - docs/skill-pipeline-instructions.md
  strategy: merge

# Instrumentation — EXP-010: Fable 5 vs Sonnet 4.6 vs Opus 4.6 vs Sonnet 3.7 model sweep
# Run: Layer 2 programmatic via run-model-sweep.js --batch against corpus T1-T5 + S2-S13
# See: workspace/experiments/EXP-010-fable5-model-sweep/manifest.md
instrumentation:
  enabled: true
  experiment_id: "EXP-010-fable5-model-sweep"
  model_label: "claude-sonnet-4-6"
  cost_tier: "fast"

audit:
  ci_attachment: true           # opt-in: collect and upload governed artefact bundles on each PR
  ci_platform: github-actions   # adapter to use for upload + comment
  artifact_retention_days: 7    # days to retain CI artefact bundles

improvement_agent:
  min_dream_interval_hours: 23  # minimum hours between scheduled dreaming runs

improve:
  auto_confirm: false           # interactive mode (default); set true for non-interactive CI runs

evaluation:
  mode: true          # set to true for eval harness, sweep script, non-interactive runs
                        # NEVER set to true in production — eval artefacts are scored then discarded
  # fixed judge — never the model under evaluation
  judge_model: claude-sonnet-4-6
  output_path: workspace/eval-run-result.json
