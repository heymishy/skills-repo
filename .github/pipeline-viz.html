<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Visualiser</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  /* ── Reset + base ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --surface2:  #273548;
    --border:    #334155;
    --text:      #e2e8f0;
    --muted:     #94a3b8;
    --green:     #22c55e;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --blue:      #3b82f6;
    --purple:    #a855f7;
    --teal:      #14b8a6;
    --col-w:     220px;
    --gap:       12px;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; min-height: 100vh; }

  /* ── Top bar ────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 14px; font-weight: 700; letter-spacing: .03em; white-space: nowrap; }
  header .sep { color: var(--border); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  select, input[type="text"] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 3px 7px; font-size: 12px; outline: none;
  }
  select:focus, input:focus { border-color: var(--blue); }
  .btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 3px 10px; font-size: 12px; cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.active { background: var(--blue); border-color: var(--blue); }
  .spacer { flex: 1; }
  #last-updated { color: var(--muted); font-size: 11px; white-space: nowrap; }
  #reload-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
  #reload-btn:hover { color: var(--text); border-color: var(--text); }
  .range-wrap { display: flex; align-items: center; gap: 6px; }
  input[type="range"] { width: 120px; accent-color: var(--blue); }
  .range-val { color: var(--muted); font-size: 11px; min-width: 44px; text-align: right; }

  /* ── Legend ─────────────────────────────────────────────────── */
  .legend { display: flex; gap: 12px; align-items: center; }
  .legend-item { display: flex; gap: 4px; align-items: center; font-size: 11px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--green); }
  .dot.amber { background: var(--amber); }
  .dot.red   { background: var(--red); }

  /* ── Stage columns ───────────────────────────────────────────── */
  #board {
    display: flex; gap: var(--gap); padding: var(--gap) 16px;
    overflow-x: auto; align-items: flex-start; min-height: calc(100vh - 60px);
  }
  #board.loop-grouped {
    display: block; padding: 10px 16px; overflow-x: visible;
    min-height: calc(100vh - 120px);
  }
  .loop-lane {
    border: 1px solid var(--border); border-radius: 8px;
    background: rgba(15,23,42,.45); margin-bottom: 10px;
  }
  .loop-lane-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .loop-lane-title { font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .loop-lane-title.outer { color: #93c5fd; }
  .loop-lane-title.inner { color: #5eead4; }
  .loop-lane-meta { color: var(--muted); font-size: 10px; }
  .loop-lane-row { display: flex; gap: var(--gap); overflow-x: auto; padding: 10px; align-items: flex-start; }
  .col {
    flex-shrink: 0; width: var(--col-w);
    background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .col-header {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 11px; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .col-header-main { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .col-header-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-tools { display: flex; align-items: center; gap: 4px; }
  .col-count {
    background: var(--surface2); border-radius: 10px;
    padding: 1px 6px; font-size: 10px; color: var(--muted);
  }
  .col-size-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 3px; width: 18px; height: 18px; font-size: 11px;
    line-height: 1; cursor: pointer; padding: 0;
  }
  .col-size-btn:hover { color: var(--text); border-color: var(--text); }
  .col-empty .col-header-title { opacity: 0.8; }
  .col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }

  /* active column accent — draws the eye to current work */
  .col-active    { border-top: 2px solid var(--blue); }
  .col-active.has-red   { border-top-color: var(--red); }
  .col-active.has-amber { border-top-color: var(--amber); }
  .col-active .col-header { color: var(--text); }

  /* completed-stage count badge */
  .col-count-done { font-size: 10px; color: var(--green); opacity: 0.65; padding: 1px 4px; }

  /* expand/collapse toggle for the done-trail section */
  .done-section-toggle {
    width: 100%; background: none; border: 1px dashed var(--border); color: var(--muted);
    border-radius: 4px; padding: 3px 6px; font-size: 10px; cursor: pointer; text-align: left;
    margin-top: 2px; font-family: inherit;
  }
  .done-section-toggle:hover { color: var(--text); border-color: var(--muted); }
  .done-cards { display: none; flex-direction: column; gap: 4px; margin-top: 3px; }
  .done-cards.open { display: flex; }

  /* ghost card for completed stages */
  .feature-card.done-card {
    opacity: 0.42; border-left: 2px solid rgba(34,197,94,0.5) !important;
  }
  .feature-card.done-card:hover { opacity: 0.72; }

  /* ── Feature cards ────────────────────────────────────────────── */
  .feature-card {
    background: var(--surface2); border-radius: 6px;
    border: 1px solid var(--border); overflow: hidden;
    transition: border-color .15s;
  }
  .feature-card:hover { border-color: var(--blue); }
  .feature-card.health-red    { border-left: 3px solid var(--red); }
  .feature-card.health-amber  { border-left: 3px solid var(--amber); }
  .feature-card.health-green  { border-left: 3px solid var(--green); }

  .card-header {
    padding: 8px 10px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .card-toggle { color: var(--muted); font-size: 10px; flex-shrink: 0; margin-top: 2px; transition: transform .15s; }
  .card-toggle.open { transform: rotate(90deg); }
  .card-title { font-weight: 600; font-size: 12px; line-height: 1.3; flex: 1; }
  .card-track {
    font-size: 10px; border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
    background: var(--bg); color: var(--muted);
  }
  .card-track.short    { color: var(--teal); }
  .card-track.standard { color: var(--blue); }
  .card-track.programme-workstream { color: var(--purple); }

  .card-state-chip {
    font-size: 9px; border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
    border: 1px solid transparent; text-transform: uppercase; letter-spacing: .04em;
  }
  .card-state-chip.human {
    color: #93c5fd; background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35);
  }
  .card-state-chip.processing {
    color: #5eead4; background: rgba(20,184,166,.12); border-color: rgba(20,184,166,.35);
  }
  .card-state-chip.blocked {
    color: #fca5a5; background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35);
  }
  .card-state-chip.done {
    color: #86efac; background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.35);
  }

  .card-body { border-top: 1px solid var(--border); padding: 8px 10px; display: none; }
  .card-body.open { display: block; }

  /* meta row */
  .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { font-size: 10px; background: var(--bg); border-radius: 3px; padding: 1px 6px; color: var(--muted); }
  .tag.red   { color: var(--red); }
  .tag.amber { color: var(--amber); }
  .tag.green { color: var(--green); }

  /* Blocker notice */
  .blocker-notice {
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    border-radius: 4px; padding: 5px 8px; font-size: 11px; color: var(--red);
    margin-bottom: 8px;
  }
  .next-action {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 7px; font-size: 11px; margin-bottom: 8px;
  }
  .next-action .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; margin-right: 6px; }
  .next-action.human { border-color: rgba(59,130,246,.35); }
  .next-action.processing { border-color: rgba(20,184,166,.35); }
  .next-action.blocked { border-color: rgba(239,68,68,.35); }
  .next-action.done { border-color: rgba(34,197,94,.35); }
  .next-action-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .next-action-controls { display: inline-flex; align-items: center; gap: 6px; }
  .next-action-btn {
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    border-radius: 4px; padding: 2px 8px; font-size: 10px; cursor: pointer;
  }
  .next-action-btn:hover { border-color: var(--text); }
  .next-action-btn:disabled { opacity: .45; cursor: not-allowed; }
  .next-action-age { color: var(--muted); font-size: 10px; }
  .next-action-warning { color: var(--amber); font-size: 10px; margin-top: 4px; }

  /* ── Epic tree ────────────────────────────────────────────────── */
  .epic-list { display: flex; flex-direction: column; gap: 4px; }
  .epic-row {
    background: var(--bg); border-radius: 4px; border: 1px solid var(--border);
    overflow: hidden;
  }
  .epic-row-header {
    padding: 5px 8px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .epic-toggle { color: var(--muted); font-size: 9px; flex-shrink: 0; transition: transform .15s; }
  .epic-toggle.open { transform: rotate(90deg); }
  .epic-name { font-size: 11px; font-weight: 600; flex: 1; }
  .epic-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-not-started { background: var(--border); }
  .status-in-progress { background: var(--amber); }
  .status-complete    { background: var(--green); }

  .story-list { padding: 4px 8px 6px 20px; display: none; flex-direction: column; gap: 3px; }
  .story-list.open { display: flex; }
  .story-row {
    background: var(--surface2); border-radius: 4px; border: 1px solid var(--border);
    padding: 5px 8px; cursor: pointer; transition: border-color .15s;
  }
  .story-row:hover { border-color: var(--blue); }
  .story-row-top { display: flex; align-items: center; gap: 6px; }
  .story-health { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .story-name { font-size: 11px; flex: 1; }
  .story-stage-badge {
    font-size: 9px; background: var(--bg); border-radius: 3px; padding: 1px 5px; color: var(--muted);
  }
  .story-details { margin-top: 5px; display: none; }
  .story-details.open { display: block; }
  .story-progress { margin-top: 4px; }

  /* ── TDD task list ───────────────────────────────────────────── */
  .story-row { cursor: default; }
  .story-row-top { cursor: pointer; }
  .task-mini-bar { margin-top: 4px; }
  .task-toggle-btn {
    display: flex; align-items: center; gap: 4px; margin-top: 4px;
    background: none; border: none; color: var(--muted); font-size: 10px;
    cursor: pointer; padding: 0; font-family: inherit;
  }
  .task-toggle-btn:hover { color: var(--text); }
  .task-toggle-arrow { font-size: 9px; transition: transform .15s; }
  .task-toggle-arrow.open { transform: rotate(90deg); }
  .task-list-inline { display: none; flex-direction: column; gap: 2px; margin-top: 4px; }
  .task-list-inline.open { display: flex; }
  .task-item {
    display: flex; align-items: center; gap: 5px; padding: 3px 4px;
    background: var(--bg); border-radius: 3px; border: 1px solid var(--border);
  }
  .task-name { font-size: 10px; color: var(--text); flex: 1; line-height: 1.3; }
  a.task-link { color: var(--blue); text-decoration: none; }
  a.task-link:hover { text-decoration: underline; }
  .tdd-badge {
    font-size: 9px; font-weight: 700; border-radius: 3px; padding: 1px 5px;
    flex-shrink: 0; letter-spacing: .04em;
  }
  .tdd-not-started { background: var(--bg);    color: var(--border);  border: 1px solid var(--border); }
  .tdd-red         { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.4); }
  .tdd-green       { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.4); }
  .tdd-refactor    { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.4); }
  .tdd-committed   { background: rgba(20,184,166,.15); color: var(--teal);  border: 1px solid rgba(20,184,166,.4); }
  /* Drawer task list */
  .drawer-task-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 5px 6px;
    background: var(--bg); border-radius: 4px; border: 1px solid var(--border);
    margin-bottom: 3px;
  }
  .drawer-task-num { font-size: 10px; color: var(--muted); flex-shrink: 0; min-width: 14px; }
  .drawer-task-name { font-size: 12px; flex: 1; line-height: 1.4; }
  .drawer-tdd-badge { font-size: 10px; font-weight: 700; border-radius: 3px; padding: 2px 6px; flex-shrink: 0; }
  .progress-label { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 2px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
  .progress-fill.partial { background: var(--amber); }
  .story-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .pill {
    font-size: 9px; border-radius: 3px; padding: 1px 6px;
    border: 1px solid transparent;
  }
  .pill.ok   { background: rgba(34,197,94,.12); color: var(--green); border-color: rgba(34,197,94,.3); }
  .pill.warn { background: rgba(245,158,11,.12); color: var(--amber); border-color: rgba(245,158,11,.3); }
  .pill.fail { background: rgba(239,68,68,.12);  color: var(--red);   border-color: rgba(239,68,68,.3); }
  .pill.none { background: var(--bg); color: var(--muted); border-color: var(--border); }

  /* ── Empty state ─────────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 40px 16px; color: var(--muted);
  }
  .empty-state h2 { font-size: 15px; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 12px; line-height: 1.6; }
  .empty-state code { background: var(--surface); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

  /* ── Summary bar ─────────────────────────────────────────────── */
  #summary-bar {
    display: flex; gap: 16px; padding: 6px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--muted); flex-wrap: wrap;
  }
  .summary-stat { display: flex; gap: 5px; align-items: center; }
  .summary-stat .val { color: var(--text); font-weight: 600; }

  /* ── Action queue panel ─────────────────────────────────────── */
  #action-queue {
    display: none; padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: rgba(15,23,42,.35);
  }
  #action-queue.active { display: block; }
  .aq-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; font-size: 11px;
  }
  .aq-title { color: #93c5fd; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .aq-meta { color: var(--muted); }
  .aq-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .aq-item {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface2); padding: 3px 8px; font-size: 11px;
    max-width: 100%;
  }
  .aq-item button {
    background: none; border: none; color: var(--text); cursor: pointer;
    font: inherit; padding: 0; text-decoration: underline; text-underline-offset: 2px;
  }
  .aq-item .aq-state.human { color: #93c5fd; }
  .aq-item .aq-state.blocked { color: #fca5a5; }
  .aq-item .aq-age { color: var(--muted); font-size: 10px; }
  .aq-empty { color: var(--muted); font-size: 11px; }

  /* ── Loop structure strip (pipeline view only) ───────────────── */
  #loop-structure {
    display: none; gap: 10px; align-items: center;
    padding: 6px 16px; border-bottom: 1px solid var(--border);
    background: rgba(15,23,42,.45); overflow-x: auto;
  }
  #loop-structure.active { display: flex; }
  .loop-band {
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: 999px; border: 1px solid var(--border);
    padding: 4px 10px; white-space: nowrap; font-size: 11px;
  }
  .loop-band strong { font-size: 11px; }
  .loop-band .loop-stage-list { font-size: 10px; color: var(--muted); }
  .loop-band.outer {
    background: rgba(59,130,246,.08);
    border-color: rgba(59,130,246,.3);
    color: #93c5fd;
  }
  .loop-band.inner {
    background: rgba(20,184,166,.1);
    border-color: rgba(20,184,166,.35);
    color: #5eead4;
  }
  .col-loop-outer { box-shadow: inset 0 2px 0 rgba(59,130,246,.5); }
  .col-loop-inner { box-shadow: inset 0 2px 0 rgba(20,184,166,.65); }
  .tag.loop-outer { color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
  .tag.loop-inner { color: #5eead4; border: 1px solid rgba(20,184,166,.35); }
  .tag.loop-library { color: #d8b4fe; border: 1px solid rgba(168,85,247,.35); }

  /* ── Story drawer (slide-in from right) ─────────────────────── */
  #drawer-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  }
  #drawer-overlay.open { display: block; }
  #drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 360px;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 201; overflow-y: auto; padding: 16px;
    transform: translateX(100%); transition: transform .2s;
  }
  #drawer.open { transform: translateX(0); }
  #drawer-close { float: right; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
  #drawer-close:hover { color: var(--text); }
  #drawer h2 { font-size: 14px; font-weight: 700; margin-bottom: 2px; margin-right: 40px; }
  #drawer .drawer-stage { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .drawer-section { margin-bottom: 14px; }
  .drawer-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .drawer-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 12px; }
  .drawer-row .label { color: var(--muted); }
  .drawer-link { color: var(--blue); text-decoration: none; font-size: 11px; }
  .drawer-link:hover { text-decoration: underline; }
  .drawer-blocker { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 4px; padding: 6px 8px; font-size: 11px; color: var(--red); }

  /* ── Keyboard hint ────────────────────────────────────────────── */
  #kbd-hint { position: fixed; bottom: 12px; right: 16px; font-size: 10px; color: var(--border); }

  /* ── Drop zone (shown when fetch fails) ─────────────────────── */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    margin: 24px auto; max-width: 480px;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--blue); background: rgba(59,130,246,.06);
  }
  #drop-zone h2 { font-size: 16px; margin-bottom: 8px; }
  #drop-zone p  { font-size: 12px; color: var(--muted); line-height: 1.7; }
  #drop-zone .drop-icon { font-size: 36px; margin-bottom: 12px; }
  #file-input { display: none; }
  #browse-btn {
    margin-top: 14px; display: inline-block;
    background: var(--blue); color: #fff; border: none;
    border-radius: 5px; padding: 6px 18px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  #browse-btn:hover { background: #2563eb; }

  /* ── Markdown viewer ─────────────────────────────────────────── */
  #md-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300;
  }
  #md-overlay.open { display: block; }
  #md-pane {

<!-- ───────────── HEADER ───────────── -->
<header>
  <h1>🗂 Pipeline</h1>
  <span class="sep">|</span>

  <div class="filter-group">
    <label>Risk</label>
    <select id="filter-health" title="Risk signal: blocked / at risk / moving">
      <option value="">All</option>
      <option value="red">🔴 Blocked</option>
      <option value="amber">🟡 At risk</option>
      <option value="green">🟢 Moving</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Track</label>
    <select id="filter-track">
      <option value="">All</option>
      <option value="short">Short</option>
      <option value="standard">Standard</option>
      <option value="programme-workstream">Programme</option>
      <option value="library">Library</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Team</label>
    <select id="filter-team">
      <option value="">All</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Action</label>
    <select id="filter-action" title="Who/what owns the next move">
      <option value="">All</option>
      <option value="human">Needs human</option>
      <option value="processing">Processing</option>
      <option value="blocked">Blocked</option>
      <option value="done">Done</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="filter-search" placeholder="feature / story name…" style="width:160px">

  <button class="btn" id="expand-all-btn" title="Expand all (e)">Expand all</button>
  <button class="btn" id="collapse-all-btn" title="Collapse all (c)">Collapse all</button>
  <button class="btn" id="toggle-loop-group-btn" title="Toggle grouped loop layout (g)">Loop grouped</button>
  <button class="btn" id="governance-btn" title="Governance and compliance view (v)">🛡 Governance</button>
  <button class="btn" id="outcomes-btn" title="Outcomes view (o)">📊 Outcomes</button>
  <button class="btn" id="library-btn" title="Library evolution view (l)">🧱 Library</button>

  <div class="filter-group">
    <label>Columns</label>
    <div class="range-wrap">
      <input type="range" id="column-width-slider" min="160" max="360" step="10" value="220">

  </div>

  </label>
  <button id="reload-btn" title="Reload state file">↺ Reload</button>
  <button id="download-btn" title="Download current state as pipeline-state.json">⬇ Download</button>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const STATE_FILE = 'pipeline-state.json';

const STAGES = [
  { id: 'ideation',            label: 'Ideation' },
  { id: 'discovery',           label: 'Discovery' },
  { id: 'benefit-metric',      label: 'Benefit Metric' },
  { id: 'definition',          label: 'Definition' },
  { id: 'spike',               label: 'Spike' },
  { id: 'review',              label: 'Review' },
  { id: 'test-plan',           label: 'Test Plan' },
  { id: 'definition-of-ready', label: 'Def of Ready' },
  { id: 'branch-setup',        label: 'Branch Setup' },
  { id: 'implementation-plan', label: 'Impl Plan' },
  { id: 'subagent-execution',  label: 'Execution' },
  { id: 'implementation-review', label: 'Impl Review' },
  { id: 'verify-completion',   label: 'Verify' },
  { id: 'branch-complete',     label: 'Branch Done' },
  { id: 'definition-of-done',  label: 'Def of Done' },
  { id: 'trace',               label: 'Trace' },
  { id: 'release-pending',     label: 'Release Pending' },
  { id: 'released',            label: 'Released' },
  { id: 'stalled',             label: 'Stalled' },
];

const META_STAGES = ['loop-design', 'token-optimization', 'org-mapping', 'scale-pipeline'];
const INNER_LOOP_STAGE_ORDER = ['branch-setup', 'implementation-plan', 'subagent-execution', 'implementation-review', 'verify-completion', 'branch-complete'];
const OUTER_LOOP_STAGE_ORDER = ['ideation', 'discovery', 'benefit-metric', 'definition', 'spike', 'review', 'test-plan', 'definition-of-ready', 'definition-of-done', 'trace', 'release-pending', 'released'];
const INNER_LOOP_STAGES = new Set(INNER_LOOP_STAGE_ORDER);
const PIPELINE_STAGE_ORDER = ['ideation', 'discovery', 'benefit-metric', 'definition', 'spike', 'review', 'test-plan', 'definition-of-ready', 'branch-setup', 'implementation-plan', 'subagent-execution', 'implementation-review', 'verify-completion', 'branch-complete', 'definition-of-done', 'trace', 'release-pending', 'released'];

const GOVERNANCE_GATES = [
  { id: 'review',              label: 'Review',    skill: '/review',              skillPath: 'skills/review/SKILL.md',              criteria: 'No HIGH findings before progression',                      artefact: f => `artefacts/${f.slug}/review/` },
  { id: 'test-plan',           label: 'Test Plan', skill: '/test-plan',           skillPath: 'skills/test-plan/SKILL.md',           criteria: 'Failing tests and verification script prepared',            artefact: f => `artefacts/${f.slug}/test-plans/` },
  { id: 'definition-of-ready', label: 'DoR',       skill: '/definition-of-ready', skillPath: 'skills/definition-of-ready/SKILL.md', criteria: 'All hard blocks pass and sign-off complete',                artefact: f => `artefacts/${f.slug}/dor/` },
  { id: 'verify-completion',   label: 'Verify',    skill: '/verify-completion',   skillPath: 'skills/verify-completion/SKILL.md',   criteria: 'Fresh evidence run before completion claims',               artefact: f => `artefacts/${f.slug}/verification-scripts/` },
  { id: 'definition-of-done',  label: 'DoD',       skill: '/definition-of-done',  skillPath: 'skills/definition-of-done/SKILL.md',  criteria: 'Post-merge AC/test coverage validated',                     artefact: f => `artefacts/${f.slug}/dod/` },
  { id: 'trace',               label: 'Trace',     skill: '/trace',               skillPath: 'skills/trace/SKILL.md',               criteria: 'Traceability chain intact across artefacts',                artefact: f => `artefacts/${f.slug}/trace/trace.md` },
  { id: 'release',             label: 'Release',   skill: '/release',             skillPath: 'skills/release/SKILL.md',             criteria: 'Release bundle/checklist produced for deployment',          artefact: f => `artefacts/${f.slug}/release/release-notes-technical.md` },

// Their descriptions and step requirements inform the gate criteria context.
const META_SKILL_REFS = [
  { id: 'workflow',    label: 'Workflow',    skill: '/workflow',    skillPath: 'skills/workflow/SKILL.md',    fallback: 'Pipeline navigator — defines what stage each feature is at and what skill runs next.' },
  { id: 'org-mapping', label: 'Org Mapping', skill: '/org-mapping', skillPath: 'skills/org-mapping/SKILL.md', fallback: 'Maps pipeline steps to org-specific terminology, governance gates, and approval processes.' },
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let allData = null;
let activeFilters = { health: '', track: '', team: '', action: '', search: '' };
let openFeatures = new Set();   // feature slugs with expanded card body
let openEpics    = new Set();   // epic slugs with expanded story list
let openStories      = new Set();   // story slugs with expanded detail
let openTaskLists    = new Set();   // story keys with task list expanded inline
let openDoneSections = new Set();   // stage ids with 'completed' section expanded
let drawerStory  = null;
let viewMode = 'stage'; // 'stage' | 'governance' | 'outcomes' | 'library'
let editingMetric = null; // { featureSlug, metricId }

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────────────────────────────────────
async function loadState() {
  // Try fetch first (works with VS Code Live Server, GitHub Pages, etc.).
  // On file:// the browser blocks fetch, so we silently fall back to the
  // drop-zone picker so the user can load the file from disk — no server needed.
  try {
    const resp = await fetch(STATE_FILE + '?_=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    allData = normalizeData(await resp.json());
  } catch (e) {
    showDropZone();
    return;
  }
  // render() is outside the fetch catch — a JS render error shows as an error,
  // not a false "no data" drop zone.
  try { render(); } catch (re) { showError('render error: ' + re.message + '\n' + re.stack); }
  // Attempt to load live skill descriptions in the background; re-render when done
  // so the governance view picks up any updates without blocking initial display.
  loadSkillMetadata().then(() => { try { render(); } catch (_) {} });
}

function normalizeData(data) {
  // Accept either `slug` or `id` on features, epics, and stories.
  // Skills may write `id`; the viz uses `slug` internally.
  (data.features || []).forEach(f => {
    f.slug = f.slug || f.id;
    (f.epics || []).forEach(e => {
      e.slug = e.slug || e.id;
      (e.stories || []).forEach(s => {
        s.slug  = s.slug  || s.id;
        s.tasks = s.tasks || [];
      });
    });
  });
  (data.programmes || []).forEach(p => { p.slug = p.slug || p.id; });
  return data;
}

function loadFromText(text) {
  try {
    allData = normalizeData(JSON.parse(text));
    const dz = document.getElementById('drop-zone');
    if (dz) dz.remove();
    try { render(); } catch (re) { showError('render error: ' + re.message + '\n' + re.stack); }
  } catch (e) {
    showError('parse error: ' + e.message);
    return;
  }
  // Also attempt skill metadata when loading via file picker.
  loadSkillMetadata().then(() => { try { render(); } catch (_) {} });
}

function showError(msg) {
  document.getElementById('board').innerHTML =
    `<div style="padding:24px;color:var(--red);font-family:monospace;white-space:pre-wrap;font-size:12px"><strong>Error loading visualiser</strong>\n${msg}</div>`;
}

window.onerror = (msg, src, ln, col, err) => {
  showError(msg + ' (' + src + ':' + ln + ')' + (err ? '\n' + err.stack : ''));
};

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => loadFromText(e.target.result);
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────────────────────
// SKILL METADATA LOADING
// Fetches SKILL.md files relative to this page's URL and parses their YAML
// frontmatter description. Works when served (VS Code Live Server, GitHub Pages).
// Silently falls back to hardcoded criteria on file:// or if file is absent.
// ─────────────────────────────────────────────────────────────────────────────
function parseFrontmatterDescription(text) {
  // Match YAML frontmatter block: --- ... ---
  const fmMatch = text.match(/^---\s*\n([\s\S]*?)\n---/);
  if (!fmMatch) return null;
  const fm = fmMatch[1];
  // Block scalar (folded) description: description: >\n  line1\n  line2
  const blockMatch = fm.match(/description:\s*>\s*\n((?:[ \t]+[^\n]*\n?)+)/);
  if (blockMatch) {
    return blockMatch[1]
      .split('\n')
      .map(l => l.trim())
      .filter(Boolean)
      .join(' ')
      .trim();
  }
  // Single-line description: description: some text
  const lineMatch = fm.match(/description:\s*(.+)/);
  return lineMatch ? lineMatch[1].trim() : null;
}

async function loadSkillMetadata() {
  const allSkills = [
    ...GOVERNANCE_GATES.map(g => ({ id: g.id, path: g.skillPath })),
    ...META_SKILL_REFS.map(m => ({ id: m.id, path: m.skillPath })),
  ];
  const results = await Promise.allSettled(
    allSkills.map(async ({ id, path }) => {
      const resp = await fetch(path + '?_=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const description = parseFrontmatterDescription(text);
      if (!description) throw new Error('no description in frontmatter');
      return { id, description };
    })
  );
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      skillMetadata[r.value.id] = { description: r.value.description, loaded: true };
    }
  });
}

function skillCriteria(gateId) {
  return skillMetadata[gateId]?.description || null;
}

function skillLoaded(id) {
  return !!skillMetadata[id]?.loaded;
}


function showDropZone() {
  const board = document.getElementById('board');
  board.innerHTML = `
    <div id="drop-zone">
      <div class="drop-icon">📄</div>
      <h2>Load pipeline-state.json</h2>
      <p>
        Drag and drop <strong>pipeline-state.json</strong> here,<br>
        or click <em>Load file</em> in the header to browse for it.<br><br>
        <span style="font-size:11px">
          The file lives at <code>.github/pipeline-state.json</code> in your repo.
          Skills populate it automatically as you run them.
        </span>
      </p>
      <button id="browse-btn">Browse…</button>
    </div>`;

  document.getElementById('browse-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  document.getElementById('summary-bar').innerHTML = '';
  const aq = document.getElementById('action-queue');
  aq.classList.remove('active');
  aq.innerHTML = '';
  document.getElementById('last-updated').textContent = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERING
// ─────────────────────────────────────────────────────────────────────────────
function filteredFeatures() {
  if (!allData) return [];
  return allData.features.filter(f => {
    if (activeFilters.health && f.health !== activeFilters.health) return false;
    if (activeFilters.track  && f.track  !== activeFilters.track)  return false;
    if (activeFilters.team   && f.team   !== activeFilters.team)   return false;
    if (activeFilters.action) {
      const actionState = featureActionMeta(f).state;
      if (actionState !== activeFilters.action) return false;
    }
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      const inFeature = f.name.toLowerCase().includes(q) || f.slug.toLowerCase().includes(q);
      const inStory   = (f.epics || []).some(e =>
        (e.stories || []).some(s => s.name.toLowerCase().includes(q) || s.slug.toLowerCase().includes(q)));
      if (!inFeature && !inStory) return false;
    }
    return true;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY BAR
// ─────────────────────────────────────────────────────────────────────────────
function renderSummary(features) {
  const bar = document.getElementById('summary-bar');
  if (!allData || features.length === 0) { bar.innerHTML = ''; return; }
  const total   = features.length;
  const blocked = features.filter(f => f.health === 'red').length;
  const amber   = features.filter(f => f.health === 'amber').length;
  const green   = features.filter(f => f.health === 'green').length;
  const human   = features.filter(f => featureActionMeta(f).state === 'human').length;
  const processing = features.filter(f => featureActionMeta(f).state === 'processing').length;
  const stories = features.flatMap(f => (f.epics || []).flatMap(e => e.stories || []));
  const relReady = stories.filter(s => s.releaseReady).length;
  bar.innerHTML = `
    <div class="summary-stat"><span class="val">${total}</span> features</div>
    <div class="summary-stat"><span class="val" style="color:var(--red)">${blocked}</span> blocked</div>
    <div class="summary-stat"><span class="val" style="color:var(--amber)">${amber}</span> at risk</div>
    <div class="summary-stat"><span class="val" style="color:var(--green)">${green}</span> moving</div>
    <div class="summary-stat"><span class="val" style="color:#93c5fd">${human}</span> needs human</div>
    <div class="summary-stat"><span class="val" style="color:#5eead4">${processing}</span> processing</div>
    <div class="summary-stat"><span class="val">${stories.length}</span> stories total</div>
    ${relReady > 0 ? `<div class="summary-stat"><span class="val" style="color:var(--teal)">${relReady}</span> release-ready</div>` : ''}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// BOARD
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const features = filteredFeatures();
  renderSummary(features);
  const board = document.getElementById('board');
  const governance = document.getElementById('governance-board');
  const outcomes = document.getElementById('outcomes-board');
  const library = document.getElementById('library-board');
  const loopStructure = document.getElementById('loop-structure');
  const actionQueue = document.getElementById('action-queue');

  if (viewMode === 'governance') {
    board.style.display = 'none';
    actionQueue.classList.remove('active');
    loopStructure.classList.remove('active');
    outcomes.classList.remove('active');
    outcomes.innerHTML = '';
    library.classList.remove('active');
    library.innerHTML = '';
    governance.classList.add('active');
    renderGovernance(features);
  } else if (viewMode === 'outcomes') {
    board.style.display = 'none';
    actionQueue.classList.remove('active');
    loopStructure.classList.remove('active');
    governance.classList.remove('active');
    governance.innerHTML = '';
    library.classList.remove('active');
    outcomes.classList.add('active');
    renderOutcomes(features);
  } else if (viewMode === 'library') {
    board.style.display = 'none';
    actionQueue.classList.remove('active');
    loopStructure.classList.remove('active');
    governance.classList.remove('active');
    governance.innerHTML = '';
    outcomes.classList.remove('active');
    outcomes.innerHTML = '';
    library.classList.add('active');
    renderLibrary(features);
  } else {
    board.style.display = '';
    actionQueue.classList.add('active');
    loopStructure.classList.add('active');
    governance.classList.remove('active');
    governance.innerHTML = '';
    outcomes.classList.remove('active');
    outcomes.innerHTML = '';
    library.classList.remove('active');
    library.innerHTML = '';
    renderActionQueue(features);
    renderLoopStructure(features);
    renderBoard(features);
  }
  populateTeamFilter();
  updateTimestamp();
}

function renderActionQueue(features) {
  const panel = document.getElementById('action-queue');
  const actionable = features
    .map(f => ({ feature: f, meta: featureActionMeta(f) }))
    .filter(x => x.meta.state === 'human' || x.meta.state === 'blocked')
    .sort((a, b) => featureAgeMinutes(b.feature) - featureAgeMinutes(a.feature));

  if (actionable.length === 0) {
    panel.innerHTML = `<div class="aq-empty">No human actions waiting right now.</div>`;
    return;
  }

  panel.innerHTML = `
    <div class="aq-header">
      <span class="aq-title">Action queue</span>
      <span class="aq-meta">${actionable.length} waiting</span>
    </div>
    <div class="aq-list">
      ${actionable.slice(0, 12).map(({ feature, meta }) => `
        <div class="aq-item">
          <span class="aq-state ${meta.state}">${meta.label}</span>
          <button data-action="focus-feature" data-slug="${esc(feature.slug)}">${esc(feature.name)}</button>
          <span class="aq-age">${formatAge(featureAgeMinutes(feature))}</span>
        </div>`).join('')}
    </div>`;
}

function renderLoopStructure(features) {
  const outerCount = features.filter(f => loopType(f.stage) === 'outer').length;
  const innerCount = features.filter(f => loopType(f.stage) === 'inner').length;
  const outerStages = OUTER_LOOP_STAGE_ORDER.map(stageLabel).join(' -> ');
  const innerStages = INNER_LOOP_STAGE_ORDER.map(stageLabel).join(' -> ');
  document.getElementById('loop-structure').innerHTML = `
    <div class="loop-band outer">
      <strong>Outer loop (${outerCount})</strong>
      <span class="loop-stage-list">${outerStages}</span>
    </div>
    <div class="loop-band inner">
      <strong>Inner loop (${innerCount})</strong>
      <span class="loop-stage-list">${innerStages}</span>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// OUTCOMES VIEW
// ─────────────────────────────────────────────────────────────────────────────
function signalMeta(signal) {
  switch (signal) {
    case 'on-track':  return { cls: 'signal-on-track',  icon: '🟢', label: 'On track' };
    case 'at-risk':   return { cls: 'signal-at-risk',   icon: '🟡', label: 'At risk' };
    case 'off-track': return { cls: 'signal-off-track', icon: '🔴', label: 'Off track' };
    default:          return { cls: 'signal-not-measured', icon: '⚪', label: 'Not yet measured' };
  }
}

function metricRowHTML(m, f) {
  // If this metric is currently being edited, render the edit form instead
  if (editingMetric && editingMetric.featureSlug === f.slug && editingMetric.metricId === m.id) {
    return editMetricFormHTML(m, f.slug);
  }
  const sm = signalMeta(m.signal);
  const allStories = (f.epics || []).flatMap(e => e.stories || []);
  const storyTags = (m.contributingStories || []).map(slug => {
    const s = allStories.find(s2 => s2.slug === slug);
    const done = s && (s.dodStatus === 'complete' || s.prStatus === 'merged');
    return `<span class="metric-story-tag ${done ? 'done' : ''}">${done ? '✓' : '⏳'} ${esc(slug)}</span>`;
  }).join('');
  return `
  <div class="metric-row" data-feature="${esc(f.slug)}" data-metric="${esc(m.id)}">
    <div class="metric-name">
      ${esc(m.name)}
      <button class="metric-edit-btn" data-action="edit-metric" data-feature="${esc(f.slug)}" data-metric="${esc(m.id)}">✏️ Edit</button>
    </div>
    <div class="metric-meta">
      ${m.target   ? `<span>Target: ${esc(m.target)}</span>`   : ''}
      ${m.baseline ? `<span>Baseline: ${esc(m.baseline)}</span>` : ''}
      ${m.lastMeasured ? `<span>Last measured: ${esc(m.lastMeasured)}</span>` : ''}
    </div>
    <div class="metric-signal ${sm.cls}">${sm.icon} ${sm.label}</div>
    ${m.evidence ? `<div class="metric-evidence">${esc(m.evidence)}</div>` : ''}
    ${storyTags ? `<div class="metric-stories">${storyTags}</div>` : ''}
  </div>`;
}

function editMetricFormHTML(m, featureSlug) {
  const signals = ['not-yet-measured', 'on-track', 'at-risk', 'off-track'];
  const opts = signals.map(s => `<option value="${s}" ${m.signal === s ? 'selected' : ''}>${signalMeta(s).icon} ${signalMeta(s).label}</option>`).join('');
  return `
  <div class="metric-edit-form" data-feature="${esc(featureSlug)}" data-metric="${esc(m.id)}">
    <div><strong style="font-size:12px">${esc(m.name)}</strong></div>
    <div>
      <label>Signal</label>
      <select id="edit-signal-${esc(m.id)}">${opts}</select>
    </div>
    <div>
      <label>Evidence (what did you observe?)</label>
      <textarea id="edit-evidence-${esc(m.id)}" placeholder="e.g. 3/4 distributed participants voted — 75%">${esc(m.evidence || '')}</textarea>
    </div>
    <div>
      <label>Date measured</label>
      <input type="date" id="edit-date-${esc(m.id)}" value="${esc(m.lastMeasured || '')}">
    </div>
    <div class="metric-edit-actions">
      <button class="metric-save-btn" data-action="save-metric" data-feature="${esc(featureSlug)}" data-metric="${esc(m.id)}">Save</button>
      <button class="metric-cancel-btn" data-action="cancel-edit">Cancel</button>
    </div>
  </div>`;
}

function loopScoreHTML(f) {
  const metrics = f.metrics || [];
  if (metrics.length === 0) return '';
  const onTrack  = metrics.filter(m => m.signal === 'on-track').length;
  const measured = metrics.filter(m => m.signal && m.signal !== 'not-yet-measured').length;
  const dots = metrics.map(m => {
    const cls = m.signal === 'on-track' ? 'on-track' : m.signal === 'at-risk' ? 'at-risk' : m.signal === 'off-track' ? 'off-track' : '';
    return `<div class="loop-dot${cls ? ' ' + cls : ''}"></div>`;
  }).join('');
  const scoreCol = onTrack === metrics.length && onTrack > 0 ? 'var(--green)' : onTrack > 0 ? 'var(--amber)' : 'var(--muted)';
  return `
  <div class="outcome-loop-score">
    <span>Loop score</span>
    <div class="loop-dots">${dots}</div>
    <span style="color:${scoreCol}">${onTrack}/${metrics.length} on track</span>
    ${measured < metrics.length ? `<span>(${measured}/${metrics.length} measured)</span>` : ''}
  </div>`;
}

function loopScoreBadgeHTML(f) {
  const metrics = f.metrics || [];
  if (metrics.length === 0) return '';
  const onTrack  = metrics.filter(m => m.signal === 'on-track').length;
  const measured = metrics.filter(m => m.signal && m.signal !== 'not-yet-measured').length;
  const icon = onTrack === metrics.length && onTrack > 0 ? '🟢' : measured > 0 ? '🟡' : '⚪';
  return `<span class="loop-badge">${icon} ${onTrack}/${metrics.length} metrics</span>`;
}

function outcomesFeatureHTML(f) {
  const metrics       = f.metrics || [];
  const discoveryPath = `artefacts/${f.slug}/discovery.md`;
  const bmPath        = `artefacts/${f.slug}/benefit-metric.md`;
  return `
  <div class="outcome-feature">
    <div class="outcome-feature-header">
      <div>
        <div class="outcome-feature-name">${esc(f.name)}</div>
        ${f.problem ? `<div class="outcome-problem">${esc(f.problem)}</div>` : ''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap">
        <a class="drawer-link" href="${discoveryPath}">📄 Discovery</a>
        <a class="drawer-link" href="${bmPath}">📊 Benefit metric</a>
      </div>
    </div>
    ${metrics.length > 0
      ? `<div class="outcome-metrics">${metrics.map(m => metricRowHTML(m, f)).join('')}</div>`
      : `<div style="font-size:11px;color:var(--muted);padding:8px 0">No metrics seeded. Run <code>/benefit-metric</code> then add a <code>metrics</code> array to this feature in pipeline-state.json.</div>`}
    ${loopScoreHTML(f)}
  </div>`;
}

function renderOutcomes(features) {
  const ob = document.getElementById('outcomes-board');
  if (features.length === 0) {
    ob.innerHTML = '<div class="empty-state"><h2>No features match your filters</h2><p>Try clearing your filters to see all features.</p></div>';
    return;
  }
  ob.innerHTML = features.map(f => outcomesFeatureHTML(f)).join('');
}

function renderLibrary(features) {
  const board = document.getElementById('library-board');
  const metaCols = META_STAGES.map(stageId => ({
    id: stageId,
    label: stageLabel(stageId).replace('Meta: ', ''),
    items: features.filter(f => f.stage === stageId),
  }));
  const otherLibrary = features.filter(f => f.track === 'library' && !META_STAGES.includes(f.stage));
  if (otherLibrary.length > 0) {
    metaCols.push({ id: 'library-other', label: 'Other Library', items: otherLibrary });
  }

  const hasCards = metaCols.some(col => col.items.length > 0);
  if (!hasCards) {
    board.innerHTML = `
      <div class="empty-state" style="width:100%">
        <h2>No library-evolution cards in meta stages</h2>
        <p>When features are at <code>loop-design</code>, <code>token-optimization</code>, <code>org-mapping</code>, or <code>scale-pipeline</code>, they will appear here.</p>
      </div>`;
    return;
  }

  board.innerHTML = metaCols.map(col => `
    <div class="col" data-stage="${col.id}" style="width:${clampColWidth(columnUi.stageWidths[col.id] || columnUi.globalWidth)}px">
      <div class="col-header">
        <div class="col-header-main"><span class="col-header-title">${esc(col.label)}</span></div>
        <div class="col-tools">${col.items.length > 0 ? `<span class="col-count">${col.items.length}</span>` : ''}</div>
      </div>
      <div class="col-body">
        ${col.items.length > 0 ? col.items.map(f => featureCardHTML(f)).join('') : '<div style="color:var(--border);font-size:11px;padding:4px 0">—</div>'}
      </div>
    </div>`).join('');
}

function renderGovernance(features) {
  const board = document.getElementById('governance-board');
  if (features.length === 0) {
    board.innerHTML = '<div class="empty-state"><h2>No features match your filters</h2><p>Try clearing filters to inspect governance coverage.</p></div>';
    return;
  }

  const rowsUnfiltered = features.map(f => ({
    feature: f,
    gates: GOVERNANCE_GATES.map(g => ({ gate: g, status: gateStatus(f, g.id) })),
  }));

  const rows = governanceGateFilter
    ? rowsUnfiltered.filter(r => {
        const g = r.gates.find(x => x.gate.id === governanceGateFilter);
        return g && g.status.state === 'fail';
      })
    : rowsUnfiltered;

  const allStatuses = rowsUnfiltered.flatMap(r => r.gates.map(g => g.status.state));
  const passCount = allStatuses.filter(s => s === 'pass').length;
  const warnCount = allStatuses.filter(s => s === 'warn').length;
  const failCount = allStatuses.filter(s => s === 'fail').length;
  const gateFailCounts = GOVERNANCE_GATES.map(g => ({
    gate: g,
    count: rowsUnfiltered.filter(r => {
      const gr = r.gates.find(x => x.gate.id === g.id);
      return gr && gr.status.state === 'fail';
    }).length,
  }));

  // Pre-compute all complex HTML fragments as local variables.
  // RULE: never place IIFEs, block-body arrow functions, or nested template
  // literals inside ${} of the outer board.innerHTML template literal.
  // The JS parser chokes on the closing } of the block body and throws
  // "Unexpected token '}'". Always hoist complex logic to a named variable first.

  const skillsLoaded = GOVERNANCE_GATES.filter(g => skillLoaded(g.id)).length;
  const skillsTotal  = GOVERNANCE_GATES.length;
  let skillsBadgeHTML;
  if (skillsLoaded === skillsTotal) {
    skillsBadgeHTML = '<span class="skill-source-badge live">&#128196; ' + skillsLoaded + '/' + skillsTotal + ' skills live</span>';
  } else if (skillsLoaded > 0) {
    skillsBadgeHTML = '<span class="skill-source-badge partial">&#128196; ' + skillsLoaded + '/' + skillsTotal + ' skills live</span>';
  } else {
    skillsBadgeHTML = '<span class="skill-source-badge default" title="Open via VS Code Live Server or GitHub Pages to load live criteria from SKILL.md files">&#128203; default criteria (serve to load live)</span>';
  }

  const gateRefItemsHTML = GOVERNANCE_GATES.map(function(g) {
    const live = skillLoaded(g.id);
    const desc = skillCriteria(g.id) || g.criteria;
    const badge = live ? 'live' : 'default';
    return '<div class="gov-ref-item">'
      + '<div class="gov-ref-item-head">'
      + '<div class="name">' + esc(g.label) + '</div>'
      + '<span class="skill-source-badge ' + badge + '">' + badge + '</span>'
      + '</div>'
      + '<div class="skill">Skill ' + esc(g.skill) + '</div>'
      + '<div class="criteria">' + esc(desc) + '</div>'

function governanceRowHTML(feature, gateResults) {
  return `
    <tr>
      <td class="gov-feature-cell">
        <div class="gov-feature-name">${esc(feature.name)}</div>
        <div class="gov-feature-meta">${esc(feature.slug)} · ${esc(stageLabel(feature.stage))}</div>
      </td>
      ${gateResults.map(gr => `
        <td class="gov-cell">
          <span class="gov-status ${gr.status.state}${gr.status.policyEscalated ? ' policy' : ''}">${govStateIcon(gr.status.state)} ${esc(gr.status.label)}</span>
          ${gr.status.artefact ? `<a class="drawer-link gov-link" href="${esc(gr.status.artefact)}">artefact</a>` : ''}
        </td>`).join('')}
    </tr>`;
}

function govStateIcon(state) {
  if (state === 'pass') return '✓';
  if (state === 'warn') return '!';
  if (state === 'fail') return 'x';
  return '·';
}

function stageRank(stageId) {
  const i = PIPELINE_STAGE_ORDER.indexOf(stageId);
  return i >= 0 ? i : -1;
}

function hasReachedStage(feature, stageId) {
  return stageRank(feature.stage) >= stageRank(stageId) && stageRank(stageId) >= 0;
}

function isRegulatedFeature(feature) {
  return feature.complianceProfile === 'regulated' || feature.regulated === true;
}

function applyGovernancePolicy(feature, status) {
  if (!governanceStrictPolicy) return status;
  if (!isRegulatedFeature(feature)) return status;
  if (status.state !== 'warn') return status;
  return {
    ...status,
    state: 'fail',
    label: `${status.label} (policy)`,
    policyEscalated: true,
  };
}

function gateStatus(feature, gateId) {
  const stories = allStories(feature);
  const artefactFor = id => {
    const g = GOVERNANCE_GATES.find(x => x.id === id);
    return g ? g.artefact(feature) : '';
  };

  let status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };

  if (gateId === 'review') {
    if (stories.length === 0) status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
    else if (stories.some(s => (s.highFindings || 0) > 0)) status = { state: 'fail', label: 'HIGH findings', artefact: artefactFor(gateId) };
    else if (stories.every(s => s.reviewStatus === 'passed')) status = { state: 'pass', label: 'Passed', artefact: artefactFor(gateId) };
    else status = { state: 'warn', label: 'In progress', artefact: artefactFor(gateId) };
  }

  if (gateId === 'test-plan') {
    if (stories.length === 0) status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
    const written = stories.filter(s => s.testPlan && s.testPlan.status === 'written' && (s.testPlan.totalTests || 0) > 0).length;
    if (written === stories.length) status = { state: 'pass', label: 'Written', artefact: artefactFor(gateId) };
    else if (written > 0) status = { state: 'warn', label: 'Partial', artefact: artefactFor(gateId) };
    else status = { state: 'fail', label: 'Missing', artefact: artefactFor(gateId) };
  }

  if (gateId === 'definition-of-ready') {
    if (stories.length === 0) status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
    else if (stories.some(s => s.dorStatus === 'blocked')) status = { state: 'fail', label: 'Blocked', artefact: artefactFor(gateId) };
    else if (stories.every(s => s.dorStatus === 'signed-off')) status = { state: 'pass', label: 'Signed off', artefact: artefactFor(gateId) };
    else status = { state: 'warn', label: 'Pending', artefact: artefactFor(gateId) };
  }

  if (gateId === 'verify-completion') {
    if (stories.length === 0) status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
    else if (hasReachedStage(feature, 'branch-complete')) status = { state: 'pass', label: 'Verified', artefact: artefactFor(gateId) };
    else if (hasReachedStage(feature, 'verify-completion')) status = { state: 'warn', label: 'Running', artefact: artefactFor(gateId) };
    else status = { state: 'warn', label: 'Not started', artefact: artefactFor(gateId) };
  }

  if (gateId === 'definition-of-done') {
    if (stories.length === 0) status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
    else if (stories.every(s => s.dodStatus === 'complete')) status = { state: 'pass', label: 'Complete', artefact: artefactFor(gateId) };
    else if (hasReachedStage(feature, 'definition-of-done')) status = { state: 'warn', label: 'In progress', artefact: artefactFor(gateId) };
    else status = { state: 'warn', label: 'Not started', artefact: artefactFor(gateId) };
  }

  if (gateId === 'trace') {
    if (hasReachedStage(feature, 'trace')) status = { state: 'pass', label: 'Traced', artefact: artefactFor(gateId) };
    else if (hasReachedStage(feature, 'definition-of-done')) status = { state: 'warn', label: 'Pending', artefact: artefactFor(gateId) };
    else status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
  }

  if (gateId === 'release') {
    if (feature.stage === 'released') status = { state: 'pass', label: 'Released', artefact: artefactFor(gateId) };
    else if (feature.stage === 'release-pending') status = { state: 'warn', label: 'Pending', artefact: artefactFor(gateId) };
    else status = { state: 'na', label: 'N/A', artefact: artefactFor(gateId) };
  }

  return applyGovernancePolicy(feature, status);
}

function exportGovernanceCsv(features) {
  const rows = features.map(f => {
    const gateStatuses = GOVERNANCE_GATES.map(g => gateStatus(f, g.id));
    return { feature: f, gateStatuses };
  });

  const header = ['feature_slug', 'feature_name', 'track', 'team', 'stage', ...GOVERNANCE_GATES.map(g => `${g.id}_status`)];
  const lines = [header.join(',')];

  rows.forEach(r => {
    const values = [
      r.feature.slug,
      r.feature.name,
      r.feature.track || '',
      r.feature.team || '',
      r.feature.stage || '',
      ...r.gateStatuses.map(s => s.state),
    ].map(csvEscape);
    lines.push(values.join(','));
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'governance-matrix.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(value) {
  const s = String(value ?? '');
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}



function renderBoard(features) {
  const board = document.getElementById('board');

  if (features.length === 0) {
    board.innerHTML = `
      <div class="empty-state">
        <h2>${allData && allData.features.length > 0 ? 'No features match your filters' : 'Pipeline is empty'}</h2>
        <p>${allData && allData.features.length > 0
          ? 'Try clearing your filters to see all features.'
          : 'Run <code>/workflow</code> to begin, or add features to <code>pipeline-state.json</code>.'}</p>
      </div>`;
    return;
  }

  // Build a numeric index for each stage so we can determine past vs current.
  const stageIdx = {};
  STAGES.forEach((s, i) => { stageIdx[s.id] = i; });

  const coreStages = ['ideation','discovery','benefit-metric','definition','spike','review','test-plan',
    'definition-of-ready','branch-setup','implementation-plan','subagent-execution','implementation-review','verify-completion','branch-complete',
    'definition-of-done','release-pending','released'];
  const stagesToShow = STAGES.filter(s =>
    coreStages.includes(s.id) || features.some(f => boardStageId(f.stage) === s.id));

  if (pipelineLayout === 'loop-grouped') {
    board.classList.add('loop-grouped');
    const outerStages = stagesToShow.filter(s => loopType(s.id) === 'outer');
    const innerStages = stagesToShow.filter(s => loopType(s.id) === 'inner');
    const outerCards = features.filter(f => loopType(boardStageId(f.stage)) === 'outer').length;
    const innerCards = features.filter(f => loopType(boardStageId(f.stage)) === 'inner').length;
    board.innerHTML = `
      ${loopLaneHTML('outer', 'Outer loop', outerCards, outerStages, features, stageIdx)}
      ${loopLaneHTML('inner', 'Inner loop', innerCards, innerStages, features, stageIdx)}`;
    return;
  }

  board.classList.remove('loop-grouped');

  board.innerHTML = stagesToShow.map(s => {
    return renderStageColumn(s, features, stageIdx);
  }).join('');
}

function loopLaneHTML(kind, title, cardCount, stages, features, stageIdx) {
  const stageNames = stages.map(s => s.label).join(' -> ');
  return `
    <section class="loop-lane">
      <div class="loop-lane-header">
        <span class="loop-lane-title ${kind}">${title}</span>
        <span class="loop-lane-meta">${cardCount} card${cardCount !== 1 ? 's' : ''} · ${stages.length} stage${stages.length !== 1 ? 's' : ''} · ${stageNames}</span>
      </div>
      <div class="loop-lane-row">
        ${stages.map(s => renderStageColumn(s, features, stageIdx)).join('')}
      </div>
    </section>`;
}

function renderStageColumn(s, features, stageIdx) {
    const sIdx   = stageIdx[s.id] ?? 999;
    // Active: feature is currently AT this stage
    const active = features.filter(f => boardStageId(f.stage) === s.id);
    // Done:   feature has already passed THROUGH this stage
    const done   = features.filter(f => (stageIdx[boardStageId(f.stage)] ?? 999) > sIdx);
    const colWidth = resolveColumnWidth(s.id, active.length, done.length);
    const isEmptyCol = active.length === 0 && done.length === 0;

    const hasRed   = active.some(f => f.health === 'red');
    const hasAmber = active.some(f => f.health === 'amber');
    const loopCls = loopType(s.id) === 'inner' ? ' col-loop-inner' : ' col-loop-outer';
    const colCls   = active.length > 0
      ? 'col col-active' + loopCls + (hasRed ? ' has-red' : hasAmber ? ' has-amber' : '')
      : 'col' + loopCls;
    const isDoneOpen = openDoneSections.has(s.id);

    return `
    <div class="${colCls}${isEmptyCol ? ' col-empty' : ''}" data-stage="${s.id}" style="width:${colWidth}px">
      <div class="col-header">
        <div class="col-header-main">
          <span class="col-header-title">${s.label}</span>
        </div>
        <div class="col-tools">
          <button class="col-size-btn" data-action="narrow-col" data-stage="${s.id}" title="Narrow column">−</button>
          <button class="col-size-btn" data-action="widen-col" data-stage="${s.id}" title="Widen column">+</button>
          ${active.length > 0 ? `<span class="col-count">${active.length}</span>` : ''}
          ${done.length  > 0 ? `<span class="col-count-done">${done.length}✓</span>` : ''}
        </div>
      </div>
      <div class="col-body">
        ${active.map(f => featureCardHTML(f)).join('')}
        ${active.length === 0 && done.length === 0 ? '<div style="color:var(--border);font-size:11px;padding:4px 0">—</div>' : ''}
        ${done.length > 0 ? `
          <button class="done-section-toggle" data-action="toggle-done-section" data-stage="${s.id}">
            ${isDoneOpen ? '▾' : '▸'} ${done.length} completed
          </button>
          <div class="done-cards ${isDoneOpen ? 'open' : ''}">
            ${done.map(f => featureCardDoneHTML(f, s.id)).join('')}
          </div>` : ''}
      </div>
    </div>`;
}

function featureCardHTML(f) {
  const isOpen = openFeatures.has(f.slug);
  const epics  = f.epics || [];
  const allStories = epics.flatMap(e => e.stories || []);
  const action = featureActionMeta(f);
  const nextStage = getNextStage(f.stage);
  const advance = nextStage ? canAdvanceFeature(f, nextStage) : { ok: false, reason: 'No next stage' };
  const teamTag = f.team ? `<span class="tag">${esc(f.team)}</span>` : '';
  const blocker = f.blocker && f.health === 'red'
    ? `<div class="blocker-notice">🚫 ${esc(f.blocker)}</div>` : '';

  return `
  <div class="feature-card health-${f.health}" data-slug="${f.slug}">
    <div class="card-header" data-action="toggle-feature" data-slug="${f.slug}">
      <span class="card-toggle ${isOpen ? 'open' : ''}">▶</span>
      <span class="card-title">${esc(f.name)}</span>
      <span class="card-state-chip ${action.state}">${esc(action.label)}</span>
      <span class="card-track ${f.track}">${trackLabel(f.track)}</span>
    </div>
    <div class="card-body ${isOpen ? 'open' : ''}">
      ${blocker}
      <div class="next-action ${action.state}">
        <div class="next-action-row">
          <div><span class="label">Next</span>${esc(action.nextAction)}</div>
          <div class="next-action-controls">
            <span class="next-action-age">${formatAge(featureAgeMinutes(f))}</span>
            ${nextStage ? `<button class="next-action-btn" data-action="advance-feature" data-slug="${esc(f.slug)}" ${advance.ok ? '' : 'disabled'} title="${esc(advance.reason || '')}">Move to ${esc(stageLabel(nextStage))}</button>` : ''}
          </div>
        </div>
        ${nextStage && !advance.ok ? `<div class="next-action-warning">Guardrail: ${esc(advance.reason)}</div>` : ''}
      </div>
      <div class="meta">
        ${loopStageBadge(f.stage)}
        ${metaStageBadge(f.stage)}
        ${teamTag}
        <span class="tag ${f.health}">${healthEmoji(f.health)} ${f.health}</span>
        <span class="tag">${allStories.length} stor.</span>
        ${allStories.filter(s => s.releaseReady).length > 0
          ? `<span class="tag" style="color:var(--teal)">✓ ${allStories.filter(s=>s.releaseReady).length} rel-ready</span>` : ''}
        ${loopScoreBadgeHTML(f)}
      </div>
      ${epics.length > 0 ? `<div class="epic-list">${epics.map(e => epicRowHTML(f.slug, e)).join('')}</div>` : '<div style="font-size:11px;color:var(--muted)">No epics yet</div>'}
    </div>
  </div>`;
}

  'token-optimization':   f => [{ label: '💸 Token optimization', path: `artefacts/${f.slug}/token-optimization.md` }],

  const doneKey   = `done::${f.slug}::${stageId}`;

    <div class="card-body open">
      ${artefacts.length > 0

        : '<div style="font-size:11px;color:var(--muted)">No artefacts for this stage</div>'}

function epicRowHTML(featureSlug, epic) {
  const key    = `${featureSlug}::${epic.slug}`;
  const isOpen = openEpics.has(key);
  const stories = epic.stories || [];
  return `
  <div class="epic-row" data-epic-key="${key}">
    <div class="epic-row-header" data-action="toggle-epic" data-key="${key}">
      <span class="epic-toggle ${isOpen ? 'open' : ''}">▶</span>

      ${stories.length > 0 ? stories.map(s => storyRowHTML(featureSlug, epic.slug, s)).join('') : '<div style="font-size:11px;color:var(--muted);padding:2px 0">No stories</div>'}
    </div>
  </div>`;
}

function storyRowHTML(featureSlug, epicSlug, story) {
  const key    = `${featureSlug}::${epicSlug}::${story.slug}`;
  const isOpen = openStories.has(key);
  const acPct  = story.acTotal > 0 ? Math.round((story.acVerified / story.acTotal) * 100) : null;
  const testPct = story.testPlan && story.testPlan.totalTests > 0
    ? Math.round((story.testPlan.passing / story.testPlan.totalTests) * 100) : null;

  const pills = [
    story.reviewStatus === 'passed'       ? `<span class="pill ok">Review ✓</span>` :
    story.reviewStatus === 'has-findings' ? `<span class="pill ${story.highFindings > 0 ? 'fail' : 'warn'}">${story.highFindings || 0} HIGH</span>` :
                                            `<span class="pill none">Review —</span>`,

    story.dorStatus === 'signed-off'  ? `<span class="pill ok">DoR ✓</span>` :
    story.dorStatus === 'blocked'     ? `<span class="pill fail">DoR ✗</span>` :
                                        `<span class="pill none">DoR —</span>`,

    story.prStatus === 'merged'  ? `<span class="pill ok">PR merged</span>` :
    story.prStatus === 'open'    ? `<span class="pill warn">PR open</span>` :
    story.prStatus === 'draft'   ? `<span class="pill none">PR draft</span>` : '',

    story.dodStatus === 'complete' ? `<span class="pill ok">DoD ✓</span>` : '',
    story.releaseReady             ? `<span class="pill ok" style="color:var(--teal);border-color:rgba(20,184,166,.4)">Release ready</span>` : '',
  ].filter(Boolean).join('');

  return `
  <div class="story-row" data-story-key="${key}">
    <div class="story-row-top" data-action="open-story" data-story-key="${key}">
      <div class="story-health" style="background:${healthColour(story.health)}"></div>
      <span class="story-name">${esc(story.name)}</span>
      <span class="story-stage-badge">${stageLabel(story.stage)}</span>
    </div>
    ${taskListInlineHTML(story, key)}
  </div>`;
}

function openDrawer(featureSlug, epicSlug, storySlug) {

  const testPct = story.testPlan && story.testPlan.totalTests > 0
    ? Math.round((story.testPlan.passing / story.testPlan.totalTests) * 100) : null;

  const featureSlugPath = featureSlug;
  const storyPath = `artefacts/${featureSlugPath}/stories/${storySlug}.md`;
  const testPath  = `artefacts/${featureSlugPath}/test-plans/${storySlug}-test-plan.md`;
  const dorPath   = `artefacts/${featureSlugPath}/dor/${storySlug}-dor.md`;

  document.getElementById('drawer-content').innerHTML = `
    <h2>${esc(story.name)}</h2>
    <div class="drawer-stage">Stage: <strong>${stageLabel(story.stage)}</strong> &nbsp;·&nbsp; Health: <strong style="color:${healthColour(story.health)}">${healthEmoji(story.health)} ${story.health}</strong></div>

    ${story.health === 'red' && story.blocker ? `<div class="drawer-blocker">🚫 ${esc(story.blocker)}</div>` : ''}

    <div class="drawer-section">
      <h3>Progress</h3>
      ${acPct !== null ? `
      <div style="margin-bottom:8px">
        <div class="progress-label"><span>ACs verified</span><span>${story.acVerified}/${story.acTotal} (${acPct}%)</span></div>
        <div class="progress-bar" style="height:6px"><div class="progress-fill ${acPct<100?'partial':''}" style="width:${acPct}%"></div></div>
      </div>` : ''}
      ${testPct !== null ? `
      <div style="margin-bottom:8px">
        <div class="progress-label"><span>Tests passing</span><span>${story.testPlan.passing}/${story.testPlan.totalTests} (${testPct}%)</span></div>
        <div class="progress-bar" style="height:6px"><div class="progress-fill ${testPct<100?'partial':''}" style="width:${testPct}%"></div></div>
      </div>` : '<div style="font-size:11px;color:var(--muted)">No test plan yet</div>'}
    </div>

    ${story.tasks && story.tasks.length > 0 ? `
    <div class="drawer-section">
      <h3>TDD Tasks</h3>
      ${drawerTaskListHTML(story)}
    </div>` : ''}

    <div class="drawer-section">
      <h3>Gates</h3>
      <div class="drawer-row"><span class="label">Review</span><span>${reviewBadge(story)}</span></div>
      <div class="drawer-row"><span class="label">Def of Ready</span><span>${dorBadge(story)}</span></div>
      <div class="drawer-row"><span class="label">PR</span><span>${prBadge(story)}</span></div>
      <div class="drawer-row"><span class="label">Def of Done</span><span>${dodBadge(story)}</span></div>
    </div>

    <div class="drawer-section">
      <h3>Artefacts</h3>
      <div style="display:flex;flex-direction:column;gap:4px">
        <a class="drawer-link" href="${storyPath}">📄 Story artefact</a>
        <a class="drawer-link" href="${testPath}">🧪 Test plan</a>
        <a class="drawer-link" href="${dorPath}">✅ Definition of Ready</a>
        ${story.prUrl ? `<a class="drawer-link" href="${story.prUrl}" target="_blank">🔗 Pull request</a>` : ''}
      </div>
    </div>

    <div class="drawer-section">
      <h3>Context</h3>
      <div class="drawer-row"><span class="label">Feature</span><span>${esc(feature.name)}</span></div>
      <div class="drawer-row"><span class="label">Epic</span><span>${esc(epic.name)}</span></div>
      <div class="drawer-row"><span class="label">Track</span><span>${trackLabel(feature.track)}</span></div>
      ${feature.team ? `<div class="drawer-row"><span class="label">Team</span><span>${esc(feature.team)}</span></div>` : ''}

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

// ─────────────────────────────────────────────────────────────────────────────
// MARKDOWN VIEWER
// ─────────────────────────────────────────────────────────────────────────────
function draftStorageKey(path)    { return `pipeline-viz:draft:${path}`; }
function loadDraft(path)          { try { return localStorage.getItem(draftStorageKey(path)); } catch (_) { return null; } }
function saveDraft(path, text)    { try { localStorage.setItem(draftStorageKey(path), text); return true; } catch (_) { return false; } }
function clearDraft(path)         { try { localStorage.removeItem(draftStorageKey(path)); return true; } catch (_) { return false; } }

function renderMdStatus() {
  const statusEl = document.getElementById('md-status');
  if (!statusEl) return;
  if (!mdCurrentPath) { statusEl.textContent = ''; return; }
  const hasDraft = loadDraft(mdCurrentPath) !== null;
  const changed  = mdDraftText !== mdOriginalText;
  if (hasDraft && changed) { statusEl.textContent = 'Draft changed'; statusEl.style.color = 'var(--amber)'; return; }
  if (hasDraft)            { statusEl.textContent = 'Draft saved';   statusEl.style.color = 'var(--green)'; return; }
  statusEl.textContent = changed ? 'Unsaved' : 'Read only source';
  statusEl.style.color = changed ? 'var(--amber)' : 'var(--muted)';
}

function renderMdBody() {
  const contentEl  = document.getElementById('md-content');
  const editorEl   = document.getElementById('md-editor');
  const previewBtn = document.getElementById('md-tab-preview');
  const rawBtn     = document.getElementById('md-tab-raw');
  if (!contentEl || !editorEl || !previewBtn || !rawBtn) return;
  previewBtn.classList.toggle('active', mdMode === 'preview');
  rawBtn.classList.toggle('active',     mdMode === 'raw');
  contentEl.classList.toggle('active',  mdMode === 'preview');
  editorEl.classList.toggle('active',   mdMode === 'raw');
  editorEl.value = mdDraftText;
  const html = typeof marked !== 'undefined'
    ? marked.parse(mdDraftText || '')
    : `<pre style="white-space:pre-wrap;font-size:12px;line-height:1.6">${esc(mdDraftText || '')}</pre>`;
  contentEl.innerHTML = html;
  renderMdStatus();
}

async function openMdViewer(path) {
  mdCurrentPath = path;
  mdMode = 'preview';
  document.getElementById('md-title').textContent = path;
  document.getElementById('md-content').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">Loading…</div>';
  document.getElementById('md-editor').value = '';
  document.getElementById('md-overlay').classList.add('open');
  document.getElementById('md-pane').classList.add('open');
  try {
    const resp = await fetch(path + '?_=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — file not found`);
    const text = await resp.text();
    mdOriginalText = text;
    mdDraftText = loadDraft(path) ?? text;
    renderMdBody();
  } catch (e) {
    mdOriginalText = `<!-- Could not load source: ${e.message} -->`;
    mdDraftText = loadDraft(path) ?? mdOriginalText;
    renderMdBody();
    document.getElementById('md-content').innerHTML +=
      `<div style="color:var(--red);font-size:12px;margin-top:8px">Could not load source file: ${esc(e.message)}<br>Draft editing is still available locally.</div>`;
  }
}

function closeMdViewer() {
  document.getElementById('md-overlay').classList.remove('open');
  document.getElementById('md-pane').classList.remove('open');
  mdCurrentPath  = '';
  mdOriginalText = '';
  mdDraftText    = '';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// EVENT BINDING
// ─────────────────────────────────────────────────────────────────────────────
function handleBoardClick(e) {
    const toggleGovPolicy = e.target.closest('[data-action="toggle-gov-policy"]');
    if (toggleGovPolicy) {
      governanceStrictPolicy = !governanceStrictPolicy;
      render();
      return;
    }
    const filterGovGate = e.target.closest('[data-action="filter-gov-gate"]');
    if (filterGovGate) {
      const gate = filterGovGate.dataset.gate || '';
      governanceGateFilter = governanceGateFilter === gate ? '' : gate;
      render();
      return;
    }
    const clearGovFilter = e.target.closest('[data-action="clear-gov-filter"]');
    if (clearGovFilter) {
      governanceGateFilter = '';
      render();
      return;
    }
    const exportGovCsv = e.target.closest('[data-action="export-gov-csv"]');
    if (exportGovCsv) {
      exportGovernanceCsv(filteredFeatures());
      return;
    }
    const focusFeature = e.target.closest('[data-action="focus-feature"]');
    if (focusFeature) {
      focusFeatureBySlug(focusFeature.dataset.slug);
      return;
    }
    const advanceFeature = e.target.closest('[data-action="advance-feature"]');
    if (advanceFeature) {
      const slug = advanceFeature.dataset.slug;
      const feature = allData && allData.features ? allData.features.find(f => f.slug === slug) : null;
      if (!feature) return;
      const nextStage = getNextStage(feature.stage);
      if (!nextStage) return;
      const check = canAdvanceFeature(feature, nextStage);
      if (!check.ok) return;
      feature.stage = nextStage;
      feature.updatedAt = new Date().toISOString();
      isDirty = true;
      const dl = document.getElementById('download-btn');
      dl.classList.add('dirty');
      dl.title = 'Unsaved changes — click to download updated pipeline-state.json';
      render();
      return;
    }
    const narrowCol = e.target.closest('[data-action="narrow-col"]');
    if (narrowCol) {
      resizeStageColumn(narrowCol.dataset.stage, -COL_STEP);
      render();
      return;
    }
    const widenCol = e.target.closest('[data-action="widen-col"]');
    if (widenCol) {
      resizeStageColumn(widenCol.dataset.stage, COL_STEP);
      render();
      return;
    }
    const featureToggle = e.target.closest('[data-action="toggle-feature"]');
    if (featureToggle) {
      const slug = featureToggle.dataset.slug;
      openFeatures.has(slug) ? openFeatures.delete(slug) : openFeatures.add(slug);
      render(); return;
    }
    const epicToggle = e.target.closest('[data-action="toggle-epic"]');
    if (epicToggle) {
      const key = epicToggle.dataset.key;
      openEpics.has(key) ? openEpics.delete(key) : openEpics.add(key);
      render(); return;
    }
    const taskToggle = e.target.closest('[data-action="toggle-tasks"]');
    if (taskToggle) {
      const key = taskToggle.dataset.taskKey;
      openTaskLists.has(key) ? openTaskLists.delete(key) : openTaskLists.add(key);
      render(); return;
    }
    const doneToggle = e.target.closest('[data-action="toggle-done"]');
    if (doneToggle) {
      const key = doneToggle.dataset.doneKey;
      openFeatures.has(key) ? openFeatures.delete(key) : openFeatures.add(key);
      render(); return;
    }
    const doneSectionToggle = e.target.closest('[data-action="toggle-done-section"]');
    if (doneSectionToggle) {
      const stage = doneSectionToggle.dataset.stage;
      openDoneSections.has(stage) ? openDoneSections.delete(stage) : openDoneSections.add(stage);
      render(); return;
    }
    const storyRow = e.target.closest('[data-action="open-story"]');
    if (storyRow && !e.target.closest('[data-action="toggle-tasks"]')) {
      const [fSlug, eSlug, sSlug] = storyRow.dataset.storyKey.split('::');
      openDrawer(fSlug, eSlug, sSlug);
    }
}

  document.getElementById('md-save-draft').addEventListener('click', () => {
