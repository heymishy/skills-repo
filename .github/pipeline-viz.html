  // Outcomes board — metric edit/save/cancel
  document.getElementById('outcomes-board').addEventListener('click', e => {
    const editBtn = e.target.closest('[data-action="edit-metric"]');
    if (editBtn) {
      editingMetric = { featureSlug: editBtn.dataset.feature, metricId: editBtn.dataset.metric };
      renderOutcomes(filteredFeatures()); return;
    }
    const saveBtn = e.target.closest('[data-action="save-metric"]');
    if (saveBtn) {
      const fSlug = saveBtn.dataset.feature;
      const mId   = saveBtn.dataset.metric;
      const signal   = document.getElementById(`edit-signal-${mId}`).value;
      const evidence = document.getElementById(`edit-evidence-${mId}`).value.trim() || null;
      const dateMeasured = document.getElementById(`edit-date-${mId}`).value || null;
      const feat = allData.features.find(f => f.slug === fSlug);

      openMdViewer(link.getAttribute('href'));
    }
  });
}

function downloadState() {
  if (!allData) return;
  const updated = { ...allData, updated: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(updated, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'pipeline-state.json';
  a.click();
  URL.revokeObjectURL(url);
  isDirty = false;
  document.getElementById('download-btn').classList.remove('dirty');
  document.getElementById('download-btn').title = 'Download current state as pipeline-state.json';
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') {
    if (document.getElementById('md-overlay').classList.contains('open')) { closeMdViewer(); }
    else { closeDrawer(); }
    return;
  }
  if (e.key === 'e') { document.getElementById('expand-all-btn').click(); return; }
  if (e.key === 'c') { document.getElementById('collapse-all-btn').click(); return; }
  if (e.key === 'g') { document.getElementById('toggle-loop-group-btn').click(); return; }
  if (e.key === 'v') { document.getElementById('governance-btn').click(); return; }
  if (e.key === 'o') { document.getElementById('outcomes-btn').click(); return; }
  if (e.key === 'l') { document.getElementById('library-btn').click(); return; }
  if (e.key === '[') {
    columnUi.globalWidth = clampColWidth(columnUi.globalWidth - COL_STEP);
    updateColumnWidthUi();
    render();
    return;
  }
  if (e.key === ']') {
    columnUi.globalWidth = clampColWidth(columnUi.globalWidth + COL_STEP);
    updateColumnWidthUi();
    render();
    return;
  }
  if (e.key === '0') {
    resetColumnSizing();
    render();
    return;
  }
  if (e.key === 'f') { document.getElementById('filter-search').focus(); e.preventDefault(); }
});

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function healthColour(h) { return h==='red' ? 'var(--red)' : h==='amber' ? 'var(--amber)' : 'var(--green)'; }
function healthEmoji(h)  { return h==='red' ? '🔴' : h==='amber' ? '🟡' : '🟢'; }
function trackLabel(t) {
  if (t === 'short') return 'Short';
  if (t === 'standard') return 'Std';
  if (t === 'programme-workstream') return 'Prog';
  if (t === 'library') return 'Library';
  return t ? t : 'Std';
}

function hasHighFindings(feature) {
  const stories = allStories(feature);
  return stories.some(s => (s.highFindings || 0) > 0);
}

function isReleaseReady(feature) {
  const stories = allStories(feature);
  return stories.length > 0 && stories.every(s => s.releaseReady || s.dodStatus === 'complete' || s.prStatus === 'merged');
}

function allStories(feature) {
  return (feature.epics || []).flatMap(e => e.stories || []);
}

function featureTimestamp(feature) {
  return feature.updatedAt || feature.updated || (allData ? allData.updated : null) || null;
}

function featureAgeMinutes(feature) {
  const ts = featureTimestamp(feature);
  if (!ts) return 0;
  const then = new Date(ts).getTime();
  if (!Number.isFinite(then)) return 0;
  return Math.max(0, Math.floor((Date.now() - then) / 60000));
}

function formatAge(minutes) {
  if (minutes < 60) return `${minutes}m`;
  if (minutes < 1440) return `${Math.floor(minutes / 60)}h ${minutes % 60}m`;
  return `${Math.floor(minutes / 1440)}d ${Math.floor((minutes % 1440) / 60)}h`;
}

function getNextStage(stage) {
  const order = [
    'ideation', 'discovery', 'benefit-metric', 'definition', 'spike', 'review', 'test-plan',
    'definition-of-ready', 'branch-setup', 'implementation-plan', 'subagent-execution',
    'implementation-review', 'verify-completion', 'branch-complete', 'definition-of-done',
    'trace', 'release-pending', 'released'
  ];
  const i = order.indexOf(stage);
  return i >= 0 && i < order.length - 1 ? order[i + 1] : null;
}

function canAdvanceFeature(feature, nextStage) {
  if (!feature) return { ok: false, reason: 'Feature not found' };
  if (feature.health === 'red' || feature.stage === 'stalled') return { ok: false, reason: 'Resolve blocker first' };

  const stage = feature.stage;
  const stories = allStories(feature);

  if (stage === 'review' && hasHighFindings(feature)) {
    return { ok: false, reason: 'HIGH findings must be cleared before test planning' };
  }
  if (stage === 'definition-of-ready') {
    const allSigned = stories.length > 0 && stories.every(s => s.dorStatus === 'signed-off');
    if (!allSigned) return { ok: false, reason: 'All stories must be DoR signed-off' };
  }
  if (stage === 'implementation-review') {
    const hasReviewHigh = stories.some(s => (s.highFindings || 0) > 0);
    if (hasReviewHigh) return { ok: false, reason: 'Implementation/review HIGH findings still present' };
  }
  if (stage === 'release-pending' && !isReleaseReady(feature)) {
    return { ok: false, reason: 'Not all stories are release ready' };
  }
  if (nextStage === 'released' && stage !== 'release-pending') {
    return { ok: false, reason: 'Release can only follow release-pending' };
  }
  return { ok: true, reason: '' };
}

function focusFeatureBySlug(slug) {
  if (!slug || !allData || !allData.features) return;
  const feature = allData.features.find(f => f.slug === slug);
  if (!feature) return;
  if (!openFeatures.has(slug)) openFeatures.add(slug);
  render();
  setTimeout(() => {
    const el = document.querySelector(`.feature-card[data-slug="${slug}"]`);
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
  }, 0);
}

function featureActionMeta(feature) {
  if (feature.health === 'red' || feature.stage === 'stalled') {
    return {
      state: 'blocked',
      label: 'Blocked',
      nextAction: feature.blocker ? `Unblock: ${feature.blocker}` : 'Resolve blocker and update stage',
    };
  }

  const stage = feature.stage;
  if (stage === 'released') {
    return { state: 'done', label: 'Done', nextAction: 'No action needed' };
  }

  if (stage === 'review' && hasHighFindings(feature)) {
    return { state: 'human', label: 'Needs human', nextAction: 'Address HIGH findings and rerun /review' };
  }

  if (stage === 'release-pending' && isReleaseReady(feature)) {
    return { state: 'human', label: 'Needs human', nextAction: 'Run /release and complete deployment checklist' };
  }

  const processingStageActions = {
    'branch-setup': 'Branch/worktree setup in progress',
    'implementation-plan': 'Implementation planning in progress',
    'subagent-execution': 'Subagent task execution in progress',
    'verify-completion': 'Verification checks running',
  };
  if (processingStageActions[stage]) {
    const stale = featureAgeMinutes(feature) >= PROCESSING_STALE_MINUTES;
    return {
      state: 'processing',
      label: stale ? 'Stale proc' : 'Processing',
      nextAction: stale ? `No update for ${formatAge(featureAgeMinutes(feature))}. Check run status / blockers.` : processingStageActions[stage],
    };
  }

  const humanStageActions = {
    'ideation': 'Capture idea and decide whether to run /discovery',
    'discovery': 'Complete discovery artefact and get approval',
    'benefit-metric': 'Define measurable outcomes via /benefit-metric',
    'definition': 'Break into epics/stories via /definition',
    'spike': 'Run/close spike with PROCEED, REDESIGN, or DEFER',
    'test-plan': 'Write failing tests via /test-plan',
    'definition-of-ready': 'Complete DoR checks and sign off',
    'implementation-review': 'Review implementation findings and decide fixes',
    'branch-complete': 'Choose branch completion option (draft PR/merge/keep/discard)',
    'definition-of-done': 'Validate post-merge completion evidence',
    'trace': 'Run traceability check and resolve chain gaps',
    'release-pending': 'Prepare and run /release',
    'loop-design': 'Refine outer/inner operating model',
    'token-optimization': 'Update routing/token policy and rollout plan',
    'org-mapping': 'Update organization stage mappings and approvals',
    'scale-pipeline': 'Advance scaling decisions and operating model',
  };

  return {
    state: 'human',
    label: 'Needs human',
    nextAction: humanStageActions[stage] || `Review stage '${stage}' and decide next skill`,
  };
}

function loopType(stageId) {
  if (META_STAGES.includes(stageId)) return 'library';
  if (INNER_LOOP_STAGES.has(stageId)) return 'inner';
  return 'outer';
}

function loopStageBadge(stageId) {
  const kind = loopType(stageId);
  if (kind === 'inner') return '<span class="tag loop-inner">Inner loop</span>';
  if (kind === 'library') return '<span class="tag loop-library">Library evolution</span>';
  return '<span class="tag loop-outer">Outer loop</span>';
}

const META_STAGE_MAP = {
  'loop-design': 'ideation',
  'token-optimization': 'ideation',
  'org-mapping': 'ideation',
  'scale-pipeline': 'ideation',
};

function boardStageId(id) {
  return META_STAGE_MAP[id] || id;
}

function stageLabel(id) {
  const s = STAGES.find(x => x.id === id);
  if (s) return s.label;
  if (id === 'loop-design') return 'Meta: Loop Design';
  if (id === 'token-optimization') return 'Meta: Token Opt';
  if (id === 'org-mapping') return 'Meta: Org Mapping';
  if (id === 'scale-pipeline') return 'Meta: Scale Pipeline';
  return id;
}

function metaStageBadge(stageId) {
  if (!META_STAGE_MAP[stageId]) return '';
  return `<span class="tag" style="color:var(--purple)">Meta: ${stageLabel(stageId).replace('Meta: ','')}</span>`;
}

function reviewBadge(s) {
  if (s.reviewStatus === 'passed')       return `<span style="color:var(--green)">✓ Passed</span>`;
  if (s.reviewStatus === 'has-findings') return `<span style="color:${s.highFindings>0?'var(--red)':'var(--amber)'}">${s.highFindings||0} HIGH finding${s.highFindings!==1?'s':''}</span>`;
  return `<span style="color:var(--muted)">Not started</span>`;
}
function dorBadge(s) {
  if (s.dorStatus === 'signed-off') return `<span style="color:var(--green)">✓ Signed off</span>`;
  if (s.dorStatus === 'blocked')    return `<span style="color:var(--red)">✗ Blocked</span>`;
  return `<span style="color:var(--muted)">Not started</span>`;
}
function prBadge(s) {
  if (!s.prStatus || s.prStatus === 'none') return `<span style="color:var(--muted)">None</span>`;
  const col = s.prStatus==='merged' ? 'var(--green)' : s.prStatus==='open' ? 'var(--amber)' : 'var(--muted)';
  const link = s.prUrl ? ` — <a class="drawer-link" href="${esc(s.prUrl)}" target="_blank">open ↗</a>` : '';
  return `<span style="color:${col}">${s.prStatus}${link}</span>`;
}
function dodBadge(s) {
  if (s.dodStatus === 'complete') return `<span style="color:var(--green)">✓ Complete</span>`;
  return `<span style="color:var(--muted)">Not started</span>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// TDD TASK HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const TDD_META = {
  'not-started': { cls: 'tdd-not-started', label: '—' },
  'red':         { cls: 'tdd-red',         label: 'RED' },
  'green':       { cls: 'tdd-green',       label: 'GREEN' },
  'refactor':    { cls: 'tdd-refactor',    label: 'REFACTOR' },
  'committed':   { cls: 'tdd-committed',   label: '✓ done' },
};

function tddBadgeHTML(state, extraCls = 'tdd-badge') {
  const m = TDD_META[state] || TDD_META['not-started'];
  return `<span class="${extraCls} ${m.cls}">${m.label}</span>`;
}

function taskCommittedPct(story) {
  if (!story.tasks || story.tasks.length === 0) return null;
  const done = story.tasks.filter(t => t.tddState === 'committed').length;
  return { done, total: story.tasks.length, pct: Math.round((done / story.tasks.length) * 100) };
}

function taskMiniBarHTML(story) {
  const tp = taskCommittedPct(story);
  if (!tp) return '';
  const col = tp.done === tp.total ? 'var(--teal)' : tp.done > 0 ? 'var(--green)' : 'var(--border)';
  return `
  <div class="task-mini-bar">
    <div class="progress-label"><span style="font-size:9px">Tasks</span><span style="font-size:9px">${tp.done}/${tp.total}</span></div>
    <div class="progress-bar"><div style="height:100%;border-radius:2px;width:${tp.pct}%;background:${col};transition:width .3s"></div></div>
  </div>`;
}

function taskListInlineHTML(story, storyKey) {
  if (!story.tasks || story.tasks.length === 0) return '';
  const isOpen  = openTaskLists.has(storyKey);
  const tp      = taskCommittedPct(story);
  const items   = story.tasks.map(t => `
    <div class="task-item">
      ${tddBadgeHTML(t.tddState || 'not-started')}
      ${t.file
        ? `<a class="task-name task-link" href="${t.file}">${esc(t.name)}</a>`
        : `<span class="task-name">${esc(t.name)}</span>`}
    </div>`).join('');
  return `
  ${taskMiniBarHTML(story)}
  <button class="task-toggle-btn" data-action="toggle-tasks" data-task-key="${storyKey}">
    <span class="task-toggle-arrow ${isOpen ? 'open' : ''}">▶</span>
    <span>${tp ? tp.done + '/' + tp.total : story.tasks.length} task${story.tasks.length !== 1 ? 's' : ''}</span>
  </button>
  <div class="task-list-inline ${isOpen ? 'open' : ''}">${items}</div>`;
}

function drawerTaskListHTML(story) {
  if (!story.tasks || story.tasks.length === 0) return '<div style="font-size:11px;color:var(--muted)">No tasks defined yet. Add a <code>tasks</code> array to this story in pipeline-state.json.</div>';
  const tp = taskCommittedPct(story);
  const items = story.tasks.map((t, i) => `
    <div class="drawer-task-item">
      <span class="drawer-task-num">${i + 1}.</span>
      ${t.file
        ? `<a class="drawer-task-name task-link" href="${t.file}">${esc(t.name)}</a>`
        : `<span class="drawer-task-name">${esc(t.name)}</span>`}
      ${tddBadgeHTML(t.tddState || 'not-started', 'tdd-badge drawer-tdd-badge')}
    </div>`).join('');
  return `
  ${tp ? `
  <div style="margin-bottom:10px">
    <div class="progress-label"><span>Tasks committed</span><span>${tp.done}/${tp.total} (${tp.pct}%)</span></div>
    <div class="progress-bar" style="height:6px"><div style="height:100%;border-radius:3px;width:${tp.pct}%;background:${tp.done===tp.total ? 'var(--teal)' : 'var(--green)'};transition:width .3s"></div></div>
  </div>` : ''}
  ${items}`;
}

function updateTimestamp() {
  const el = document.getElementById('last-updated');
  if (allData && allData.updated) {
    const d = new Date(allData.updated);
    el.textContent = `Updated ${d.toLocaleString()}`;
  } else {
    el.textContent = '';
  }
}

function clampColWidth(w) {
  return Math.max(COL_MIN, Math.min(COL_MAX, w));
}

function resolveColumnWidth(stageId, activeCount, doneCount) {
  const base = clampColWidth(columnUi.stageWidths[stageId] || columnUi.globalWidth);
  if (!columnUi.autoShrinkEmpty) return base;
  if (activeCount === 0 && doneCount === 0) return Math.max(96, Math.round(base * 0.48));
  if (activeCount === 0 && doneCount > 0) return Math.max(120, Math.round(base * 0.72));
  return base;
}

function resizeStageColumn(stageId, delta) {
  const current = clampColWidth(columnUi.stageWidths[stageId] || columnUi.globalWidth);
  columnUi.stageWidths[stageId] = clampColWidth(current + delta);
}

function updateColumnWidthUi() {
  const slider = document.getElementById('column-width-slider');
  const label  = document.getElementById('column-width-label');
  if (slider) slider.value = String(columnUi.globalWidth);
  if (label) label.textContent = `${columnUi.globalWidth}px`;
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('governance-btn').classList.toggle('active', viewMode === 'governance');
  document.getElementById('outcomes-btn').classList.toggle('active', viewMode === 'outcomes');
  document.getElementById('library-btn').classList.toggle('active', viewMode === 'library');
  render();
}

function updatePipelineLayoutUi() {
  const btn = document.getElementById('toggle-loop-group-btn');
  if (!btn) return;
  btn.classList.toggle('active', pipelineLayout === 'loop-grouped');
  btn.textContent = pipelineLayout === 'loop-grouped' ? 'Flat flow' : 'Loop grouped';
}

function resetColumnSizing() {
  columnUi.globalWidth = 220;
  columnUi.stageWidths = {};
  columnUi.autoShrinkEmpty = true;
  const autoBtn = document.getElementById('toggle-empty-shrink-btn');
  if (autoBtn) autoBtn.classList.add('active');
  updateColumnWidthUi();
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTO-POLL  (only while a pipeline is actively running)
// ─────────────────────────────────────────────────────────────────────────────
const ACTIVE_STAGES = new Set([
  'branch-setup', 'implementation-plan', 'subagent-execution', 'verify-completion'
]);

function hasActiveFeature() {
  if (!allData || !allData.features) return false;
  return allData.features.some(f => ACTIVE_STAGES.has(f.stage));
}

let _pollTimer = null;
let _pollLastTs = null;

async function pollState() {
  if (!hasActiveFeature()) {
    clearInterval(_pollTimer);
    _pollTimer = null;
    return;
  }
  try {
    const resp = await fetch(STATE_FILE + '?_=' + Date.now());
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.updated && data.updated !== _pollLastTs) {
      _pollLastTs = data.updated;
      allData = normalizeData(data);
      render();
    }
  } catch (e) { /* file:// or server unavailable — silently ignore */ }
}

function startPollingIfActive() {
  if (_pollTimer || !hasActiveFeature()) return;
  _pollLastTs = allData && allData.updated ? allData.updated : null;
  _pollTimer = setInterval(pollState, 10000);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
initFilters();
updateColumnWidthUi();
updatePipelineLayoutUi();
loadState().then(startPollingIfActive);
</script>
