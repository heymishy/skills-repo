name: Watermark Gate

# Diagnostic nudge: harmless comment added to test whether editing a workflow
# file itself (re-parsed/re-registered by GitHub on push) can retrigger CI
# after the GitHub Actions app's check-suite auto-trigger stopped firing.
on:
  pull_request:
    branches: [main, master]

jobs:
  watermark-gate:
    name: Watermark gate — eval regression detection
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run watermark gate
        id: watermark-gate
        run: node .github/scripts/watermark-gate.js
