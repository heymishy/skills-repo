name: Assurance Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assurance-gate:
    name: Run assurance gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Skip if trace-only commit
        id: precheck
        run: |
          msg="${{ github.event.pull_request.head.commit.message }}"
          if echo "$msg" | grep -qF '[assurance-trace]'; then
            echo "Trace-only commit — gate already passed on previous commit. Exiting."
            echo "trace_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "trace_only=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.precheck.outputs.trace_only != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.precheck.outputs.trace_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run assurance gate
        if: steps.precheck.outputs.trace_only != 'true'
        id: gate
        env:
          TRIGGER: ci
        run: node .github/scripts/run-assurance-gate.js

      - name: Commit trace file
        if: steps.precheck.outputs.trace_only != 'true'
        run: |
          echo "Working directory: $(pwd)"
          echo "Traces directory contents:"
          ls -la workspace/traces/ || echo "traces dir not found"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f workspace/traces/
          git status
          git diff --staged --quiet || git commit -m "chore: assurance gate trace [assurance-trace]"
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}

      - name: Post verdict to PR
        if: steps.precheck.outputs.trace_only != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            const tracesDir = 'workspace/traces';
            let verdict   = 'unknown';
            let traceHash = 'unknown';

            if (fs.existsSync(tracesDir)) {
              const files = fs.readdirSync(tracesDir)
                .filter(f => f.endsWith('.jsonl') && f.includes('-ci-'))
                .sort().reverse();

              if (files.length > 0) {
                const lines = fs.readFileSync(path.join(tracesDir, files[0]), 'utf8')
                  .trim().split('\n').filter(Boolean);
                const completed = lines.map(l => JSON.parse(l)).find(e => e.status === 'completed');
                if (completed) {
                  verdict   = completed.verdict;
                  traceHash = completed.traceHash;
                }
              }
            }

            const icon = verdict === 'pass' ? '\u2705' : '\u274c';
            const body = [
              '## Assurance Gate ' + icon,
              '',
              '**Verdict:** ' + verdict,
              '**Trace hash:** `' + traceHash + '`',
              '**Commit:** `' + context.sha + '`',
              '**Trigger:** CI (pull_request)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
