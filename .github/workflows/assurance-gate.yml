name: Assurance Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assurance-gate:
    name: Run assurance gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive regulated flag from pipeline-state
        id: regulated
        run: |
          PR_NUM=$(echo "$GITHUB_REF" | sed 's|refs/pull/\([0-9]*\)/.*|\1|')
          PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUM}"
          REGULATED=$(node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('.github/pipeline-state.json', 'utf8'));
            const prUrl = process.argv[1];
            let regulated = false;
            (state.features || []).forEach(function(f) {
              (f.stories || []).forEach(function(s) {
                if (s.prUrl === prUrl && s.regulated === true) regulated = true;
              });
            });
            console.log(regulated ? 'true' : 'false');
          " "$PR_URL")
          echo "regulated=${REGULATED}" >> "$GITHUB_OUTPUT"
          echo "Regulated flag for PR #${PR_NUM}: ${REGULATED}"

      - name: Run assurance gate
        id: gate
        env:
          TRIGGER: ci
          REGULATED: ${{ steps.regulated.outputs.regulated }}
        run: node .github/scripts/run-assurance-gate.js

      - name: Upload trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assurance-trace
          path: workspace/traces/
          retention-days: 7

      - name: Post verdict to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            const tracesDir = 'workspace/traces';
            let verdict   = 'unknown';
            let traceHash = 'unknown';

            if (fs.existsSync(tracesDir)) {
              const files = fs.readdirSync(tracesDir)
                .filter(f => f.endsWith('.jsonl') && f.includes('-ci-'))
                .sort().reverse();

              if (files.length > 0) {
                const lines = fs.readFileSync(path.join(tracesDir, files[0]), 'utf8')
                  .trim().split('\n').filter(Boolean);
                const completed = lines.map(l => JSON.parse(l)).find(e => e.status === 'completed');
                if (completed) {
                  verdict   = completed.verdict;
                  traceHash = completed.traceHash;
                }
              }
            }

            const icon = verdict === 'pass' ? '\u2705' : '\u274c';
            const body = [
              '## Assurance Gate ' + icon,
              '',
              '**Verdict:** ' + verdict,
              '**Trace hash:** `' + traceHash + '`',
              '**Commit:** `' + context.sha + '`',
              '**Trigger:** CI (pull_request)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
