name: Assurance Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assurance-gate:
    name: Run assurance gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive regulated flag from pipeline-state
        id: regulated
        run: |
          PR_NUM=$(echo "$GITHUB_REF" | sed 's|refs/pull/\([0-9]*\)/.*|\1|')
          PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUM}"
          REGULATED=$(node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('.github/pipeline-state.json', 'utf8'));
            const prUrl = process.argv[1];
            let regulated = false;
            (state.features || []).forEach(function(f) {
              (f.stories || []).forEach(function(s) {
                if (s.prUrl === prUrl && s.regulated === true) regulated = true;
              });
            });
            console.log(regulated ? 'true' : 'false');
          " "$PR_URL")
          echo "regulated=${REGULATED}" >> "$GITHUB_OUTPUT"
          echo "Regulated flag for PR #${PR_NUM}: ${REGULATED}"

      - name: Run assurance gate
        id: gate
        env:
          TRIGGER: ci
          REGULATED: ${{ steps.regulated.outputs.regulated }}
        run: node .github/scripts/run-assurance-gate.js

      - name: Read ci-artefact-attachment config
        id: ci_attach_cfg
        run: |
          CI_ATTACHMENT=false
          CI_PLATFORM=github-actions
          FEATURE_SLUG_OVERRIDE=""
          if [ -f ".github/context.yml" ]; then
            CI_ATTACHMENT=$(yq e '.audit.ci_attachment // false' .github/context.yml 2>/dev/null || echo "false")
            CI_PLATFORM=$(yq e '.audit.ci_platform // "github-actions"' .github/context.yml 2>/dev/null || echo "github-actions")
            FEATURE_SLUG_OVERRIDE=$(yq e '.audit.feature_slug // ""' .github/context.yml 2>/dev/null || echo "")
          fi
          echo "ci_attachment=${CI_ATTACHMENT}" >> "$GITHUB_OUTPUT"
          echo "ci_platform=${CI_PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "feature_slug_override=${FEATURE_SLUG_OVERRIDE}" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        id: test_suite
        if: steps.ci_attach_cfg.outputs.ci_attachment == 'true'
        continue-on-error: true
        run: |
          npm test 2>&1 | tee .ci-test-results.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assurance-trace
          path: workspace/traces/
          retention-days: 7

      - name: Post verdict to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            const tracesDir = 'workspace/traces';
            let verdict   = 'unknown';
            let traceHash = 'unknown';

            if (fs.existsSync(tracesDir)) {
              const files = fs.readdirSync(tracesDir)
                .filter(f => f.endsWith('.jsonl') && f.includes('-ci-'))
                .sort().reverse();

              if (files.length > 0) {
                const lines = fs.readFileSync(path.join(tracesDir, files[0]), 'utf8')
                  .trim().split('\n').filter(Boolean);
                const completed = lines.map(l => JSON.parse(l)).find(e => e.status === 'completed');
                if (completed) {
                  verdict   = completed.verdict;
                  traceHash = completed.traceHash;
                }
              }
            }

            const icon = verdict === 'pass' ? '\u2705' : '\u274c';
            const body = [
              '## Assurance Gate ' + icon,
              '',
              '**Verdict:** ' + verdict,
              '**Trace hash:** `' + traceHash + '`',
              '**Commit:** `' + context.sha + '`',
              '**Trigger:** CI (pull_request)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Resolve active feature for artefact collection
        id: resolve_feature
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          OVERRIDE='${{ steps.ci_attach_cfg.outputs.feature_slug_override }}'
          if [ -n "${OVERRIDE}" ]; then
            echo "slug=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "slug_source=override" >> "$GITHUB_OUTPUT"
            echo "[resolve_feature] Using explicit override: ${OVERRIDE}"
          else
            PR_SLUG=$(node scripts/extract-pr-slug.js 2>/dev/null || echo "")
            if [ -n "${PR_SLUG}" ]; then
              echo "slug=${PR_SLUG}" >> "$GITHUB_OUTPUT"
              echo "slug_source=pr-body" >> "$GITHUB_OUTPUT"
              echo "[resolve_feature] Extracted from PR body: ${PR_SLUG}"
            else
              FEATURE_SLUG=$(node -e "
                const s = require('./.github/pipeline-state.json');
                const DONE = new Set(['archived','definition-of-done','released']);
                const inProgress = s.features.filter(f => !DONE.has(f.stage));
                const pick = inProgress.length > 0
                  ? inProgress[inProgress.length - 1]
                  : s.features.filter(f => f.stage !== 'archived').slice(-1)[0];
                process.stdout.write(pick ? pick.slug : '');
              " 2>/dev/null || echo "")
              echo "slug=${FEATURE_SLUG}" >> "$GITHUB_OUTPUT"
              echo "slug_source=auto-resolved" >> "$GITHUB_OUTPUT"
              echo "[resolve_feature] Auto-resolved: ${FEATURE_SLUG}"
            fi
          fi

      - name: Collect governed artefacts
        id: collect
        if: steps.ci_attach_cfg.outputs.ci_attachment == 'true' && steps.resolve_feature.outputs.slug != ''
        run: node scripts/trace-report.js --collect --feature ${{ steps.resolve_feature.outputs.slug }}

      - name: Upload governed artefact bundle
        id: upload_bundle
        if: steps.ci_attach_cfg.outputs.ci_attachment == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: governed-artefacts-${{ github.run_id }}
          path: .ci-artefact-staging/
          retention-days: 7

      - name: Post governed artefact chain comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs     = require('fs');
            const path   = require('path');
            const crypto = require('crypto');

            const { loadPipelineStories, classifyArtefact, parseACs, buildAuditComment } = require('./scripts/ci-audit-comment.js');
            const { buildSlugSourceNote, extractStorySlug, buildDispatchNote } = require('./scripts/extract-pr-slug.js');

            // ── Resolved metadata ──
            const artifactName = `governed-artefacts-${{ github.run_id }}`;
            const runUrl       = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
            const repoUrl      = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            // For pull_request events context.sha is the ephemeral merge commit — use head SHA for real blob URLs
            const headSha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : context.sha;
            const shortSha   = headSha.slice(0, 7);
            const slug       = '${{ steps.resolve_feature.outputs.slug }}';
            const slugSource = '${{ steps.resolve_feature.outputs.slug_source }}';
            const sourceNote = buildSlugSourceNote(slugSource || 'auto-resolved', slug);

            // ── Load pipeline-state stories (flat + epic-nested) ──
            let pipelineStories = [];
            if (slug && fs.existsSync('.github/pipeline-state.json')) {
              try {
                const stateObj = JSON.parse(fs.readFileSync('.github/pipeline-state.json', 'utf8'));
                pipelineStories = loadPipelineStories(stateObj, slug);
              } catch (_) {}
            }

            // ── asd.1: Dispatch cross-check — look up the story referenced in the PR body ──
            const prBody = (context.payload.pull_request && context.payload.pull_request.body) || '';
            let crossCheckStoryId = '';
            let crossCheckDispatchNote = '';
            let crossCheckStoryFound = null;
            try {
              crossCheckStoryId = extractStorySlug(prBody, slug);
              if (crossCheckStoryId) {
                crossCheckStoryFound = pipelineStories.find(s => s.id === crossCheckStoryId) || null;
                const status = !crossCheckStoryFound ? 'not-found' : crossCheckStoryFound.issueUrl ? 'verified' : 'no-dispatch';
                crossCheckDispatchNote = buildDispatchNote(status, crossCheckStoryId, crossCheckStoryFound ? crossCheckStoryFound.issueUrl : undefined);
              }
            } catch (_) { /* fail-open: dispatch cross-check must not change gate verdict */ }

            // ── Read trace verdict + hash from the assurance gate trace JSONL ──
            let verdict = 'unknown';
            let traceHash = 'not available';
            let checks = [];
            const tracesDir = 'workspace/traces';
            if (fs.existsSync(tracesDir)) {
              const files = fs.readdirSync(tracesDir)
                .filter(f => f.endsWith('.jsonl') && f.includes('-ci-'))
                .sort().reverse();
              if (files.length > 0) {
                const lines = fs.readFileSync(path.join(tracesDir, files[0]), 'utf8')
                  .trim().split('\n').filter(Boolean);
                const completed = lines.map(l => { try { return JSON.parse(l); } catch(_) { return null; } })
                  .filter(Boolean).find(e => e.status === 'completed');
                if (completed) { verdict = completed.verdict; traceHash = completed.traceHash || traceHash; checks = completed.checks || []; }
              }
            }

            // ── Read manifest from staging dir ──
            let artefactFiles = [];
            let governanceInputs = [];
            const stagingBase = '.ci-artefact-staging';
            if (slug && fs.existsSync(stagingBase)) {
              const manifestPath = path.join(stagingBase, slug, 'manifest.json');
              if (fs.existsSync(manifestPath)) {
                const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
                artefactFiles = manifest.files || [];
                governanceInputs = manifest.governanceInputs || [];
              }
            }

            // ── Fallback: walk artefacts dir if manifest not available ──
            if (artefactFiles.length === 0 && slug && fs.existsSync(`artefacts/${slug}`)) {
              (function walk(dir) {
                for (const entry of fs.readdirSync(dir).sort()) {
                  const full = path.join(dir, entry);
                  if (fs.statSync(full).isDirectory()) { walk(full); return; }
                  if (!entry.endsWith('.md')) continue;
                  const relPath = full.replace(/\\/g, '/');
                  artefactFiles.push({ sourcePath: relPath, sha256: null, ...classifyArtefact(relPath) });
                }
              })(`artefacts/${slug}`);
            }

            // ── Source integrity: compare manifest hash to live source file ──
            function sourceIntegrity(sourcePath, manifestHash) {
              if (!manifestHash) return '—';
              try {
                const content = fs.readFileSync(sourcePath);
                const computed = crypto.createHash('sha256').update(content).digest('hex');
                return computed === manifestHash ? '✅' : '❌ DRIFT';
              } catch (_) { return '⚠ not found'; }
            }

            // ── Enrich artefact files with classification and integrity status ──
            artefactFiles = artefactFiles.map(f => {
              const cls = f.type ? {} : classifyArtefact(f.sourcePath);
              return { ...f, ...cls, integrityStatus: sourceIntegrity(f.sourcePath, f.sha256) };
            });

            // ── Parse test results from CI run ──
            const testResultsByFile = {};
            if (fs.existsSync('.ci-test-results.txt')) {
              fs.readFileSync('.ci-test-results.txt', 'utf8').split('\n').forEach(line => {
                const m = line.match(/\[(\w+)\]\s+Results:\s*(\d+)\s+passed,\s*(\d+)\s+failed/);
                if (m) testResultsByFile[m[1]] = { passed: parseInt(m[2]), failed: parseInt(m[3]) };
              });
            }

            // ── Enrich governance inputs with file URLs ──
            const enrichedGovInputs = governanceInputs.map(g => ({
              ...g, fileUrl: `${repoUrl}/blob/${headSha}/${g.sourcePath}`,
            }));

            // ── Enrich pipeline stories with parsed ACs and issue AC check ──
            const storiesWithData = await Promise.all(pipelineStories.map(async story => {
              let acs = [];
              if (story.artefact) {
                try { acs = parseACs(fs.readFileSync(story.artefact, 'utf8')); } catch (_) {}
              }
              let issueAcCheck = '';
              if (story.issueUrl) {
                try {
                  const issueNum = parseInt(story.issueUrl.split('/').pop());
                  const { data: issue } = await github.rest.issues.get({
                    owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                  });
                  const hasACs = !!(issue.body && (issue.body.includes('Acceptance Criteria') || issue.body.includes('AC1:')));
                  issueAcCheck = hasACs ? ' · ACs in issue ✅'
                    : (acs.length > 0) ? ' · ACs in artefact ✅'
                    : ' · ⚠️ ACs not found in issue or artefact';
                } catch (_) {}
              }
              const suiteKey = (story.id || story.slug || '').replace(/\./g, '').replace(/-/g, '').toLowerCase();
              return { ...story, acs, issueAcCheck, suiteResult: testResultsByFile[suiteKey] };
            }));

            // ── Build comment body (pure — delegates to scripts/ci-audit-comment.js) ──
            const body = buildAuditComment({
              verdict, traceHash, shortSha, headSha, repoUrl, runUrl, artifactName,
              slug, sourceNote, checks, artefactFiles, governanceInputs: enrichedGovInputs,
              pipelineStories: storiesWithData,
              crossCheckStoryId, crossCheckDispatchNote, crossCheckStoryFound,
            });

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Governed Delivery Audit Record'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
