name: Assurance Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assurance-gate:
    name: Run assurance gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run assurance gate
        id: gate
        env:
          TRIGGER: ci
        run: node .github/scripts/run-assurance-gate.js

      - name: Commit trace file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
          git add workspace/traces/
          git diff --staged --quiet || git commit -m "chore: assurance gate trace [ci skip]"
          git push origin ${{ github.head_ref }}

      - name: Post verdict to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            const tracesDir = 'workspace/traces';
            let verdict   = 'unknown';
            let traceHash = 'unknown';

            if (fs.existsSync(tracesDir)) {
              const files = fs.readdirSync(tracesDir)
                .filter(f => f.endsWith('.jsonl') && f.includes('-ci-'))
                .sort()
                .reverse();

              if (files.length > 0) {
                const lines = fs.readFileSync(path.join(tracesDir, files[0]), 'utf8')
                  .trim().split('\n').filter(Boolean);
                const completed = lines.map(l => JSON.parse(l)).find(e => e.status === 'completed');
                if (completed) {
                  verdict   = completed.verdict;
                  traceHash = completed.traceHash;
                }
              }
            }

            const icon = verdict === 'pass' ? '\u2705' : '\u274c';
            const body = [
              '## Assurance Gate ' + icon,
              '',
              '**Verdict:** ' + verdict,
              '**Trace hash:** `' + traceHash + '`',
              '**Commit:** `' + context.sha + '`',
              '**Trigger:** CI (pull_request)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
