name: Trace Commit

# Fires after a PR is merged to master. Finds the trace artefact produced by the
# most recent successful assurance-gate run and commits it to master, creating a
# permanent, in-git audit record alongside the merged code.
#
# Design rationale:
#   The assurance gate evaluates the PR branch and posts the verdict. It does not
#   commit anything back to the PR branch. This prevents the HEAD-chase loop where
#   a bot commit to the PR branch would require another gate run before merge.
#   Instead, the trace is uploaded as a workflow artefact during the gate run and
#   committed to master here — after the PR has merged — by this separate workflow.
#
#   Governance properties preserved:
#   - Trace is durable: committed to master (permanent canonical history)
#   - Trace is linked: the traceHash in the PR comment cross-references the trace
#     entry committed here; the commitSha field identifies the exact PR HEAD
#   - Maker/checker separation: evaluation (gate) and recording (this workflow)
#     are two separate workflows triggered by two separate events
#   - Architecture guardrail compliance: workspace/traces/ is never committed to
#     story/feature branches (see .github/architecture-guardrails.md)

on:
  push:
    branches: [master]

jobs:
  trace-commit:
    name: Commit trace artefact to master
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read

    steps:
      - name: Skip if trace-only commit
        id: precheck
        run: |
          msg="${{ github.event.head_commit.message }}"
          if echo "$msg" | grep -qF '[post-merge]'; then
            echo "Trace-only commit detected — skipping to prevent re-trigger loop."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout master
        if: steps.precheck.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Find gate trace artifact
        if: steps.precheck.outputs.skip != 'true'
        id: find
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            // Find the most recent successful assurance-gate run
            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo,
              workflow_id: 'assurance-gate.yml',
              status: 'success',
              per_page: 5,
            });

            if (!runs.data.workflow_runs.length) {
              core.warning('No successful assurance gate runs found — skipping trace commit');
              core.setOutput('found', 'false');
              return;
            }

            const run = runs.data.workflow_runs[0];
            core.info(`Using gate run ${run.id} (head SHA: ${run.head_sha})`);

            // Find the trace artifact in this run
            const arts = await github.rest.actions.listWorkflowRunArtifacts({
              owner, repo,
              run_id: run.id,
            });

            const art = arts.data.artifacts.find(a => a.name === 'assurance-trace');
            if (!art) {
              core.warning(`No assurance-trace artifact in run ${run.id} — skipping trace commit`);
              core.setOutput('found', 'false');
              return;
            }

            core.setOutput('run_id', String(run.id));
            core.setOutput('found', 'true');

      - name: Download trace artifact
        if: steps.precheck.outputs.skip != 'true' && steps.find.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: assurance-trace
          path: workspace/traces/
          run-id: ${{ steps.find.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate fallback trace if artifact missing
        if: steps.precheck.outputs.skip != 'true' && steps.find.outputs.found != 'true'
        run: |
          # Fallback: create a minimal trace record from merge commit context
          mkdir -p workspace/traces/
          timestamp=$(date -u +'%Y-%m-%dT%H-%M-%S-%3NZ')
          trace_file="workspace/traces/${timestamp}-ci-$(git rev-parse HEAD | cut -c1-8).jsonl"
          echo "{\"eventType\": \"trace-commit-fallback\", \"reason\": \"assurance-trace artifact not found\", \"commitSha\": \"${{ github.sha }}\", \"timestamp\": \"${timestamp}\", \"gate_run_id\": \"${{ steps.find.outputs.run_id }}\", \"fallback\": true}" > "$trace_file"
          echo "Generated fallback trace: $trace_file"
          cat "$trace_file"

      - name: Commit trace to traces branch
        if: steps.precheck.outputs.skip != 'true'
        run: |
          set +e  # Don't exit on first error; we want to see all issues
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage trace files in temp dir BEFORE branch switch to avoid
          # "untracked working tree files would be overwritten" errors
          mkdir -p /tmp/traces-staging
          cp workspace/traces/* /tmp/traces-staging/ 2>/dev/null || true
          rm -rf workspace/traces/
          
          # CRITICAL FIX: Fetch all refs from origin FIRST, before any ref checks
          # This ensures origin/traces detection is accurate, not based on stale local refs
          git fetch origin
          
          # Checkout traces branch, creating a tracking branch if needed
          if git rev-parse --verify origin/traces >/dev/null 2>&1; then
            echo "Checking out existing remote traces branch"
            git checkout -b traces origin/traces 2>/dev/null || git checkout traces
          else
            echo "Creating new traces branch from current HEAD"
            git checkout -b traces
          fi
          
          # Restore trace files from staging
          mkdir -p workspace/traces/
          cp /tmp/traces-staging/* workspace/traces/
          
          # Add trace files and commit
          git add -f workspace/traces/
          if git diff --staged --quiet; then
            echo "No trace files to commit."
            exit 0
          fi
          
          commit_msg="chore: assurance trace [post-merge] ${{ github.sha }}"
          if ! git commit -m "$commit_msg"; then
            echo "Commit failed; exiting without push"
            exit 1
          fi
          
          # Push to traces branch with force-with-lease for safe append-only semantics
          if ! git push -u origin traces --force-with-lease; then
            echo "ERROR: push to traces branch failed"
            echo "Troubleshooting: checking branch state..."
            git remote -v
            git branch -vv
            git log --oneline -3
            exit 1
          fi
          
          echo "Trace committed successfully to traces branch"
