    policy-floor: standards/security-extended/POLICY.md
  regulatory:
    core: standards/regulatory/core.md
    policy-floor: standards/regulatory/POLICY.md
  infrastructure:
    core: standards/infrastructure/core.md
    policy-floor: standards/infrastructure/POLICY.md
  devops:
