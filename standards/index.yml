    policy-floor: standards/quality-assurance/POLICY.md
    surface-variants:
      saas-gui: standards/quality-assurance/saas-gui-variant.md
      manual: standards/quality-assurance/manual-variant.md
  data:
    core: standards/data/core.md
    policy-floor: standards/data/POLICY.md
  ux:
    core: standards/ux/core.md
    policy-floor: standards/ux/POLICY.md
  security-extended:
