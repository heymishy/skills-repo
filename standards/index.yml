# Surface-type policy floors (p2.5a — IaC and SaaS-API; p2.5b — SaaS-GUI, M365-admin, manual)
# Routing key is the surface type declared in context.yml (surface.type or surface.types[]).
# Each surface type maps to its own POLICY.md floor, separate from discipline floors.
surfaces:
  iac:
    policy-floor: standards/iac/POLICY.md
  saas-api:
    policy-floor: standards/saas-api/POLICY.md
  saas-gui:
    policy-floor: standards/saas-gui/POLICY.md
  m365-admin:
    policy-floor: standards/m365-admin/POLICY.md
  manual:
    policy-floor: standards/manual/POLICY.md

# Pilot domain policy floors (p2.9)
# Domain names recorded in artefacts/2026-04-11-skills-platform-phase2/decisions.md
# under DOMAIN-NAMES-P2.9. Each domain entry maps to a POLICY.md floor that extends
# the applicable discipline floors without replacing them.
domains:
  fintech:
    policy-floor: standards/domains/fintech/POLICY.md
  healthcare:
    policy-floor: standards/domains/healthcare/POLICY.md
  ecommerce:
    policy-floor: standards/domains/ecommerce/POLICY.md

# Authoring note: standards requirements must be outcome-oriented.
# Each MUST/SHOULD/MAY states what result is enabled or prevented, not just what
# structure or process is required. Prefer "MUST write X so that Y cannot occur"
# over "MUST have an X". An outcome-oriented requirement is falsifiable;
# a structure-only requirement is an assertion that any reviewer can attest without evidence.
