version: "1.0"
disciplines:
  software-engineering:
    core: standards/software-engineering/core.md
    policy-floor: standards/software-engineering/POLICY.md
  security-engineering:
    core: standards/security-engineering/core.md
    policy-floor: standards/security-engineering/POLICY.md
  quality-assurance:
    core: standards/quality-assurance/core.md
    policy-floor: standards/quality-assurance/POLICY.md
    surface-variants:
      saas-gui: standards/quality-assurance/saas-gui-variant.md
      manual: standards/quality-assurance/manual-variant.md

# Surface-type policy floors (p2.5a — IaC and SaaS-API)
# Routing key is the surface type declared in context.yml (surface.type or surface.types[]).
# Each surface type maps to its own POLICY.md floor, separate from discipline floors.
surfaces:
  iac:
    policy-floor: standards/iac/POLICY.md
  saas-api:
    policy-floor: standards/saas-api/POLICY.md

# Authoring note: standards requirements must be outcome-oriented.
# Each MUST/SHOULD/MAY states what result is enabled or prevented, not just what
# structure or process is required. Prefer "MUST write X so that Y cannot occur"
# over "MUST have an X". An outcome-oriented requirement is falsifiable;
# a structure-only requirement is an assertion that any reviewer can attest without evidence.
