<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Skills Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .container { max-width: 720px; width: 100%; text-align: center; }
    h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .subtitle { font-size: 1.0625rem; color: #8b949e; margin-bottom: 2.5rem; }
    .plans { display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; }
    .plan-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.75rem 1.5rem; width: 280px; text-align: left; }
    .plan-name { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    .plan-card form { margin-top: 1.25rem; }
    .plan-card button { width: 100%; background: #238636; color: #fff; font-size: 0.9375rem; font-weight: 600; border: none; border-radius: 6px; padding: 0.65rem 1rem; cursor: pointer; transition: background 0.15s; }
    .plan-card button:hover { background: #2ea043; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Welcome to the platform</h1>
    <p class="subtitle">Choose a plan to get started. You can change your plan at any time.</p>
    <div class="plans">
      <!--PLAN_OPTIONS-->
    </div>
  </main>
</body>
</html>
