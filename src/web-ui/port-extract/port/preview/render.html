// Polyfill enough of node's `module.exports` so we can require() the view files
// directly in the browser. Each .js file is fetched, wrapped, and evaluated.
const moduleCache = {};
async function req(path) {
  if (moduleCache[path]) { return moduleCache[path].exports; }
  const url = '../src/web-ui/' + path.replace(/^\.\.\//, '').replace(/^\.\//, '') + '.js';
  // Resolve relative to this file's location (we cheat: build from the path arg directly)
  const realUrl = '../src/web-ui/' + resolveBare(path) + '.js';
  const src = await (await fetch(realUrl)).text();
  const mod = { exports: {} };
  moduleCache[path] = mod;
  const fn = new Function('module', 'exports', 'require',
    src.replace(/'use strict';\s*/, '')
       .replace(/require\(['"]([^'"]+)['"]\)/g, function(_, p) {
         return 'require(\'' + resolveBareFrom(path, p) + '\')';
       })
  );
  fn(mod, mod.exports, function(p) {
    // Synchronous-shaped wrapper. We pre-fetch dependencies first.
    return moduleCache[p].exports;
  });
  return mod.exports;
}
function resolveBare(p) {
  // 'utils/html-shell' or 'views/dashboard-view' or '../utils/html-shell'
  if (p.startsWith('../utils/')) return 'utils/' + p.slice('../utils/'.length);
  return p;
}
function resolveBareFrom(parent, p) {
  // parent like 'views/dashboard-view'; relative '../utils/html-shell'
  if (p.startsWith('../utils/')) return 'utils/' + p.slice('../utils/'.length);
  if (p.startsWith('./'))         return parent.split('/')[0] + '/' + p.slice(2);
  return p;
}

// Pre-fetch dependency graph
async function loadAll(modules) {
  for (const m of modules) {
    const url = '../src/web-ui/' + m + '.js';
    const src = await (await fetch(url)).text();
    moduleCache[m] = { exports: {}, src: src };
  }
  for (const m of modules) {
    const mod = moduleCache[m];
    const fn = new Function('module', 'exports', 'require',
      mod.src.replace(/'use strict';\s*/, '')
        .replace(/require\(['"]([^'"]+)['"]\)/g, function(_, p) {
          return 'require(\'' + resolveBareFrom(m, p) + '\')';
        })
    );
    fn(mod, mod.exports, function(p) { return moduleCache[p].exports; });
  }
}
