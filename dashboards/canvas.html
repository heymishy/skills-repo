<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipeline Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="md-renderer.js"></script>
  <script src="artefact-fetcher.js"></script>
  <link rel="stylesheet" href="extra-views.css">
  <style>
    /* ── CSS variables ── */
    :root {
      --paper:       #f9f7f4;
      --paper-2:     #f3f1ed;
      --paper-3:     #ede9e4;
      --paper-4:     #e6e2db;
      --rule:        #d6d2cb;
      --rule-soft:   #e2ded8;
      --rule-strong: #c0bbb2;
      --ink:         #1a1814;
      --ink-2:       #3d3a35;
      --ink-3:       #7a7469;
      --ink-4:       #b0aaa1;
      --font-serif:  'Source Serif 4', Georgia, serif;
      --font-ui:     'Inter', -apple-system, sans-serif;
      --font-mono:   'JetBrains Mono', 'Menlo', monospace;
      --pass:        #2d6a32;
      --fail:        #b91c1c;
      --gate:        #b45309;
      --inner:       #1d4ed8;
      --outer:       #5b21b6;
      --pass-wash:   #f0faf0;
      --fail-wash:   #fef2f2;
      --gate-wash:   #fffbeb;
      --inner-wash:  #eff6ff;
    }
    [data-theme="dark"] {
      --paper:       #1a1a1e;
      --paper-2:     #22222a;
      --paper-3:     #2a2a34;
      --paper-4:     #32323e;
      --rule:        #3a3a48;
      --rule-soft:   #32323e;
      --rule-strong: #44445a;
      --ink:         #e8e4dc;
      --ink-2:       #c0bbb2;
      --ink-3:       #7a7a90;
      --ink-4:       #4a4a60;
      --pass:        #4ade80;
      --fail:        #f87171;
      --gate:        #fbbf24;
      --inner:       #60a5fa;
      --outer:       #a78bfa;
      --pass-wash:   rgba(74,222,128,.07);
      --fail-wash:   rgba(248,113,113,.07);
      --gate-wash:   rgba(251,191,36,.07);
      --inner-wash:  rgba(96,165,250,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--paper); color: var(--ink); overflow: hidden; }
    body { font-family: var(--font-ui); font-size: 13px; line-height: 1.5; }

    /* ── App shell ── */
    .app { display: grid; grid-template-rows: auto auto auto 1fr; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .header {
      padding: 11px 24px;
      border-bottom: 1px solid var(--rule-strong);
      background: var(--paper-2);
      display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    }
    .header-title {
      font-family: var(--font-serif); font-size: 22px; font-weight: 400;
      letter-spacing: -.015em; flex: 1;
    }
    .header-title em { font-style: italic; color: var(--ink-3); }
    .btn {
      appearance: none; border: 1px solid var(--rule-strong);
      background: var(--paper); font-family: var(--font-mono);
      font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
      padding: 6px 12px; color: var(--ink); cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--paper-3); }

    /* ── Tab bar ── */
    .tabs {
      border-bottom: 1px solid var(--rule-strong);
      background: var(--paper-2);
      display: flex; gap: 0;
      padding: 0 20px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 18px; cursor: pointer;
      font-family: var(--font-ui); font-size: 12.5px; font-weight: 500;
      color: var(--ink-3); border-bottom: 2px solid transparent;
      white-space: nowrap; user-select: none;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── Canvas area ── */
    .canvas-area {
      display: grid;
      grid-template-columns: 1fr;
      overflow: hidden;
      position: relative;
    }
    .canvas-area.with-panel { grid-template-columns: 1fr 420px; }

    /* ── View scroll container ── */
    .view-scroll {
      overflow: auto; padding: 24px;
      scrollbar-width: thin;
    }
    .view-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .view-scroll::-webkit-scrollbar-thumb { background: var(--rule); }

    /* ── Stage badge ── */
    .stage-badge {
      font-family: var(--font-mono); font-size: 8px; letter-spacing: .1em;
      text-transform: uppercase; padding: 2px 6px; border: 1px solid var(--rule);
      white-space: nowrap; flex-shrink: 0;
    }
    .stage-badge[data-stage="discovery"]           { color: var(--outer); border-color: color-mix(in oklch, var(--outer) 40%, var(--rule)); }
    .stage-badge[data-stage="benefit-metric"]      { color: var(--outer); border-color: color-mix(in oklch, var(--outer) 40%, var(--rule)); }
    .stage-badge[data-stage="definition"]          { color: var(--outer); border-color: color-mix(in oklch, var(--outer) 40%, var(--rule)); }
    .stage-badge[data-stage="review"]              { color: var(--gate);  border-color: color-mix(in oklch, var(--gate)  40%, var(--rule)); }
    .stage-badge[data-stage="test-plan"]           { color: var(--gate);  border-color: color-mix(in oklch, var(--gate)  40%, var(--rule)); }
    .stage-badge[data-stage="definition-of-ready"] { color: var(--gate);  border-color: color-mix(in oklch, var(--gate)  40%, var(--rule)); }
    .stage-badge[data-stage="dispatched"]          { color: var(--inner); border-color: color-mix(in oklch, var(--inner) 40%, var(--rule)); }
    .stage-badge[data-stage="inner-loop"]          { color: var(--inner); border-color: color-mix(in oklch, var(--inner) 40%, var(--rule)); }
    .stage-badge[data-stage="definition-of-done"]  { color: var(--pass);  border-color: color-mix(in oklch, var(--pass)  40%, var(--rule)); }

    /* ── Story Map (swimlane) ── */
    .swimlane-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .swimlane-feature-row td {
      padding: 0; vertical-align: top;
    }
    .swimlane-feature-header {
      background: var(--paper-3); border: 1px solid var(--rule-strong);
      padding: 10px 14px; width: 200px; min-width: 160px;
    }
    .swimlane-feature-name {
      font-family: var(--font-serif); font-size: 13px; font-weight: 400;
      color: var(--ink); margin-bottom: 4px;
    }
    .swimlane-feature-slug {
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .swimlane-stories-row {
      display: flex; flex-wrap: nowrap; gap: 8px;
      padding: 10px; border: 1px solid var(--rule-soft); border-left: 0;
      min-height: 80px; align-items: flex-start;
    }
    .story-card {
      min-width: 140px; max-width: 180px; flex-shrink: 0;
      border: 1px solid var(--rule); background: var(--paper);
      padding: 8px 10px; cursor: pointer; transition: background .12s;
    }
    .story-card:hover { background: var(--paper-3); }
    .story-card.done { background: var(--pass-wash); border-color: color-mix(in oklch, var(--pass) 30%, var(--rule)); }
    .story-card-slug {
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-3);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;
    }
    .story-card-name {
      font-family: var(--font-ui); font-size: 11.5px; color: var(--ink-2);
      line-height: 1.35; margin-bottom: 6px;
    }
    .story-card-foot { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dod-chip {
      font-family: var(--font-mono); font-size: 8px; letter-spacing: .1em;
      text-transform: uppercase; padding: 1px 5px;
      border: 1px solid var(--rule-soft); color: var(--ink-4);
    }
    .dod-chip.done { color: var(--pass); border-color: color-mix(in oklch, var(--pass) 40%, var(--rule)); }

    /* Stage column headers */
    .swimlane-stage-cols { display: flex; gap: 8px; padding: 0 10px 6px; min-width: 0; }
    .stage-col-label {
      min-width: 140px; max-width: 180px; flex-shrink: 0;
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .12em; padding: 0 2px;
    }
    .swimlane-header-row td {
      padding: 0;
    }
    .swimlane-header-cell {
      border: 1px solid var(--rule-strong); background: var(--paper-3);
      padding: 6px 10px; text-align: left;
    }
    .swimlane-header-cell span {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--ink-3); text-transform: uppercase; letter-spacing: .12em;
    }

    /* ── Artefact Tree ── */
    .tree-root { padding: 4px 0; }
    /* ── Filter bar ── */
    .filter-bar {
      border-bottom: 1px solid var(--rule);
      background: var(--paper-2);
      padding: 7px 20px;
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap; flex-shrink: 0; overflow-x: auto;
    }
    .filter-group { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .filter-group-label {
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; padding-right: 2px;
    }
    .filter-chip {
      font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .04em;
      padding: 3px 9px; border: 1px solid var(--rule);
      background: var(--paper); color: var(--ink-2); cursor: pointer; white-space: nowrap;
    }
    .filter-chip:hover { background: var(--paper-3); }
    .filter-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .filter-sep { width: 1px; height: 18px; background: var(--rule-strong); flex-shrink: 0; }

    /* ── Story Map — Jeff Patton layout ── */
    .sm-table { border-collapse: collapse; table-layout: auto; }
    .sm-band-col {
      width: 100px; min-width: 80px;
      background: var(--paper-2);
      border-right: 2px solid var(--rule-strong);
      vertical-align: top;
    }
    .sm-band-label-head {
      padding: 10px 8px 8px;
      font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--ink-4);
      display: flex; flex-direction: column; gap: 3px;
    }
    .sm-axis-hint { color: var(--outer); font-size: 8px; letter-spacing: .08em; }
    .sm-activities-row th {
      padding: 0;
      border-bottom: 2px solid var(--rule-strong);
    }
    .sm-activity-cell {
      background: var(--paper-3);
      border: 1px solid var(--rule-strong);
      padding: 10px 14px;
      vertical-align: top; text-align: left;
    }
    .sm-activity-name {
      font-family: var(--font-serif); font-size: 13px; font-weight: 400;
      color: var(--ink); margin-bottom: 2px;
    }
    .sm-activity-slug {
      font-family: var(--font-mono); font-size: 8px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
    }
    .sm-tasks-row th {
      padding: 0;
      border-bottom: 2px solid var(--rule-strong);
    }
    .sm-task-cell {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      padding: 8px 10px;
      vertical-align: middle; text-align: left;
      position: relative;
      min-width: 150px;
    }
    .sm-task-cell.feature-end { border-right: 2px solid var(--rule-strong); }
    .sm-task-name {
      font-family: var(--font-ui); font-size: 11.5px; font-weight: 500; color: var(--ink-2);
    }
    .sm-task-slug {
      font-family: var(--font-mono); font-size: 8.5px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px;
    }
    .sm-then-arrow {
      position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      z-index: 2; font-size: 13px; color: var(--ink-3); pointer-events: none;
      background: var(--paper-2); padding: 0 1px;
    }
    .sm-band-sep-row td { padding: 0; }
    .sm-band-sep-line {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      border-top: 2px solid currentColor;
      background: color-mix(in oklch, currentColor 5%, var(--paper));
    }
    .sm-band-sep-icon { font-size: 11px; }
    .sm-band-sep-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: .12em;
      text-transform: uppercase; font-weight: 600;
    }
    .sm-band-sep-rule { flex: 1; height: 1px; background: currentColor; opacity: .25; }
    .sm-body-row td { padding: 0; }
    .sm-band-row-label {
      padding: 10px 8px; vertical-align: top;
      border-right: 2px solid var(--rule-strong);
      font-family: var(--font-mono); font-size: 8px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink-4);
      background: var(--paper-2);
      white-space: nowrap;
    }
    .sm-story-col {
      vertical-align: top; padding: 8px 6px;
      border: 1px solid var(--rule-soft);
      min-width: 150px;
    }
    .sm-story-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 7px 9px; margin-bottom: 6px;
      cursor: pointer; transition: background .12s;
    }
    .sm-story-card:last-child { margin-bottom: 0; }
    .sm-story-card:hover { background: var(--paper-3); }
    .sm-story-card.shipped {
      background: var(--pass-wash);
      border-color: color-mix(in oklch, var(--pass) 30%, var(--rule));
    }
    .sm-story-card.in-flight {
      background: var(--inner-wash);
      border-color: color-mix(in oklch, var(--inner) 25%, var(--rule));
    }
    .sm-story-id {
      font-family: var(--font-mono); font-size: 8.5px; color: var(--ink-3);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px;
    }
    .sm-story-name {
      font-family: var(--font-ui); font-size: 11px; color: var(--ink-2);
      line-height: 1.3; margin-bottom: 5px;
    }
    .sm-empty-col { text-align: center; padding: 12px 6px; }
    .sm-empty-dot {
      width: 6px; height: 6px;
      background: var(--rule); margin: 0 auto;
    }
    .sm-legend {
      display: flex; gap: 18px; padding: 0 0 14px;
      flex-wrap: wrap; align-items: center;
    }
    .sm-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-3);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .sm-legend-swatch {
      width: 12px; height: 12px; border: 1px solid currentColor;
      flex-shrink: 0;
    }
    .sm-toolbar {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 12px; flex-wrap: wrap;
    }
    .sm-note {
      font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4);
      letter-spacing: .04em; flex: 1;
    }

    .tree-node { margin: 0; }
    .tree-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; cursor: pointer; user-select: none;
      border-left: 2px solid transparent;
    }
    .tree-row:hover { background: var(--paper-3); }
    .tree-row.selected { background: var(--paper-3); border-left-color: var(--ink); }
    .tree-toggle {
      font-size: 10px; color: var(--ink-4);
      width: 14px; flex-shrink: 0; text-align: center;
    }
    .tree-icon { font-size: 12px; flex-shrink: 0; }
    .tree-label { font-size: 12.5px; color: var(--ink); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-label.mono { font-family: var(--font-mono); font-size: 11px; }
    .tree-presence {
      font-size: 11px; flex-shrink: 0; font-family: var(--font-mono);
      width: 16px; text-align: center;
    }
    .tree-presence.present { color: var(--pass); }
    .tree-presence.absent  { color: var(--gate); }
    .tree-children { padding-left: 20px; }

    /* ── Timeline ── */
    .timeline-wrap { min-width: 900px; }
    .timeline-header {
      display: grid;
      gap: 0;
      border-bottom: 1px solid var(--rule-strong);
      margin-bottom: 0;
    }
    .timeline-feature-col { width: 220px; min-width: 180px; }
    .timeline-stage-col   { flex: 1; }

    .timeline-row {
      display: flex; align-items: stretch; border-bottom: 1px solid var(--rule-soft);
    }
    .timeline-row:hover .timeline-name-cell { background: var(--paper-3); }
    .timeline-name-cell {
      width: 220px; min-width: 180px; flex-shrink: 0;
      padding: 8px 12px; border-right: 1px solid var(--rule);
      background: var(--paper-2);
    }
    .timeline-name-cell .fn {
      font-family: var(--font-serif); font-size: 12px; color: var(--ink);
      margin-bottom: 2px;
    }
    .timeline-name-cell .fs {
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .timeline-stages-cell { flex: 1; display: flex; position: relative; }
    .timeline-stage-segment {
      flex: 1; border-right: 1px solid var(--rule-soft);
      position: relative; min-height: 48px;
    }
    .timeline-stage-segment:last-child { border-right: 0; }
    .timeline-story-bar {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 14px; min-width: 6px; cursor: pointer; opacity: .85;
    }
    .timeline-story-bar:hover { opacity: 1; }
    .timeline-stage-header {
      font-family: var(--font-mono); font-size: 8.5px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .1em; padding: 6px 8px;
      border-right: 1px solid var(--rule-soft); background: var(--paper-3);
      flex: 1; text-align: center;
    }
    .timeline-stage-header:last-child { border-right: 0; }
    .timeline-header-row {
      display: flex; border-bottom: 1px solid var(--rule-strong);
    }
    .timeline-corner {
      width: 220px; min-width: 180px; flex-shrink: 0;
      background: var(--paper-3); border-right: 1px solid var(--rule);
      padding: 6px 12px;
      font-family: var(--font-mono); font-size: 9px; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .12em;
    }

    /* ── Dependency Graph ── */
    .dep-svg-wrap { width: 100%; overflow: auto; }
    .dep-svg { display: block; }
    .dep-node rect {
      fill: var(--paper-2); stroke: var(--rule-strong); stroke-width: 1;
      rx: 3;
    }
    .dep-node.done rect { fill: var(--pass-wash); stroke: color-mix(in oklch, var(--pass) 40%, var(--rule)); }
    .dep-node.blocked rect { fill: var(--fail-wash); stroke: color-mix(in oklch, var(--fail) 40%, var(--rule)); }
    .dep-node text { fill: var(--ink); font-family: var(--font-ui); font-size: 11px; pointer-events: none; }
    .dep-node .dep-slug { fill: var(--ink-3); font-family: var(--font-mono); font-size: 9px; }
    .dep-edge { stroke: var(--rule-strong); stroke-width: 1.5; fill: none; }
    .dep-edge.blocked { stroke: var(--fail); stroke-dasharray: 4 3; }
    .dep-arrow { fill: var(--rule-strong); }
    .dep-arrow.blocked { fill: var(--fail); }

    /* ── Side reader panel ── */
    .side-panel {
      border-left: 1px solid var(--rule-strong);
      display: grid; grid-template-rows: auto 1fr;
      overflow: hidden;
      background: var(--paper);
    }
    .side-head {
      padding: 10px 16px; border-bottom: 1px solid var(--rule);
      background: var(--paper-2);
      display: flex; align-items: center; gap: 8px;
    }
    .side-head-title { flex: 1; min-width: 0; }
    .side-head-title .sh-label { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-head-title .sh-path  { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-body { overflow-y: auto; padding: 24px 20px 40px; scrollbar-width: thin; }
    .side-body::-webkit-scrollbar { width: 6px; }
    .side-body::-webkit-scrollbar-thumb { background: var(--rule); }
    .side-loading { padding: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }

    /* Markdown typography (compact — inside panel) */
    .md { font-family: var(--font-serif); font-size: 14px; line-height: 1.6; color: var(--ink); }
    .md h1 { font-size: 22px; font-weight: 400; letter-spacing: -.02em; margin-bottom: .5em; }
    .md h2 { font-size: 17px; font-weight: 500; border-bottom: 1px solid var(--rule); padding-bottom: 4px; margin: 1.4em 0 .4em; }
    .md h3 { font-size: 14px; font-weight: 500; margin: 1.2em 0 .3em; }
    .md h4 { font-size: 11.5px; font-family: var(--font-ui); text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); margin: 1em 0 .3em; }
    .md p  { margin: .5em 0 .9em; }
    .md strong { font-weight: 600; }
    .md em { font-style: italic; }
    .md a  { color: var(--outer); text-decoration: underline; text-underline-offset: 2px; }
    .md code { font-family: var(--font-mono); font-size: .86em; padding: 1px 5px; background: var(--paper-3); border: 1px solid var(--rule-soft); }
    .md pre  { font-family: var(--font-mono); font-size: 12px; background: var(--paper-3); border: 1px solid var(--rule); padding: 12px 14px; overflow-x: auto; margin: .8em 0; }
    .md pre code { padding: 0; border: 0; background: transparent; }
    .md blockquote { margin: .8em 0; padding: 6px 14px; border-left: 3px solid var(--gate); color: var(--ink-2); font-style: italic; }
    .md ul, .md ol { margin: .5em 0 .9em; padding-left: 1.4em; }
    .md li { margin: .15em 0; }
    .md hr { border: 0; border-top: 1px solid var(--rule); margin: 1.6em 0; }
    .md table { border-collapse: collapse; width: 100%; margin: .8em 0; font-size: 12px; }
    .md th, .md td { padding: 5px 10px; border-bottom: 1px solid var(--rule-soft); text-align: left; vertical-align: top; }
    .md th { background: var(--paper-3); font-family: var(--font-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); }
    .md tbody tr:hover { background: var(--paper-2); }

    /* ── Empty / loading states ── */
    .empty-view {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--ink-4);
    }
    .empty-view .ei { font-size: 36px; opacity: .35; }
    .empty-view p { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ── Stage ordering ──────────────────────────────────────────────────────
    const STAGES = [
      'discovery', 'benefit-metric', 'definition', 'review',
      'test-plan', 'definition-of-ready', 'dispatched',
      'inner-loop', 'definition-of-done',
    ];
    const STAGE_IDX = Object.fromEntries(STAGES.map((s, i) => [s, i]));

    // ── Load pipeline-state.json (dual-URL) ─────────────────────────────────
    async function loadState() {
      for (const url of ['pipeline-state.json', '../.github/pipeline-state.json']) {
        try {
          const r = await fetch(url);
          if (r.ok) return await r.json();
        } catch (_) {}
      }
      return null;
    }

    // ── Review-server helpers ────────────────────────────────────────────────
    const REVIEW_SERVER = 'http://localhost:3131';

    async function checkServer() {
      try {
        const r = await fetch(REVIEW_SERVER + '/health', { signal: AbortSignal.timeout(1200) });
        return r.ok;
      } catch (_) { return false; }
    }

    async function callSave(filePath, content) {
      // Normalize: strip any leading '../artefacts/' then ensure 'artefacts/' prefix
      filePath = 'artefacts/' + filePath.replace(/^(\.\.\/)*artefacts\//, '');
      const r = await fetch(REVIEW_SERVER + '/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath, content }),
      });
      if (!r.ok) {
        const msg = await r.text().catch(() => r.statusText);
        throw new Error(msg || r.statusText);
      }
      return r.json();
    }

    // ── MdEditorOverlay ──────────────────────────────────────────────────────
    function MdEditorOverlay({ md: initialMd, filePath, onClose, onSave, serverUp, onSaveToDisk }) {
      const [text, setText] = useState(initialMd || '');
      const [preview, setPreview] = useState('');
      const [copyLabel, setCopyLabel] = useState('Copy');
      const [saveLabel, setSaveLabel] = useState('Save');
      const debounceRef = useRef(null);

      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          if (window.renderMarkdown) {
            setPreview(window.renderMarkdown(text));
          } else {
            setPreview('<pre>' + text.replace(/</g, '&lt;') + '</pre>');
          }
        }, 200);
        return () => clearTimeout(debounceRef.current);
      }, [text]);

      useEffect(() => {
        const handleKey = (e) => { if (e.key === 'Escape') { onSave(text); onClose(); } };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [text, onClose, onSave]);

      const handleCopy = () => {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => {
            setCopyLabel('Copied!');
            setTimeout(() => setCopyLabel('Copy'), 1500);
          });
        }
      };

      const handleSaveToDisk = () => {
        if (!onSaveToDisk) return;
        setSaveLabel('Saving…');
        onSaveToDisk(text)
          .then(() => {
            setSaveLabel('Saved ✓');
            setTimeout(() => setSaveLabel('Save'), 2000);
          })
          .catch(e => {
            setSaveLabel('Error');
            console.error('[save]', e);
            setTimeout(() => setSaveLabel('Save'), 2500);
          });
      };

      const handleDownload = () => {
        const filename = filePath ? filePath.split('/').pop() : 'artefact.md';
        const blob = new Blob([text], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="md-editor-overlay">
          <div className="md-editor-toolbar">
            <span className="md-editor-path">{filePath || 'artefact'}</span>
            <button className="md-editor-btn" onClick={handleCopy}>{copyLabel}</button>
            <button className="md-editor-btn" onClick={handleDownload}>Download .md</button>
            {serverUp && onSaveToDisk && (
              <button className="md-editor-btn" onClick={handleSaveToDisk} disabled={saveLabel === 'Saving…'}>{saveLabel}</button>
            )}
            <button className="md-editor-btn-close" onClick={() => { onSave(text); onClose(); }} aria-label="Close editor">×</button>
          </div>
          <div className="md-editor-panes">
            <div className="md-editor-source">
              <div className="md-editor-source-label">Markdown source</div>
              <textarea className="md-editor-textarea" value={text} onChange={e => setText(e.target.value)} spellCheck={false} />
            </div>
            <div className="md-editor-preview">
              <div className="md-editor-preview-label">Preview</div>
              <div className="md-editor-preview-body" dangerouslySetInnerHTML={{ __html: preview }} />
            </div>
          </div>
        </div>
      );
    }

    // Flatten all stories from a feature's epics
    function allStories(feature) {
      return (feature.epics || []).flatMap(e =>
        (e.stories || []).map(s => ({ ...s, epicSlug: e.slug || e.id, epicName: e.name }))
      );
    }

    // Story artefact paths
    function storyArtefactPaths(featureSlug, storySlug) {
      const base = featureSlug + '/';
      return [
        { label: 'Story',     path: base + 'stories/' + storySlug + '.md',                phase: 'definition' },
        { label: 'Test plan', path: base + 'test-plans/' + storySlug + '-test-plan.md',   phase: 'test-plan'  },
        { label: 'DoR',       path: base + 'dor/' + storySlug + '-dor.md',                phase: 'dor'        },
        { label: 'DoD',       path: base + 'dod/' + storySlug + '-dod.md',                phase: 'dod'        },
      ];
    }

    // Hex / color helpers for timeline bars
    function stageColor(stage) {
      const idx = STAGE_IDX[stage] ?? 0;
      if (idx >= 8) return 'var(--pass)';
      if (idx >= 6) return 'var(--inner)';
      if (idx >= 3) return 'var(--gate)';
      return 'var(--outer)';
    }

    // ── Side reader panel ────────────────────────────────────────────────────
    function SidePanel({ doc, onClose, serverUp }) {
      const [content, setContent] = useState(null);
      const [loading, setLoading] = useState(false);
      const [editorOpen, setEditorOpen] = useState(false);

      useEffect(() => {
        if (!doc) { setContent(null); return; }
        setLoading(true);
        setContent(null);
        const AF = window.ArtefactFetcher;
        if (!AF) { setLoading(false); setContent('_ArtefactFetcher not available._'); return; }
        AF.fetch(doc.path).then(txt => {
          setContent(txt || `# ${doc.label}\n\n_Not found at \`${doc.path}\`._`);
          setLoading(false);
        });
      }, [doc && doc.path]);

      const html = useMemo(
        () => content ? (window.renderMarkdown?.(content) || '') : '',
        [content]
      );

      if (!doc) return null;

      return (
        <div className="side-panel">
          {editorOpen && content !== null && (
            <MdEditorOverlay
              md={content}
              filePath={doc.path}
              onClose={() => setEditorOpen(false)}
              onSave={(edited) => { setContent(edited); setEditorOpen(false); }}
              serverUp={serverUp}
              onSaveToDisk={serverUp ? (text) => callSave(doc.path, text).then(() => setContent(text)) : null}
            />
          )}
          <div className="side-head">
            <div className="side-head-title">
              <div className="sh-label">{doc.label}</div>
              <div className="sh-path">{doc.path}</div>
            </div>
            <div style={{ display: 'flex', gap: 4 }}>
              {content && <button className="btn" onClick={() => setEditorOpen(true)} title="Edit document">Edit</button>}
              <button className="btn" onClick={onClose} title="Close">✕</button>
            </div>
          </div>
          <div className="side-body">
            {loading && <div className="side-loading">Loading…</div>}
            {!loading && content && (
              <div className="md" dangerouslySetInnerHTML={{ __html: html }} />
            )}
          </div>
        </div>
      );
    }

    // ── Infer programme from feature slug / explicit field ──────────────────
    function inferProgramme(feature) {
      if (feature.programme) return feature.programme;
      // e.g. "2026-04-09-skills-platform-phase1" → "skills-platform"
      const m = (feature.slug || '').match(/^\d{4}-\d{2}-\d{2}-(.+?)(?:-phase\d+|-v\d+|-r\d+)?$/);
      return m ? m[1] : null;
    }

    // ── Filter bar ───────────────────────────────────────────────────────────
    function FilterBar({ features, filter, onFilter }) {
      const programmes = useMemo(() => {
        const seen = new Set();
        features.forEach(f => { const p = inferProgramme(f); if (p) seen.add(p); });
        return [...seen];
      }, [features]);

      const showProgrammes = programmes.length > 1;
      // Use dropdown when there are more than 8 features (too many chips to display)
      const useDropdown = features.length > 8;
      const [search, setSearch] = useState('');

      const featureOptions = useDropdown
        ? features.filter(f => {
            if (!search) return true;
            const label = (f.slug || '').replace(/^\d{4}-\d{2}-\d{2}-/, '').toLowerCase();
            return label.includes(search.toLowerCase());
          })
        : features;

      return (
        <div className="filter-bar">
          <div className="filter-group">
            <span className="filter-group-label">Show</span>
            <button
              className={'filter-chip' + (filter.type === 'all' ? ' active' : '')}
              onClick={() => onFilter({ type: 'all' })}
            >All ({features.length})</button>
          </div>

          {showProgrammes && (
            <>
              <div className="filter-sep" />
              <div className="filter-group">
                <span className="filter-group-label">Programme</span>
                {programmes.map(p => (
                  <button
                    key={p}
                    className={'filter-chip' + (filter.type === 'programme' && filter.value === p ? ' active' : '')}
                    onClick={() => onFilter({ type: 'programme', value: p })}
                  >{p}</button>
                ))}
              </div>
            </>
          )}

          <div className="filter-sep" />
          <div className="filter-group">
            <span className="filter-group-label">Feature</span>
            {useDropdown ? (
              <>
                <input
                  className="filter-search"
                  type="text"
                  placeholder="Search…"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                />
                <select
                  className="filter-select"
                  value={filter.type === 'feature' ? filter.value : ''}
                  onChange={e => {
                    const v = e.target.value;
                    onFilter(v === '' ? { type: 'all' } : { type: 'feature', value: v });
                  }}
                >
                  <option value="">— all features —</option>
                  {featureOptions.map(f => (
                    <option key={f.slug} value={f.slug}>
                      {(f.slug || '').replace(/^\d{4}-\d{2}-\d{2}-/, '')}
                    </option>
                  ))}
                </select>
              </>
            ) : (
              features.map(f => (
                <button
                  key={f.slug}
                  className={'filter-chip' + (filter.type === 'feature' && filter.value === f.slug ? ' active' : '')}
                  onClick={() => onFilter({ type: 'feature', value: f.slug })}
                  title={f.name || f.slug}
                >{(f.slug || '').replace(/^\d{4}-\d{2}-\d{2}-/, '')}</button>
              ))
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // VIEW 1 — Story Map (Jeff Patton layout)
    //
    // Structure:
    //   Row 0 (Backbone — Activities): Feature headers, spanning their epic columns
    //   Row 1 (Backbone — Tasks):      Epic headers, one column per epic
    //   Band rows:  Horizontal release slices — Shipped / In Flight / Backlog
    //               Each band row contains all story cards for that epic×band cell.
    //
    // Mapping:  Feature → Activity  |  Epic → Task  |  Story → Story card
    // Bands:    dodStatus=complete → Shipped
    //           stage ∈ inner/gate → In Flight
    //           stage ∈ outer      → Backlog
    // ══════════════════════════════════════════════════════════════════════════
    const SM_BANDS = [
      {
        id: 'shipped',
        label: 'Shipped / Released',
        icon: '✓',
        color: 'var(--pass)',
        wash: 'var(--pass-wash)',
        match: st => st.dodStatus === 'complete',
      },
      {
        id: 'in-flight',
        label: 'In Flight',
        icon: '⟳',
        color: 'var(--inner)',
        wash: 'var(--inner-wash)',
        match: st => ['dispatched', 'inner-loop', 'definition-of-ready', 'test-plan', 'review'].includes(st.stage),
      },
      {
        id: 'backlog',
        label: 'Backlog / Planned',
        icon: '○',
        color: 'var(--outer)',
        wash: 'transparent',
        match: () => true, // catch-all
      },
    ];

    function storiesForBand(stories, bandIdx) {
      return stories.filter(st => {
        for (let i = 0; i < bandIdx; i++) {
          if (SM_BANDS[i].match(st)) return false;
        }
        return SM_BANDS[bandIdx].match(st);
      });
    }

    function ViewStoryMap({ features, onSelectDoc }) {
      if (!features || !features.length) return (
        <div className="empty-view"><div className="ei">🗺</div><p>No features loaded</p></div>
      );

      // Build ordered list of epic columns: [{feature, epic, key}]
      const epicCols = useMemo(() => features.flatMap(f => {
        const epics = (f.epics || []).length > 0
          ? f.epics
          : [{ slug: f.slug, name: f.name || f.slug, stories: allStories(f) }];
        return epics.map(e => ({
          feature: f,
          epic: e,
          key: f.slug + '::' + (e.slug || e.id || e.name),
        }));
      }), [features]);

      return (
        <div>
          {/* Legend */}
          <div className="sm-legend">
            {SM_BANDS.map(b => (
              <div key={b.id} className="sm-legend-item" style={{ color: b.color }}>
                <div className="sm-legend-swatch" style={{ background: b.wash === 'transparent' ? 'transparent' : b.wash }} />
                {b.icon} {b.label}
              </div>
            ))}
            <span className="sm-note">← Activities flow left→right (then). Stories stack top→bottom (priority).</span>
          </div>

          <div style={{ overflowX: 'auto' }}>
            <table className="sm-table">
              <colgroup>
                <col style={{ width: 100 }} />
                {epicCols.map(ec => <col key={ec.key} style={{ minWidth: 160 }} />)}
              </colgroup>

              <thead>
                {/* ── Row 0: Activities (Feature backbone) ── */}
                <tr className="sm-activities-row">
                  <th className="sm-band-col">
                    <div className="sm-band-label-head">
                      <span>Activities</span>
                      <span className="sm-axis-hint">← then →</span>
                    </div>
                  </th>
                  {features.map(f => {
                    const span = epicCols.filter(ec => ec.feature.slug === f.slug).length;
                    return (
                      <th key={f.slug} colSpan={span} className="sm-activity-cell">
                        <div className="sm-activity-name">{f.name || f.slug}</div>
                        <div className="sm-activity-slug">{f.slug}</div>
                        <span className="stage-badge" data-stage={f.stage}>{f.stage}</span>
                      </th>
                    );
                  })}
                </tr>

                {/* ── Row 1: Tasks (Epic backbone) ── */}
                <tr className="sm-tasks-row">
                  <th className="sm-band-col">
                    <div className="sm-band-label-head"><span>Tasks</span></div>
                  </th>
                  {epicCols.map((ec, i) => {
                    const isLastInFeature = i === epicCols.length - 1 ||
                      epicCols[i + 1]?.feature.slug !== ec.feature.slug;
                    const isFirstInFeature = i === 0 ||
                      epicCols[i - 1]?.feature.slug !== ec.feature.slug;
                    return (
                      <th
                        key={ec.key}
                        className={'sm-task-cell' + (isLastInFeature ? ' feature-end' : '')}
                      >
                        <div className="sm-task-slug">{ec.epic.slug || ec.epic.id || ''}</div>
                        <div className="sm-task-name">{ec.epic.name || ec.epic.slug || '—'}</div>
                        {!isLastInFeature && <span className="sm-then-arrow">→</span>}
                      </th>
                    );
                  })}
                </tr>
              </thead>

              <tbody>
                {SM_BANDS.map((band, bandIdx) => {
                  // Check if this band has any stories at all (across all epics)
                  const hasAny = epicCols.some(ec => {
                    const epStories = ec.epic.stories || [];
                    return storiesForBand(epStories, bandIdx).length > 0;
                  });
                  return (
                    <React.Fragment key={band.id}>
                      {/* Band separator / release line */}
                      <tr className="sm-band-sep-row">
                        <td colSpan={epicCols.length + 1} style={{ padding: 0 }}>
                          <div className="sm-band-sep-line" style={{ color: band.color }}>
                            <span className="sm-band-sep-icon">{band.icon}</span>
                            <span className="sm-band-sep-label">{band.label}</span>
                            <div className="sm-band-sep-rule" />
                          </div>
                        </td>
                      </tr>

                      {/* Story cards row */}
                      <tr className="sm-body-row">
                        <td className="sm-band-row-label">
                          <span style={{ color: band.color }}>{band.label}</span>
                        </td>
                        {epicCols.map(ec => {
                          const epStories = ec.epic.stories || [];
                          const bandStories = storiesForBand(epStories, bandIdx);
                          return (
                            <td
                              key={ec.key}
                              className="sm-story-col"
                              style={{ background: bandStories.length > 0 ? band.wash : 'transparent' }}
                            >
                              {bandStories.map(st => (
                                <div
                                  key={st.slug || st.id}
                                  className={'sm-story-card ' + band.id}
                                  onClick={() => onSelectDoc({
                                    label: st.name || st.slug || st.id,
                                    path: storyArtefactPaths(ec.feature.slug, st.slug || st.id)[0].path,
                                  })}
                                  title={(st.slug || st.id) + ' — click to open'}
                                >
                                  <div className="sm-story-id">{st.slug || st.id}</div>
                                  <div className="sm-story-name">{st.name || '—'}</div>
                                  <span className="stage-badge" data-stage={st.stage}>{st.stage}</span>
                                </div>
                              ))}
                              {bandStories.length === 0 && (
                                <div className="sm-empty-col"><div className="sm-empty-dot" /></div>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // VIEW 2 — Artefact Tree
    // ══════════════════════════════════════════════════════════════════════════
    function useArtefactPresence(paths) {
      const [presence, setPresence] = useState({});
      useEffect(() => {
        const AF = window.ArtefactFetcher;
        if (!AF) return;
        paths.forEach(p => {
          AF.fetch(p).then(txt => {
            setPresence(prev => ({ ...prev, [p]: !!txt && txt.length > 10 }));
          }).catch(() => {
            setPresence(prev => ({ ...prev, [p]: false }));
          });
        });
      }, [paths.join('|')]);
      return presence;
    }

    function TreeNode({ label, icon, indent = 0, children, leaf, presence, onClick, mono, selectedPath, path }) {
      const [open, setOpen] = useState(true);
      const isSelected = selectedPath && path && selectedPath === path;
      const hasChildren = React.Children.count(children) > 0;

      return (
        <div className="tree-node">
          <div
            className={'tree-row' + (isSelected ? ' selected' : '')}
            style={{ paddingLeft: 8 + indent * 16 }}
            onClick={() => {
              if (leaf && onClick) onClick();
              else if (hasChildren) setOpen(v => !v);
            }}
          >
            <span className="tree-toggle">{hasChildren ? (open ? '▾' : '▸') : ''}</span>
            <span className="tree-icon">{icon}</span>
            <span className={'tree-label' + (mono ? ' mono' : '')}>{label}</span>
            {leaf && presence !== undefined && (
              <span className={'tree-presence' + (presence ? ' present' : ' absent')}>
                {presence ? '✓' : '−'}
              </span>
            )}
          </div>
          {hasChildren && open && (
            <div className="tree-children">{children}</div>
          )}
        </div>
      );
    }

    function StoryTreeNode({ featureSlug, story, indent, onSelectDoc, selectedPath }) {
      const slug = story.slug || story.id;
      const paths = useMemo(() => storyArtefactPaths(featureSlug, slug), [featureSlug, slug]);
      const allPaths = paths.map(p => p.path);
      const presence = useArtefactPresence(allPaths);

      return (
        <TreeNode label={`${slug} — ${story.name || ''}`} icon="📋" indent={indent} mono selectedPath={selectedPath}>
          {paths.map(ap => (
            <TreeNode
              key={ap.path}
              label={ap.label}
              icon={ap.phase === 'dod' ? '✅' : ap.phase === 'dor' ? '🔑' : ap.phase === 'test-plan' ? '🧪' : '📄'}
              indent={indent + 1}
              leaf
              presence={presence[ap.path]}
              path={ap.path}
              selectedPath={selectedPath}
              onClick={() => onSelectDoc({ label: ap.label + ' — ' + slug, path: ap.path })}
            />
          ))}
        </TreeNode>
      );
    }

    function ViewArtefactTree({ features, onSelectDoc, selectedPath }) {
      if (!features || !features.length) return (
        <div className="empty-view"><div className="ei">🌳</div><p>No features loaded</p></div>
      );

      return (
        <div className="tree-root">
          {features.map(f => (
            <TreeNode key={f.slug} label={`${f.slug} — ${f.name || ''}`} icon="📁" indent={0}>
              {/* Feature-level docs */}
              {[
                { label: 'Discovery',      path: f.slug + '/discovery.md',      icon: '🔍' },
                { label: 'Benefit metric', path: f.slug + '/benefit-metric.md', icon: '📊' },
                { label: 'NFR Profile',    path: f.slug + '/nfr-profile.md',    icon: '⚙️'  },
              ].map(d => {
                const presence = {};
                return (
                  <FeatureDocLeaf
                    key={d.path}
                    {...d}
                    indent={1}
                    selectedPath={selectedPath}
                    onSelectDoc={onSelectDoc}
                  />
                );
              })}
              {/* Epics + stories */}
              {(f.epics || []).map(e => (
                <TreeNode key={e.slug || e.id} label={e.name || e.slug || e.id} icon="📦" indent={1}>
                  {(e.stories || []).map(s => (
                    <StoryTreeNode
                      key={s.slug || s.id}
                      featureSlug={f.slug}
                      story={s}
                      indent={2}
                      onSelectDoc={onSelectDoc}
                      selectedPath={selectedPath}
                    />
                  ))}
                </TreeNode>
              ))}
            </TreeNode>
          ))}
        </div>
      );
    }

    // Single feature-level doc leaf with presence check
    function FeatureDocLeaf({ path, label, icon, indent, selectedPath, onSelectDoc }) {
      const presence = useArtefactPresence(useMemo(() => [path], [path]));
      return (
        <TreeNode
          label={label} icon={icon} indent={indent}
          leaf presence={presence[path]}
          path={path} selectedPath={selectedPath}
          onClick={() => onSelectDoc({ label, path })}
        />
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // VIEW 3 — Timeline
    // ══════════════════════════════════════════════════════════════════════════
    function ViewTimeline({ features, onSelectDoc }) {
      if (!features || !features.length) return (
        <div className="empty-view"><div className="ei">📅</div><p>No features loaded</p></div>
      );

      return (
        <div className="timeline-wrap">
          {/* Header row */}
          <div className="timeline-header-row">
            <div className="timeline-corner">Feature</div>
            {STAGES.map(s => (
              <div key={s} className="timeline-stage-header">{s}</div>
            ))}
          </div>
          {/* Feature rows */}
          {features.map(f => {
            const stories = allStories(f);
            const featureStageIdx = STAGE_IDX[f.stage] ?? 0;

            return (
              <div key={f.slug} className="timeline-row">
                <div className="timeline-name-cell">
                  <div className="fn">{f.name || f.slug}</div>
                  <div className="fs">{f.slug}</div>
                </div>
                <div className="timeline-stages-cell">
                  {STAGES.map((s, colIdx) => {
                    // Stories that have passed through this stage
                    const storiesHere = stories.filter(st => {
                      const stIdx = STAGE_IDX[st.stage] ?? 0;
                      return stIdx === colIdx;
                    });
                    return (
                      <div key={s} className="timeline-stage-segment">
                        {storiesHere.map((st, i) => (
                          <div
                            key={st.slug || st.id}
                            className="timeline-story-bar"
                            style={{
                              background: stageColor(st.stage),
                              left: 4,
                              right: 4,
                              top: `calc(50% + ${(i - storiesHere.length / 2) * 16}px)`,
                              transform: 'none',
                              height: 12,
                              position: 'absolute',
                              cursor: 'pointer',
                              borderRadius: 2,
                              opacity: 0.8,
                            }}
                            title={`${st.slug || st.id}: ${st.name || ''} (${st.stage || s})`}
                            onClick={() => onSelectDoc({
                              label: st.name || st.slug || st.id,
                              path: storyArtefactPaths(f.slug, st.slug || st.id)[0].path,
                            })}
                          />
                        ))}
                        {/* Feature-level marker on its current stage column */}
                        {colIdx === featureStageIdx && !storiesHere.length && (
                          <div style={{
                            position: 'absolute', top: '50%', left: 4, right: 4,
                            height: 4, background: stageColor(f.stage), borderRadius: 2,
                            transform: 'translateY(-50%)', opacity: .5,
                          }} />
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // VIEW 4 — Dependency Graph (pure SVG)
    // ══════════════════════════════════════════════════════════════════════════

    // Build node + edge data from pipeline-state features
    function buildDepGraph(features) {
      const nodes = [];
      const edges = [];

      features.forEach(f => {
        allStories(f).forEach(st => {
          const id = st.slug || st.id;
          nodes.push({
            id,
            name: st.name || id,
            featureSlug: f.slug,
            stage: st.stage,
            dodStatus: st.dodStatus,
            prUrl: st.prUrl,
          });
          // Parse upstream dependencies from story data if present
          if (st.upstream) {
            (Array.isArray(st.upstream) ? st.upstream : [st.upstream]).forEach(up => {
              if (up) edges.push({ from: up, to: id });
            });
          }
        });
      });

      return { nodes, edges };
    }

    // Simple layered layout: group nodes by stage index, layer = stage index
    function layoutNodes(nodes) {
      const layers = {};
      nodes.forEach(n => {
        const layer = STAGE_IDX[n.stage] ?? 0;
        if (!layers[layer]) layers[layer] = [];
        layers[layer].push(n);
      });

      const NODE_W = 150;
      const NODE_H = 46;
      const COL_GAP = 80;
      const ROW_GAP = 14;
      const positions = {};

      Object.entries(layers).forEach(([layer, ns]) => {
        const x = parseInt(layer) * (NODE_W + COL_GAP) + 20;
        ns.forEach((n, i) => {
          const y = i * (NODE_H + ROW_GAP) + 20;
          positions[n.id] = { x, y, w: NODE_W, h: NODE_H };
        });
      });

      return positions;
    }

    function ViewDependencyGraph({ features, onSelectDoc }) {
      const { nodes, edges } = useMemo(() => buildDepGraph(features || []), [features]);
      const positions = useMemo(() => layoutNodes(nodes), [nodes]);

      const nodeSet = new Set(nodes.map(n => n.id));
      const blockedNodes = new Set(
        edges
          .filter(e => {
            const fromNode = nodes.find(n => n.id === e.from);
            return fromNode && fromNode.dodStatus !== 'complete';
          })
          .map(e => e.to)
      );

      if (!nodes.length) return (
        <div className="empty-view"><div className="ei">🔗</div><p>No stories found</p></div>
      );

      // Compute SVG dimensions
      let maxX = 0, maxY = 0;
      nodes.forEach(n => {
        const p = positions[n.id];
        if (p) { maxX = Math.max(maxX, p.x + p.w); maxY = Math.max(maxY, p.y + p.h); }
      });
      const svgW = maxX + 40;
      const svgH = maxY + 40;

      return (
        <div className="dep-svg-wrap">
          <svg
            className="dep-svg"
            width={svgW}
            height={svgH}
            viewBox={`0 0 ${svgW} ${svgH}`}
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" className="dep-arrow" />
              </marker>
              <marker id="arrow-blocked" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" className="dep-arrow blocked" />
              </marker>
            </defs>

            {/* Edges */}
            {edges.filter(e => positions[e.from] && positions[e.to]).map((e, i) => {
              const from = positions[e.from];
              const to   = positions[e.to];
              const x1 = from.x + from.w;
              const y1 = from.y + from.h / 2;
              const x2 = to.x;
              const y2 = to.y + to.h / 2;
              const cx = (x1 + x2) / 2;
              const isBlocked = blockedNodes.has(e.to);
              return (
                <path
                  key={i}
                  d={`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`}
                  className={'dep-edge' + (isBlocked ? ' blocked' : '')}
                  markerEnd={isBlocked ? 'url(#arrow-blocked)' : 'url(#arrow)'}
                />
              );
            })}

            {/* Nodes */}
            {nodes.map(n => {
              const p = positions[n.id];
              if (!p) return null;
              const isDone    = n.dodStatus === 'complete';
              const isBlocked = blockedNodes.has(n.id);
              const cls = isDone ? ' done' : isBlocked ? ' blocked' : '';
              return (
                <g
                  key={n.id}
                  className={'dep-node' + cls}
                  transform={`translate(${p.x},${p.y})`}
                  style={{ cursor: 'pointer' }}
                  onClick={() => onSelectDoc({
                    label: n.name || n.id,
                    path: storyArtefactPaths(n.featureSlug, n.id)[0].path,
                  })}
                >
                  <rect x={0} y={0} width={p.w} height={p.h} rx={3} />
                  <text x={8} y={14} className="dep-slug">{n.id}</text>
                  <foreignObject x={6} y={18} width={p.w - 12} height={p.h - 22}>
                    <div xmlns="http://www.w3.org/1999/xhtml"
                      style={{ fontSize: 10.5, fontFamily: 'var(--font-ui)', color: 'var(--ink-2)', lineHeight: 1.3, overflow: 'hidden', maxHeight: 26, wordBreak: 'break-word' }}>
                      {n.name}
                    </div>
                  </foreignObject>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // App root
    // ══════════════════════════════════════════════════════════════════════════
    const VIEWS = [
      { id: 'story-map',      label: 'Story Map'      },
      { id: 'artefact-tree',  label: 'Artefact Tree'  },
      { id: 'timeline',       label: 'Timeline'       },
      { id: 'dependency',     label: 'Dependency Graph' },
    ];

    function App() {
      const [state, setState] = useState(null);
      const [loadError, setLoadError] = useState(false);
      const [view, setView] = useState('story-map');
      const [selectedDoc, setSelectedDoc] = useState(null);
      const [filter, setFilter] = useState(() => {
        try {
          const saved = localStorage.getItem('cv-filter');
          return saved ? JSON.parse(saved) : { type: 'all' };
        } catch (_) { return { type: 'all' }; }
      });
      const [serverUp, setServerUp] = useState(false);
      const [theme, setTheme] = useState(() =>
        window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      );

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      useEffect(() => {
        loadState().then(data => {
          if (data) setState(data);
          else setLoadError(true);
        });
      }, []);

      // Persist filter to localStorage on change
      useEffect(() => {
        try { localStorage.setItem('cv-filter', JSON.stringify(filter)); } catch (_) {}
      }, [filter]);

      // Server health polling
      useEffect(() => {
        checkServer().then(setServerUp);
        const iv = setInterval(() => checkServer().then(setServerUp), 10000);
        return () => clearInterval(iv);
      }, []);

      // Close panel on Escape
      useEffect(() => {
        const fn = e => { if (e.key === 'Escape') setSelectedDoc(null); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);

      const features = state?.features || [];

      // Derive filtered features from filter state
      const filteredFeatures = useMemo(() => {
        if (filter.type === 'feature') return features.filter(f => f.slug === filter.value);
        if (filter.type === 'programme') return features.filter(f => inferProgramme(f) === filter.value);
        return features;
      }, [features, filter]);

      const handleSelectDoc = useCallback(doc => setSelectedDoc(doc), []);

      return (
        <div className="app">
          <header className="header">
            <div className="header-title">Pipeline <em>canvas.</em></div>
            <button className="btn" onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} style={{ fontSize: 10 }}>
              {theme === 'dark' ? 'Light' : 'Dark'}
            </button>
            <nav className="site-nav">
              <a href="index.html">Pipeline</a>
              <a href="pipeline.html">Feature</a>
              <a href="review.html">Review</a>
              <a href="canvas.html" className="active">Canvas</a>
            </nav>
          </header>

          <nav className="tabs">
            {VIEWS.map(v => (
              <div
                key={v.id}
                className={'tab' + (view === v.id ? ' active' : '')}
                onClick={() => setView(v.id)}
              >
                {v.label}
              </div>
            ))}
          </nav>

          {state && (
            <FilterBar features={features} filter={filter} onFilter={setFilter} />
          )}

          <div className={'canvas-area' + (selectedDoc ? ' with-panel' : '')}>
            <div className="view-scroll">
              {loadError && (
                <div className="empty-view">
                  <div className="ei">⚠</div>
                  <p>Could not load pipeline-state.json</p>
                  <p style={{ fontSize: 11, marginTop: 4 }}>Serve via Live Server or node scripts/review-server.js</p>
                </div>
              )}
              {!state && !loadError && (
                <div className="empty-view"><div className="ei">⏳</div><p>Loading…</p></div>
              )}
              {state && view === 'story-map'     && <ViewStoryMap     features={filteredFeatures} onSelectDoc={handleSelectDoc} />}
              {state && view === 'artefact-tree' && <ViewArtefactTree features={filteredFeatures} onSelectDoc={handleSelectDoc} selectedPath={selectedDoc?.path} />}
              {state && view === 'timeline'      && <ViewTimeline     features={filteredFeatures} onSelectDoc={handleSelectDoc} />}
              {state && view === 'dependency'    && <ViewDependencyGraph features={filteredFeatures} onSelectDoc={handleSelectDoc} />}
            </div>
            {selectedDoc && (
              <SidePanel doc={selectedDoc} onClose={() => setSelectedDoc(null)} serverUp={serverUp} />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
