<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pipeline — Skills Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    /* light (paper) */
    --paper: oklch(0.985 0.004 85);
    --paper-2: oklch(0.965 0.006 85);
    --paper-3: oklch(0.945 0.008 85);
    --rule: oklch(0.88 0.008 85);
    --rule-strong: oklch(0.78 0.010 85);
    --ink: oklch(0.22 0.012 270);
    --ink-2: oklch(0.38 0.012 270);
    --ink-3: oklch(0.55 0.010 270);
    --ink-4: oklch(0.70 0.008 270);

    --outer: oklch(0.48 0.11 250);   /* blue */
    --inner: oklch(0.48 0.10 190);   /* teal */
    --gate:  oklch(0.58 0.11 75);    /* amber */
    --improve: oklch(0.50 0.11 300); /* violet */
    --pass: oklch(0.52 0.10 150);    /* green */
    --fail: oklch(0.55 0.14 25);     /* red */

    --outer-wash: oklch(0.95 0.025 250);
    --inner-wash: oklch(0.95 0.025 190);
    --gate-wash:  oklch(0.95 0.030 75);
    --improve-wash: oklch(0.95 0.025 300);

    /* density */
    --pad-1: 6px; --pad-2: 12px; --pad-3: 18px; --pad-4: 28px; --pad-5: 44px;
    --row-h: 44px;

    --font-serif: "Source Serif 4", ui-serif, Georgia, serif;
    --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --paper: oklch(0.16 0.008 270);
    --paper-2: oklch(0.20 0.010 270);
    --paper-3: oklch(0.24 0.012 270);
    --rule: oklch(0.30 0.012 270);
    --rule-strong: oklch(0.40 0.012 270);
    --ink: oklch(0.94 0.006 85);
    --ink-2: oklch(0.80 0.006 85);
    --ink-3: oklch(0.65 0.008 85);
    --ink-4: oklch(0.50 0.010 85);

    --outer: oklch(0.72 0.12 250);
    --inner: oklch(0.72 0.11 190);
    --gate:  oklch(0.78 0.13 75);
    --improve: oklch(0.72 0.12 300);
    --pass: oklch(0.72 0.12 150);
    --fail: oklch(0.72 0.15 25);

    --outer-wash: oklch(0.26 0.045 250);
    --inner-wash: oklch(0.26 0.040 190);
    --gate-wash:  oklch(0.27 0.050 75);
    --improve-wash: oklch(0.26 0.045 300);
  }
  html[data-density="compact"] {
    --pad-1: 4px; --pad-2: 8px; --pad-3: 12px; --pad-4: 18px; --pad-5: 28px;
    --row-h: 34px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  html[data-density="compact"] body { font-size: 13px; }

  ::selection { background: var(--gate-wash); color: var(--ink); }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ───────── Top ledger bar ───────── */
  .ledger-bar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: end;
    gap: var(--pad-4);
    padding: var(--pad-4) var(--pad-5) var(--pad-3);
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .eyebrow .sep { color: var(--ink-4); }
  .eyebrow .live {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .eyebrow .live::before {
    content: "";
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pass);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--pass) 20%, transparent);
  }
  h1.title {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: 38px;
    letter-spacing: -0.015em;
    line-height: 1.05;
    margin: 6px 0 2px;
    color: var(--ink);
  }
  html[data-density="compact"] h1.title { font-size: 30px; }
  .subtitle {
    color: var(--ink-2);
    font-size: 14px;
    max-width: 820px;
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 300;
  }

  .ledger-meta {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: var(--pad-3);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    text-align: right;
  }
  .ledger-meta dt { text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-4); font-size: 10px; margin-bottom: 2px; }
  .ledger-meta dd { margin: 0; color: var(--ink-2); font-weight: 500; }

  /* ───────── Main grid ───────── */
  main {
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    gap: 0;
  }
  @media (max-width: 1280px) {
    main { grid-template-columns: 280px 1fr 320px; }
  }

  .col {
    padding: var(--pad-4) var(--pad-4);
    border-right: 1px solid var(--rule);
    min-width: 0;
  }
  .col:last-child { border-right: 0; }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 var(--pad-3);
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .section-label .num {
    font-weight: 500;
    color: var(--ink-4);
  }

  /* ───────── Feature identity (left) ───────── */
  .feature-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .feature-id .pill {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid var(--rule-strong);
    border-radius: 2px;
    color: var(--ink-2);
    margin-right: 6px;
    background: var(--paper-2);
  }
  .feature-title {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0 0 14px;
    text-wrap: balance;
  }
  html[data-density="compact"] .feature-title { font-size: 18px; }

  /* Benefit chain */
  .chain {
    list-style: none;
    padding: 0;
    margin: 0 0 var(--pad-4);
    border-left: 1px solid var(--rule);
  }
  .chain li {
    position: relative;
    padding: 10px 0 10px 18px;
    border-bottom: 1px dashed var(--rule);
  }
  html[data-density="compact"] .chain li { padding: 6px 0 6px 16px; }
  .chain li:last-child { border-bottom: 0; }
  .chain li::before {
    content: "";
    position: absolute;
    left: -3.5px;
    top: 16px;
    width: 6px; height: 6px;
    background: var(--ink-4);
    border-radius: 50%;
  }
  html[data-density="compact"] .chain li::before { top: 12px; }
  .chain .k {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 2px;
  }
  .chain .v {
    color: var(--ink);
    font-size: 13px;
    line-height: 1.35;
  }
  .chain .meta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    margin-top: 3px;
  }

  /* Hash manifest */
  .manifest {
    font-family: var(--font-mono);
    font-size: 10.5px;
    border: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .manifest .m-row {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 7px 10px;
    border-bottom: 1px solid var(--rule);
    gap: 8px;
  }
  html[data-density="compact"] .manifest .m-row { padding: 5px 8px; }
  .manifest .m-row:last-child { border-bottom: 0; }
  .manifest .m-name { color: var(--ink-2); }
  .manifest .m-hash {
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .manifest .m-head {
    background: var(--paper-3);
    font-size: 9.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    border-bottom: 1px solid var(--rule);
  }
  .manifest .m-verified {
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pass);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* ───────── Center: Pipeline strip ───────── */
  .center-col {
    padding: var(--pad-4) var(--pad-4) var(--pad-5);
    background:
      linear-gradient(to bottom, var(--paper) 0%, var(--paper) 100%);
  }

  .loops {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-bottom: var(--pad-4);
  }
  .loop {
    background: var(--paper);
    padding: var(--pad-3) var(--pad-3) var(--pad-2);
  }
  .loop .loop-head {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-3);
    margin-bottom: 8px;
  }
  .loop .loop-head .dot {
    display: inline-block; width: 7px; height: 7px;
    margin-right: 8px; vertical-align: 1px;
  }
  .loop.outer .dot { background: var(--outer); }
  .loop.inner .dot { background: var(--inner); }
  .loop .loop-head .count { color: var(--ink-4); font-weight: 500; }

  /* Phase strip */
  .strip-wrap {
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .strip-wrap::-webkit-scrollbar { height: 6px; }
  .strip-wrap::-webkit-scrollbar-thumb { background: var(--rule); }
  .strip {
    display: grid;
    gap: 2px;
    grid-template-columns: repeat(12, minmax(86px, 1fr));
    position: relative;
    min-width: min-content;
  }
  .phase {
    position: relative;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 0;
    padding: 10px 10px 8px;
    cursor: pointer;
    transition: background 120ms ease;
    min-height: 98px;
    min-width: 0;
    display: flex; flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  .phase .p-name {
    overflow-wrap: anywhere;
    word-break: normal;
  }
  html[data-density="compact"] .phase { min-height: 80px; padding: 7px 8px 6px; }
  .phase:hover { background: var(--paper-3); }
  .phase[data-state="done"] { background: var(--paper); }
  .phase[data-state="current"] {
    background: var(--gate-wash);
    border-color: var(--gate);
    box-shadow: inset 0 -2px 0 var(--gate);
  }
  .phase[data-state="upcoming"] { opacity: 0.55; }
  .phase[data-loop="outer"][data-state="done"] { border-left: 2px solid var(--outer); }
  .phase[data-loop="inner"][data-state="done"] { border-left: 2px solid var(--inner); }
  .phase[data-loop="gate"][data-state="done"] { border-left: 2px solid var(--gate); }
  .phase[data-loop="improve"][data-state="done"] { border-left: 2px solid var(--improve); }

  .phase .p-idx {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .phase .p-name {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.15;
    overflow-wrap: anywhere;
  }
  .phase .p-verdict {
    margin-top: auto;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .phase[data-state="done"] .p-verdict { color: var(--pass); }
  .phase[data-state="current"] .p-verdict { color: var(--gate); font-weight: 600; }

  /* Current phase detail */
  .current-detail {
    margin-top: var(--pad-4);
    border: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .cd-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--pad-2) var(--pad-3);
    border-bottom: 1px solid var(--rule);
    background: var(--paper-3);
  }
  .cd-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex; align-items: center; gap: 10px;
  }
  .cd-title .ribbon {
    display: inline-block;
    padding: 2px 8px;
    background: var(--gate);
    color: var(--paper);
    font-size: 10px;
    letter-spacing: 0.14em;
  }
  html[data-theme="dark"] .cd-title .ribbon { color: oklch(0.15 0.008 270); }
  .cd-body {
    padding: var(--pad-3);
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: var(--pad-4);
  }
  @media (max-width: 1100px) { .cd-body { grid-template-columns: 1fr; } }

  .criteria { list-style: none; padding: 0; margin: 0; }
  .criteria li {
    display: grid;
    grid-template-columns: 16px 1fr auto;
    align-items: start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px dashed var(--rule);
    font-size: 13px;
  }
  html[data-density="compact"] .criteria li { padding: 4px 0; font-size: 12.5px; }
  .criteria li:last-child { border-bottom: 0; }
  .criteria .box {
    width: 14px; height: 14px;
    border: 1px solid var(--rule-strong);
    margin-top: 2px;
    position: relative;
    background: var(--paper);
  }
  .criteria .box.done {
    background: var(--ink);
    border-color: var(--ink);
  }
  .criteria .box.done::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 3px;
    border-left: 1.5px solid var(--paper);
    border-bottom: 1.5px solid var(--paper);
    transform: rotate(-45deg);
  }
  .criteria .box.pending {
    background: repeating-linear-gradient(-45deg, var(--rule) 0 2px, transparent 2px 4px);
  }
  .criteria .c-text { color: var(--ink); }
  .criteria .c-text.strike { color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-4); }
  .criteria .c-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .approvals {
    border-left: 1px solid var(--rule);
    padding-left: var(--pad-3);
  }
  .approvals h4 {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 0 0 10px;
  }
  .approver {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 10px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px dashed var(--rule);
    font-size: 13px;
  }
  .approver:last-child { border-bottom: 0; }
  .approver .avatar {
    width: 28px; height: 28px;
    background: var(--paper-3);
    border: 1px solid var(--rule-strong);
    display: grid; place-items: center;
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 12px;
    color: var(--ink-2);
  }
  .approver .a-name { color: var(--ink); font-weight: 500; font-size: 13px; line-height: 1.1; }
  .approver .a-role { color: var(--ink-3); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; }
  .approver .a-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .approver .a-status.signed { color: var(--pass); }
  .approver .a-status.pending { color: var(--gate); }

  /* Estimation actuals */
  .estimation {
    margin-top: var(--pad-4);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .est-cell {
    padding: var(--pad-3);
    border-right: 1px solid var(--rule);
  }
  .est-cell:last-child { border-right: 0; }
  .est-k {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .est-v {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }
  html[data-density="compact"] .est-v { font-size: 22px; }
  .est-delta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    margin-top: 6px;
  }
  .est-delta.ahead { color: var(--pass); }
  .est-delta.behind { color: var(--fail); }

  /* Inner-loop status grid */
  .inner-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1.3fr;
    border: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .ig-col { border-right: 1px solid var(--rule); min-width: 0; }
  .ig-col:last-child { border-right: 0; }
  .ig-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px var(--pad-3);
    border-bottom: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--paper);
  }
  .ig-head span:last-child {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-transform: none;
  }
  .ig-done .ig-head { border-top: 2px solid var(--pass); }
  .ig-disp .ig-head { border-top: 2px solid var(--inner); }
  .ig-blk  .ig-head { border-top: 2px solid var(--fail); }
  .ig-body {
    padding: var(--pad-3);
    display: flex;
    flex-wrap: wrap;
    gap: 5px 6px;
    align-content: flex-start;
  }
  .ig-body.rows { flex-direction: column; flex-wrap: nowrap; gap: 8px; }
  html[data-density="compact"] .ig-body { padding: 10px var(--pad-3); gap: 4px 5px; }
  .story-chip {
    font-family: var(--font-mono);
    font-size: 10.5px;
    padding: 3px 7px;
    border: 1px solid var(--rule-soft);
    color: var(--ink-2);
    background: var(--paper);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .story-chip.done {
    color: var(--pass);
    border-color: color-mix(in oklch, var(--pass) 40%, var(--rule));
    background: color-mix(in oklch, var(--pass) 7%, var(--paper));
  }
  .story-chip.current {
    color: var(--inner);
    border-color: color-mix(in oklch, var(--inner) 40%, var(--rule));
    background: color-mix(in oklch, var(--inner) 7%, var(--paper));
  }
  .story-chip.blocked {
    color: var(--fail);
    border-color: color-mix(in oklch, var(--fail) 40%, var(--rule));
    background: color-mix(in oklch, var(--fail) 7%, var(--paper));
  }
  .disp-row, .blk-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: baseline;
  }
  .disp-url {
    font-family: var(--font-mono);

function buildFeatureFromState(slug, ps) {
  if (!ps || !ps.features) return null;
  const features = Array.isArray(ps.features) ? ps.features : [];
  const feat = features.find(f => f.slug === slug);
  if (!feat) return null;

  const allStories = [];
  (feat.epics || []).forEach(e => (e.stories || []).forEach(s => allStories.push(s)));

  const cplx = { "1": 0, "2": 0, "3": 0 };
  allStories.forEach(s => { const c = String(s.complexity || "2"); cplx[c] = (cplx[c] || 0) + 1; });

  const feature = {
    id: slug,
    cycle: feat.track || slug.replace(/^\d{4}-\d{2}-\d{2}-/, ''),
    title: feat.name || feat.title || slug,
    surface: "git-native",
    epicCount: (feat.epics || []).length,
    storyCount: allStories.length,
    complexity: cplx,
    slicingStrategy: feat.slicingStrategy || "—",
    metrics: [],
    discoveryArtefact: `artefacts/${slug}/discovery.md`,
    nfrProfile: `artefacts/${slug}/nfr-profile.md`,
    approvedBy: feat.discoveryStatus === 'approved' ? "approved" : (feat.discoveryStatus || "—"),
    approvedNote: "",
    outerLoopPR: "",
    checkpoint: feat.updatedAt || "",
  };

  const dodComplete = [], dispatched = {}, blocked = {};
  allStories.forEach(s => {
    if (s.dodStatus === 'complete') dodComplete.push(s.slug);
    else if (s.issueUrl) dispatched[s.slug] = s.issueUrl;
    if (s.health === 'red') blocked[s.slug] = 'blocked';
  });

  return {
    feature,
    innerStatus: {
      dodComplete, dispatched, blocked,
      outerLoopComplete: ['definition-of-done', 'improve'].includes(feat.stage),
      outerLoopPR: "",
    },
    storyMap: Object.fromEntries(allStories.map(s => [s.slug, s])),
    featureSlug: slug,
    allStories,
  };
}

/* ───────── Tweaks host integration ───────── */

function useTweaks() {
  const [state, setState] = useState(() => ({ ...window.TWEAK_DEFAULTS }));
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      const m = e.data || {};
      if (m.type === "__activate_edit_mode") setEditMode(true);
      if (m.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", state.theme);
    document.documentElement.setAttribute("data-density", state.density);
    document.documentElement.setAttribute("data-traces", state.traces);
  }, [state]);

  const update = (patch) => {
    setState((s) => {
      const next = { ...s, ...patch };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
      return next;
    });
  };

  return { state, update, editMode };
}

        <div className="seg">
          {phaseOptions.map(([v, l]) => (
            <button key={v}
              className={state.currentPhase === v ? "active" : ""}
              onClick={() => update({ currentPhase: v })}>{l}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function CenterCol({ currentPhase, innerStatus, onStoryClick }) {
  const IS = innerStatus || INNER_STATUS;
  const phases = useMemo(() =>
    PHASES.map((p, idx) => {
      let state;
      if (idx < currentPhase) state = "done";
      else if (idx === currentPhase) state = "current";
      else state = "upcoming";
      return { ...p, state, idx };
    })
  , [currentPhase]);

  const outer = phases.filter(p => p.loop === "outer" || p.loop === "gate" && (p.name.includes("ready") || p.name.includes("done") || p.name.includes("improve")));
  // Simpler: separate by first-7 / last-5 visually
  const outerIdx = [0,1,2,3,4,5,10,11];
  const innerIdx = [6,7,8,9];

  const safeIdx = Math.max(0, Math.min(PHASES.length - 1, currentPhase ?? 8));
  const cur = phases[safeIdx] || phases[0];
  const curCriteria = CRITERIA_BY_PHASE[safeIdx] || CRITERIA_BY_PHASE[8] || [];

  return (
    <section className="col center-col">
      <div className="section-label"><span className="num">iii.</span> Pipeline · 12 phases · outer + inner</div>

      <div className="strip-wrap">
        <div className="strip">
          {phases.map((p) => (
            <div key={p.i}
                 className="phase"
                 data-state={p.state}
                 data-loop={p.loop}
                 title={`${p.name} · ${p.state}`}>
              <div className="p-idx">{p.i}</div>
              <div className="p-name">{p.name}</div>
              <div className="p-verdict">
                {p.state === "done"     ? "pass" :
                 p.state === "current"  ? "in progress" :
                                          "—"}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="current-detail">
        <div className="cd-head">
          <div className="cd-title">
            <span className="ribbon">current</span>
            <span>{cur.name}</span>
            <span className="muted" style={{marginLeft:8,letterSpacing:"0.08em"}}>· hash {cur.skillHash}</span>
          </div>
          <div className="mono muted" style={{fontSize:10.5,letterSpacing:"0.1em"}}>
            {cur.loop === "inner" ? "inner loop · coding agent" :
             cur.loop === "outer" ? "outer loop · operator + agent" :
             cur.loop === "gate"  ? "gate · automated" :
             "improve · agent"}
          </div>
        </div>
        <div className="cd-body">
          <div>
            <ul className="criteria">
              {curCriteria.map((c, i) => (
                <li key={i}>
                  <span className={`box ${c.d ? "done" : (c.pending ? "pending" : "")}`}></span>
                  <span className={`c-text ${c.d ? "strike" : ""}`}>{c.t}</span>
                  <span className="c-meta">
                    {c.d ? "verified" : (c.pending ? "pending" : "—")}
                  </span>
                </li>
              ))}
            </ul>
          </div>
          <div className="approvals">
            <h4>Approvers on this feature</h4>
            {APPROVERS.map((a, i) => (
              <div className="approver" key={`${a.initials}-${i}`}>
                <div className="avatar">{a.initials}</div>
                <div>
                  <div className="a-name">{a.name}</div>
                  <div className="a-role">{a.role}</div>
                  <div className={`a-status ${a.status}`}>
                    {a.status === "signed" ? `signed · ${a.at}` : "sign-off pending"}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="section-label" style={{marginTop: "var(--pad-4)"}}><span className="num">iv.</span> Inner-loop status</div>
      <div className="inner-grid">
        <div className="ig-col ig-done">
          <div className="ig-head">
            <span>dodComplete</span><span>{IS.dodComplete.length}</span>
          </div>
          <div className="ig-body">
            {IS.dodComplete.map(s => <span key={s} className="story-chip done" style={{cursor:'pointer'}} onClick={() => onStoryClick && onStoryClick(s)}>{s}</span>)}
          </div>
        </div>
        <div className="ig-col ig-disp">
          <div className="ig-head">
            <span>dispatched</span><span>{Object.keys(IS.dispatched).length}</span>
          </div>
          <div className="ig-body rows">
            {Object.entries(IS.dispatched).map(([s, url]) => (
              <div className="disp-row" key={s}>
                <span className="story-chip current" style={{cursor:'pointer'}} onClick={() => onStoryClick && onStoryClick(s)}>{s}</span>
                <span className="disp-url">{url}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="ig-col ig-blk">
          <div className="ig-head">
            <span>blocked</span><span>{Object.keys(IS.blocked).length}</span>
          </div>
          <div className="ig-body rows">
            {Object.entries(IS.blocked).map(([s, reason]) => (
              <div className="blk-row" key={s}>
                <span className="story-chip blocked" style={{cursor:'pointer'}} onClick={() => onStoryClick && onStoryClick(s)}>{s}</span>
                <span className="blk-reason">{reason}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="section-label" style={{marginTop: "var(--pad-4)"}}><span className="num">v.</span> Estimation · actuals (cross-feature)</div>
      <div className="estimation" style={{gridTemplateColumns:"repeat(4, 1fr)"}}>
        <div className="est-cell">
          <div className="est-k">{ESTIMATION.e2.label}</div>
          <div className="est-v">{ESTIMATION.e2.v}</div>
          <div className="est-delta">{ESTIMATION.e2.d}</div>
        </div>
        <div className="est-cell">
          <div className="est-k">{ESTIMATION.perStory.label}</div>
          <div className="est-v">{ESTIMATION.perStory.v}</div>
          <div className="est-delta">{ESTIMATION.perStory.d}</div>
        </div>
        <div className="est-cell">
          <div className="est-k">{ESTIMATION.phase1.label}</div>
          <div className="est-v">{ESTIMATION.phase1.v}</div>
          <div className="est-delta">{ESTIMATION.phase1.d}</div>
        </div>
        <div className="est-cell">
          <div className="est-k">{ESTIMATION.phase2.label}</div>
          <div className="est-v">{ESTIMATION.phase2.v}</div>
          <div className="est-delta ahead">{ESTIMATION.phase2.d}</div>
        </div>
      </div>
    </section>
  );
}

      <div className="section-label" style={{paddingRight: "var(--pad-4)"}}>
        <span className="num">vi.</span> Trace ledger · phase-3

      <div className="trace-stream">

function FooterBar({ innerStatus }) {
  const IS = innerStatus || INNER_STATUS;
  const nDod = IS.dodComplete.length;
  const nDisp = Object.keys(IS.dispatched).length;
  const nBlk = Object.keys(IS.blocked).length;
  const blkList = Object.keys(IS.blocked).join(' · ');
  return (
    <footer>
      <div>
        <span>state · </span>
        <span className="mono">pipeline-state.json</span>
      </div>
      <div className="phases">
        <span className="done">dodComplete · {nDod}</span>
        <span className="current">dispatched · {nDisp}</span>
        <span className="pending">blocked · {nBlk}{blkList ? ` (${blkList})` : ''}</span>
      </div>
      <div style={{textAlign:"right"}}>
        <span className="muted">press </span><span className="kbd">t</span><span className="muted"> for tweaks</span>
      </div>

  );
}

function ArtefactDrawer({ storySlug, storyData, featureSlug, onClose }) {
  const [md, setMd] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activePath, setActivePath] = useState(null);
  const [paths, setPaths] = useState([]);

  useEffect(() => {
    if (!storySlug || !featureSlug || !window.ArtefactFetcher) { setLoading(false); return; }
    const sp = window.ArtefactFetcher.storyPaths(featureSlug, storySlug);
    const fp = window.ArtefactFetcher.featurePaths(featureSlug);
    const all = [...fp, ...sp];
    Promise.all(all.map(p =>
      window.ArtefactFetcher.fetch(p.path).then(txt => ({ ...p, exists: txt !== null }))
    )).then(results => {
      const found = results.filter(r => r.exists);
      setPaths(found);
      if (found.length > 0) {
        const storyFile = found.find(f => f.label.includes('story'));
        const first = storyFile || found[0];
        setActivePath(first.path);
        window.ArtefactFetcher.fetch(first.path).then(txt => { setMd(txt); setLoading(false); });
      } else {
        setLoading(false);
      }
    });
  }, [storySlug, featureSlug]);

  const loadPath = (path) => {
    setActivePath(path);
    setLoading(true);
    window.ArtefactFetcher.fetch(path).then(txt => { setMd(txt); setLoading(false); });
  };

  const rendered = useMemo(() => {
    if (!md) return '';
    if (window.renderMarkdown) return window.renderMarkdown(md);
    return '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
  }, [md]);

  const metaHtml = useMemo(() => {
    if (!storyData || !window.ArtefactFetcher) return '';
    const combined = window.ArtefactFetcher.buildStoryMeta(storyData) + '\n' + window.ArtefactFetcher.buildTraceLinks(storyData, featureSlug);
    if (window.renderMarkdown) return window.renderMarkdown(combined);
    return '<pre>' + combined.replace(/</g, '&lt;') + '</pre>';
  }, [storyData, featureSlug]);

  return (
    <div style={{position:'fixed',top:0,right:0,bottom:0,width:'520px',background:'var(--paper)',borderLeft:'2px solid var(--rule)',zIndex:100,display:'flex',flexDirection:'column',boxShadow:'-4px 0 20px rgba(0,0,0,0.3)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'var(--pad-2) var(--pad-3)',borderBottom:'1px solid var(--rule)'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600}}>{storySlug}</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--ink)',cursor:'pointer',fontSize:18,padding:'4px 8px'}}>×</button>
      </div>
      {paths.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:4,padding:'6px var(--pad-3)',borderBottom:'1px solid var(--rule)',background:'var(--paper-2)'}}>
          {paths.map(p => (
            <button key={p.path} onClick={() => loadPath(p.path)}
              style={{fontSize:10,padding:'3px 8px',fontFamily:'var(--font-mono)',background:activePath === p.path ? 'var(--inner)' : 'var(--paper-3)',border:'1px solid var(--rule)',color:activePath === p.path ? '#fff' : 'var(--ink-2)',cursor:'pointer',borderRadius:2}}>
              {p.label}
            </button>
          ))}
        </div>
      )}
      <div style={{flex:1,overflow:'auto',padding:'var(--pad-3)'}}>
        {loading ? <div style={{color:'var(--ink-3)',fontStyle:'italic'}}>Loading…</div> :
         md === null && paths.length === 0 ? <div style={{color:'var(--ink-3)'}}>No artefacts found for {storySlug}</div> :
         <div dangerouslySetInnerHTML={{__html: rendered}} style={{fontFamily:'var(--font-sans)',fontSize:13,lineHeight:1.6,color:'var(--ink)'}} />}
        {metaHtml && <div dangerouslySetInnerHTML={{__html: metaHtml}} style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--rule)',fontSize:13,lineHeight:1.6}} />}
      </div>
    </div>
  );
}

function App() {
  const { state, update, editMode } = useTweaks();
  const [panelOpen, setPanelOpen] = useState(false);
  const [dynData, setDynData] = useState(null);
  const [drawerSlug, setDrawerSlug] = useState(null);

  useEffect(() => {
    if (!FEATURE_PARAM) return;
    const handler = () => {
      const result = buildFeatureFromState(FEATURE_PARAM, window.PIPELINE_STATE);
      if (result) setDynData(result);
    };
    window.addEventListener('pipeline-loaded', handler);
    if (window.PIPELINE_STATE) handler();
    return () => window.removeEventListener('pipeline-loaded', handler);
  }, []);

  const ef = dynData ? dynData.feature : FEATURE;
  const eis = dynData ? dynData.innerStatus : INNER_STATUS;
  const fSlug = dynData ? dynData.featureSlug : FEATURE.id;
  const sMap = dynData ? dynData.storyMap : {};

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "t" && !e.metaKey && !e.ctrlKey && !e.altKey) {
        if (document.activeElement && ["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) return;
        setPanelOpen((v) => !v);
      }
      if (e.key === "Escape") { setPanelOpen(false); setDrawerSlug(null); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  useEffect(() => { if (editMode) setPanelOpen(true); }, [editMode]);

  return (
    <div className="app">
      <LedgerBar feature={ef} featureSlug={fSlug} />
      <main>
        <LeftCol feature={ef} />
        <CenterCol currentPhase={state.currentPhase} innerStatus={eis} onStoryClick={setDrawerSlug} />
        <RightCol tracesDetail={state.traces === "detail"} />
      </main>
      <FooterBar innerStatus={eis} />
      <TweaksPanel state={state} update={update} open={panelOpen} onClose={() => setPanelOpen(false)} />
      {drawerSlug && <ArtefactDrawer storySlug={drawerSlug} storyData={sMap[drawerSlug]} featureSlug={fSlug} onClose={() => setDrawerSlug(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
