<!doctype html>
<html lang="en" data-theme="light" data-density="comfortable" data-layout="swimlane">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Repo — Skills Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="md-renderer.js"></script>
<script src="artefact-content.js"></script>
<script src="extra-data.js"></script>
<script src="pipeline-adapter.js"></script>
<script src="artefact-fetcher.js"></script>
<link rel="stylesheet" href="extra-views.css">
<style>
  :root {
    --paper: oklch(0.985 0.004 85);
    --paper-2: oklch(0.965 0.006 85);
    --paper-3: oklch(0.945 0.008 85);
    --paper-4: oklch(0.925 0.010 85);
    --rule: oklch(0.88 0.008 85);
    --rule-soft: oklch(0.92 0.006 85);
    --rule-strong: oklch(0.78 0.010 85);
    --ink: oklch(0.22 0.012 270);
    --ink-2: oklch(0.38 0.012 270);
    --ink-3: oklch(0.55 0.010 270);
    --ink-4: oklch(0.70 0.008 270);

    --outer: oklch(0.48 0.11 250);
    --inner: oklch(0.48 0.10 190);
    --gate:  oklch(0.58 0.11 75);
    --improve: oklch(0.50 0.11 300);
    --pass: oklch(0.52 0.10 150);
    --fail: oklch(0.55 0.14 25);

    --outer-wash: oklch(0.95 0.025 250);
    --inner-wash: oklch(0.95 0.025 190);
    --gate-wash:  oklch(0.95 0.030 75);
    --improve-wash: oklch(0.95 0.025 300);

    --font-serif: "Source Serif 4", ui-serif, Georgia, serif;
    --font-ui: "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --paper: oklch(0.16 0.008 270);
    --paper-2: oklch(0.20 0.010 270);
    --paper-3: oklch(0.24 0.012 270);
    --paper-4: oklch(0.28 0.012 270);
    --rule: oklch(0.30 0.012 270);
    --rule-soft: oklch(0.25 0.010 270);
    --rule-strong: oklch(0.40 0.012 270);
    --ink: oklch(0.94 0.006 85);
    --ink-2: oklch(0.80 0.006 85);
    --ink-3: oklch(0.65 0.008 85);
    --ink-4: oklch(0.50 0.010 85);
    --outer: oklch(0.72 0.12 250);
    --inner: oklch(0.72 0.11 190);
    --gate:  oklch(0.78 0.13 75);
    --improve: oklch(0.72 0.12 300);
    --pass: oklch(0.72 0.12 150);
    --fail: oklch(0.72 0.15 25);
    --outer-wash: oklch(0.26 0.045 250);
    --inner-wash: oklch(0.26 0.040 190);
    --gate-wash:  oklch(0.27 0.050 75);
    --improve-wash: oklch(0.26 0.045 300);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  ::selection { background: var(--gate-wash); color: var(--ink); }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
  }

  /* ───────── Top bar ───────── */
  .ledger-bar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: end;
    gap: 28px;
    padding: 24px 32px 14px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex; gap: 12px; align-items: center;
  }
  .eyebrow .sep { color: var(--ink-4); }
  .eyebrow .live { display: inline-flex; align-items: center; gap: 6px; color: var(--pass); }
  .eyebrow .live::before { content:""; width:6px; height:6px; border-radius:50%; background: var(--pass); }
  .title {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: 46px;
    letter-spacing: -0.025em;
    margin: 8px 0 0;
    line-height: 1;
  }
  .title em { font-style: italic; font-weight: 400; color: var(--ink-3); }
  .subtitle {
    margin-top: 8px;
    font-family: var(--font-serif);
    font-size: 14px;
    color: var(--ink-3);
    max-width: 58ch;
  }
  .ledger-meta {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 18px;
    margin: 0;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .ledger-meta dt {
    color: var(--ink-4);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .ledger-meta dd { margin: 0; color: var(--ink); font-weight: 500; }
  .nav {
    display: flex; gap: 2px; border: 1px solid var(--rule); padding: 2px; align-self: end;
    background: var(--paper-2);
  }
  .nav a {
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid transparent;
  }
  .nav a.active { background: var(--paper); color: var(--ink); border-color: var(--rule); }
  .nav a:hover:not(.active) { color: var(--ink); background: var(--paper-3); }

  /* ───────── Phase header strip (column header) ───────── */
  .phase-header {
    display: grid;
    grid-template-columns: var(--row-left) repeat(12, minmax(86px, 1fr));
    border-bottom: 1px solid var(--rule-strong);
    background: var(--paper-2);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  :root { --row-left: 280px; }
  html[data-density="compact"] { --row-left: 240px; }
  .phase-header .ph-corner {
    padding: 12px 16px;
    border-right: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .phase-header .ph-cell {
    padding: 10px 8px 8px;
    border-right: 1px solid var(--rule);
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .phase-header .ph-cell:last-child { border-right: 0; }
  .phase-header .ph-idx {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: var(--ink-4);
  }
  .phase-header .ph-name {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink);
    overflow-wrap: anywhere;
    line-height: 1.15;
  }
  .phase-header .ph-loop {
    margin-top: 3px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
  }
  .phase-header .ph-cell[data-loop="outer"] { border-top: 2px solid var(--outer); }
  .phase-header .ph-cell[data-loop="inner"] { border-top: 2px solid var(--inner); }
  .phase-header .ph-cell[data-loop="gate"]  { border-top: 2px solid var(--gate); }
  .phase-header .ph-cell[data-loop="improve"] { border-top: 2px solid var(--improve); }

  /* ───────── Body layout ───────── */
  main.body {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: 0;
  }
  html[data-density="compact"] main.body { grid-template-columns: 1fr 320px; }
  main.body[data-top="outcomes"],
  main.body[data-top="governance"],
  main.body[data-top="guardrails"],
  main.body[data-top="storymap"],
  main.body[data-top="benefits"],
  main.body[data-top="fleet"] { grid-template-columns: 1fr; }
  .swim-col, .side-col { min-width: 0; }
  .side-col {
    border-left: 1px solid var(--rule-strong);
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    background: var(--paper);
  }

  /* ───────── Swimlane rows ───────── */
  .cycle-group { border-bottom: 1px solid var(--rule-strong); }
  .cycle-head {
    display: grid;
    grid-template-columns: var(--row-left) 1fr;
    background: var(--paper-3);
    border-bottom: 1px solid var(--rule);
  }
  .cycle-head .ch-left {
    padding: 10px 16px;
    border-right: 1px solid var(--rule);
    display: flex; align-items: baseline; gap: 10px;
  }
  .cycle-head .ch-tag {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .cycle-head .ch-name {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .cycle-head .ch-right {
    padding: 10px 16px;
    display: flex;
    gap: 18px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    flex-wrap: wrap;
  }
  .cycle-head .ch-right .stat { display: inline-flex; gap: 6px; align-items: baseline; }
  .cycle-head .ch-right .stat .n { color: var(--ink); font-weight: 600; font-size: 12px; }
  .cycle-head .ch-right .stat.ok .n { color: var(--pass); }
  .cycle-head .ch-right .stat.bk .n { color: var(--fail); }
  .cycle-head .ch-right .stat.flight .n { color: var(--inner); }
  .cycle-head .ch-right .phase-ind {
    display: flex; gap: 3px; align-items: center;
  }
  .cycle-head .ch-right .phase-ind .dot {
    width: 7px; height: 7px; background: var(--ink-4);
  }
  .cycle-head .ch-right .phase-ind .dot.done { background: var(--pass); }
  .cycle-head .ch-right .phase-ind .dot.cur  { background: var(--gate); width: 10px; }
  .cycle-head .ch-right .phase-ind .dot.blk  { background: var(--fail); }

  .epic-row {
    display: grid;
    grid-template-columns: var(--row-left) repeat(12, minmax(86px, 1fr));
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 120ms ease;
  }
  .epic-row:hover { background: var(--paper-2); }
  .epic-row.selected { background: var(--paper-2); }
  .epic-row.selected .e-left { background: var(--paper-3); }

  .e-left {
    padding: 10px 16px;
    border-right: 1px solid var(--rule);
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 4px;
  }
  .e-id {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex; gap: 8px; align-items: center;
  }
  .e-id .risk {
    padding: 1px 5px; border: 1px solid var(--rule);
    font-size: 9px; color: var(--ink-3);
  }
  .e-id .risk[data-r="high"] { color: var(--fail); border-color: color-mix(in oklch, var(--fail) 40%, var(--rule)); }
  .e-id .risk[data-r="med"]  { color: var(--gate); border-color: color-mix(in oklch, var(--gate) 40%, var(--rule)); }
  .e-id .risk[data-r="low"]  { color: var(--pass); border-color: color-mix(in oklch, var(--pass) 40%, var(--rule)); }

  .e-name {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.25;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .e-foot {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    display: flex; gap: 8px; align-items: center;
  }
  .e-foot .spark {
    flex: 1;
    height: 4px;
    display: grid;
    grid-auto-flow: column;
    gap: 1px;
    min-width: 60px;
  }
  .e-foot .spark > div { background: var(--paper-4); }
  .e-foot .spark > div.d { background: var(--pass); }
  .e-foot .spark > div.c { background: var(--inner); }
  .e-foot .spark > div.b { background: var(--fail); }

  .cell {
    padding: 7px 6px;
    border-right: 1px solid var(--rule);
    min-width: 0;
    min-height: var(--cell-h, 78px);
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
    background: transparent;
  }
  html[data-density="compact"] { --cell-h: 58px; }
  :root { --cell-h: 78px; }
  .cell:last-child { border-right: 0; }
  .cell[data-loop="outer"] { background: color-mix(in oklch, var(--outer-wash) 20%, transparent); }
  .cell[data-loop="inner"] { background: color-mix(in oklch, var(--inner-wash) 20%, transparent); }
  .cell[data-loop="gate"]  { background: color-mix(in oklch, var(--gate-wash) 20%, transparent); }
  .cell[data-loop="improve"] { background: color-mix(in oklch, var(--improve-wash) 20%, transparent); }
  .cell.empty { background: transparent; }
  .cell.has-content.outer { background: color-mix(in oklch, var(--outer-wash) 55%, transparent); }
  .cell.has-content.inner { background: color-mix(in oklch, var(--inner-wash) 55%, transparent); }
  .cell.has-content.gate  { background: color-mix(in oklch, var(--gate-wash) 55%, transparent); }
  .cell.has-content.improve { background: color-mix(in oklch, var(--improve-wash) 55%, transparent); }

  .story {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 5px;
    border: 1px solid var(--rule-soft);
    color: var(--ink-2);
    background: var(--paper);
    letter-spacing: 0.02em;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .story.done {
    color: var(--pass);
    border-color: color-mix(in oklch, var(--pass) 40%, var(--rule));
    background: color-mix(in oklch, var(--pass) 10%, var(--paper));
  }
  .story.current {
    color: var(--inner);
    border-color: color-mix(in oklch, var(--inner) 40%, var(--rule));
    background: color-mix(in oklch, var(--inner) 10%, var(--paper));
    font-weight: 600;
  }
  .story.blocked {
    color: var(--fail);
    border-color: color-mix(in oklch, var(--fail) 45%, var(--rule));
    background: color-mix(in oklch, var(--fail) 8%, var(--paper));
    font-weight: 600;
  }
  .story.review {
    color: var(--gate);
    border-color: color-mix(in oklch, var(--gate) 45%, var(--rule));
    background: color-mix(in oklch, var(--gate) 10%, var(--paper));
  }
  .story .dot-b {
    width: 4px; height: 4px; background: var(--fail); border-radius: 50%;
    box-shadow: 0 0 0 2px color-mix(in oklch, var(--fail) 15%, transparent);
  }

  /* current phase (cycle's active) highlight column */
  .epic-row .cell.cur-col {
    box-shadow: inset 0 2px 0 var(--gate), inset 0 -2px 0 var(--gate);
  }

  /* ───────── Side column (tabs + content) ───────── */
  .side-tabs {
    display: flex;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .side-tabs button {
    flex: 1;
    appearance: none;
    border: 0;
    background: transparent;
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    cursor: pointer;
    border-right: 1px solid var(--rule);
    border-bottom: 2px solid transparent;
  }
  .side-tabs button:last-child { border-right: 0; }
  .side-tabs button.active {
    background: var(--paper);
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .side-tabs button .n {
    display: inline-block;
    margin-left: 6px;
    color: var(--ink-3);
  }
  .side-tabs button.active .n { color: var(--ink); }

  .side-body {
    overflow-y: auto;
    min-height: 0;
    scrollbar-width: thin;
  }
  .side-body::-webkit-scrollbar { width: 6px; }
  .side-body::-webkit-scrollbar-thumb { background: var(--rule); }

  /* Artefacts table */
  .artefact-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule-soft);
    font-family: var(--font-mono);
    font-size: 10.5px;
  }
  .artefact-row:hover { background: var(--paper-2); }
  .a-path { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .a-path .cy { color: var(--ink-3); }
  .a-path .fn { color: var(--ink); font-weight: 600; }
  .a-meta { text-align: right; color: var(--ink-3); font-size: 9.5px; letter-spacing: 0.08em; }
  .a-meta .sha { color: var(--ink-2); margin-left: 6px; }
  .a-meta .st {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--rule);
    font-size: 8.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .a-meta .st.signed { color: var(--pass); border-color: color-mix(in oklch, var(--pass) 40%, var(--rule)); }
  .a-meta .st.draft  { color: var(--gate); border-color: color-mix(in oklch, var(--gate) 40%, var(--rule)); }
  .a-meta .st.stale  { color: var(--fail); border-color: color-mix(in oklch, var(--fail) 40%, var(--rule)); }
  .a-meta .st.live   { color: var(--inner); border-color: color-mix(in oklch, var(--inner) 40%, var(--rule)); }

  .artefacts-head, .blockers-head {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 8px 14px;
    border-bottom: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--paper-3);
    position: sticky; top: 0;
  }

  /* Blockers */
  .blocker-row {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .blocker-row:hover { background: var(--paper-2); }
  .b-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .b-id {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fail);
    font-weight: 600;
  }
  .b-age {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .b-reason {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--ink);
    line-height: 1.4;
  }
  .b-affect {
    margin-top: 5px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    display: flex; flex-wrap: wrap; gap: 5px;
    align-items: center;
  }
  .b-affect .lbl { color: var(--ink-4); letter-spacing: 0.12em; text-transform: uppercase; font-size: 9px; }

  /* ───────── Footer ───────── */
  footer {
    border-top: 1px solid var(--rule);
    padding: 10px 32px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    background: var(--paper-2);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
  }
  footer .legend {
    display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
  }
  footer .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  footer .legend .sw { width: 10px; height: 10px; border: 1px solid var(--rule); }
  footer .legend .sw.outer { background: var(--outer-wash); border-top: 2px solid var(--outer); }
  footer .legend .sw.inner { background: var(--inner-wash); border-top: 2px solid var(--inner); }
  footer .legend .sw.gate  { background: var(--gate-wash);  border-top: 2px solid var(--gate); }
  footer .legend .sw.improve { background: var(--improve-wash); border-top: 2px solid var(--improve); }

// DOC RESOLUTION — map artefacts, epics, stories → markdown documents
// ═══════════════════════════════════════════════════════════════════
function docForArtefact(a) {
  const md = (window.MD && window.MD[`${a.cycleId}:${a.file}`]) || `# ${a.file}\n\n_No content yet._`;
  return {
    key: `${a.cycleId}:${a.file}`,
    path: `/artefacts/${a.cycle}/${a.file}`,
    title: a.file,
    sha: a.sha,
    status: a.status,
    phase: a.phase,
    cycleId: a.cycleId,
    md,
  };
}

// epic → its cycle's definition.md (with synthesized header + traceability)
function docForEpic(epic) {
  const cycle = CYCLES.find(c => c.id === epic.cycleId);
  const featureSlug = cycle?.featureSlug || cycle?.id || "";
  const def = (window.MD && window.MD[`${epic.cycleId}:definition.md`]) || "";
  const header = window.epicDoc ? window.epicDoc(epic, cycle) : `# ${epic.name}\n`;

  // Summary table
  const done = epic.stories.filter(s => s.state === "done").length;
  const total = epic.stories.length;
  const summary = `\n\n## Epic summary\n\n| Field | Value |\n|---|---|\n| Stories | ${done}/${total} done |\n| Risk | ${epic.risk} |\n`;

  // Per-story list
  const storyList = epic.stories.map(s =>
    `- **${s.id}**${s.name ? " · " + s.name : ""} — ${s.state}${s.prUrl ? " · [PR](" + s.prUrl + ")" : ""}${s.issueUrl ? " · [Issue](" + s.issueUrl + ")" : ""}`
  ).join("\n");

  // Traceability links
  const traceLinks = featureSlug ? [
    "\n\n## Traceability\n",
    "| Element | Link |",
    "|---|---|",
    "| Feature | " + (cycle?.name || featureSlug) + " |",
    "| Discovery | [discovery.md](../artefacts/" + featureSlug + "/discovery.md) |",
    "| Benefit metric | [benefit-metric.md](../artefacts/" + featureSlug + "/benefit-metric.md) |",
    "| Definition | [definition.md](../artefacts/" + featureSlug + "/stories/) |",
  ].join("\n") : "";

  return {
    key: `${epic.cycleId}:epic:${epic.id}`,
    path: `/artefacts/${featureSlug}/epics/${epic.id}.md`,
    title: `${epic.id} · ${epic.name}`,
    sha: "b51cc903",
    status: "signed",
    phase: "definition",
    cycleId: epic.cycleId,
    featureSlug: featureSlug,
    md: header + summary + "\n\n## Stories\n\n" + storyList + traceLinks + (def ? "\n\n---\n\n## Full definition\n\n" + def : ""),
  };
}

// story → its phase's artefact, with a per-story preface + traceability links
function docForStory(story, epic) {
  const cycle = CYCLES.find(c => c.id === epic.cycleId);
  const phase = PHASES[PHASE_IDX[story.phase]];
  const featureSlug = cycle?.featureSlug || cycle?.id || "";
  // map phase key → filename
  const fileByPhase = {
    discovery: "discovery.md",
    benefit:   "benefit-metric.md",
    definition:"definition.md",
    review:    "review-notes.md",
    testplan:  "test-plan.md",
    dor:       "dor.md",
    dispatch:  "dor.md",
    inner:     "tdd-log.md",
    assurance: "test-plan.md",
    dod:       "trace.md",
    trace:     "trace.md",
    improve:   "improve-notes.md",
  };
  const fn = fileByPhase[story.phase] || "definition.md";
  const backing = (window.MD && window.MD[`${epic.cycleId}:${fn}`]) || "";
  const blockerReason = story.blockerId
    ? (BLOCKERS.find(b => b.id === story.blockerId)?.title)
    : null;

  // Build metadata section
  const AF = window.ArtefactFetcher;
  const meta = AF ? AF.buildStoryMeta(story) : "";
  const trace = AF ? AF.buildTraceLinks(story, featureSlug, epic.name) : "";

  const preface = window.storyDoc
    ? window.storyDoc(story.id, cycle?.tag, phase?.name, epic.name, story.state, story.blockerId, blockerReason)
    : `# ${story.id}${story.name ? " · " + story.name : ""}\n\n${epic.name}\n`;
  return {
    key: `${epic.cycleId}:story:${story.id}`,
    path: `/artefacts/${featureSlug}/stories/${story.id}.md`,
    title: `${story.id}${story.name ? " · " + story.name : ""}`,
    sha: "—",
    status: story.state,
    phase: story.phase,
    cycleId: epic.cycleId,
    featureSlug: featureSlug,
    storySlug: story.id,
    md: preface + "\n\n" + meta + "\n\n" + trace + (backing ? "\n\n---\n\n## Phase artefact\n\n" + backing : ""),
  };
}

// ── Shared: status pill ────────────────────────────────────────────
function StatusPill({ status }) {
  const map = {
    met: { cls: "s-met", glyph: "●", label: "on target" },
    "on-track": { cls: "s-ok", glyph: "◐", label: "on track" },
    "at-risk": { cls: "s-warn", glyph: "◑", label: "at risk" },
    off: { cls: "s-fail", glyph: "◯", label: "off track" },
    nascent: { cls: "s-muted", glyph: "·", label: "nascent" },
    pending: { cls: "s-muted", glyph: "·", label: "pending" },
  };
  const e = map[status] || map.pending;
  return (
    <span className={"sp " + e.cls}>
      <i>{e.glyph}</i>{e.label}
    </span>
  );
}

function openMd(onOpenDoc, def) {
  onOpenDoc({
    key: def.key,
    path: def.path,
    title: def.title,
    sha: def.sha || "—",
    md: def.md || `# ${def.title}\n\nArtefact preview — see source at \`${def.path}\`.`,
  });
}

  const groups = useMemo(() => {
    const m = {};
    for (const o of filtered) (m[o.objective] ||= []).push(o);

            <option value="now">Now</option>
            <option value="next">Next</option>
            <option value="later">Later</option>
          </select>
          <select value={stat} onChange={e => setStat(e.target.value)}>
            <option value="all">All statuses</option>
            <option value="met">Met</option>
            <option value="on-track">On track</option>
            <option value="at-risk">At risk</option>
            <option value="off">Off track</option>
            <option value="nascent">Nascent</option>
          </select>
        </div>
      </div>

      {Object.keys(groups).length === 0 && (
        <div className="empty-state">No outcomes match this filter.</div>

      {Object.entries(groups).map(([obj, krs]) => (
        <div key={obj} className="outcome-group">
          <div className="og-head">
            <h3>{obj}</h3>
            <div className="og-meta">{krs.length} KR{krs.length !== 1 ? "s" : ""}</div>
          </div>
          <div className="outcome-list">
            {krs.map(o => (
              <div key={o.id} className="outcome-card">
                <div className="oc-head">
                  <div>
                    <div className="oc-id mono">{o.id} · {o.horizon}</div>

                  <div className="oc-kv"><span>current</span><b className="mono">{o.current}</b></div>
                  <div className="oc-kv"><span>target</span><b className="mono">{o.target}</b></div>
                </div>
                <div className="oc-note">{o.note}</div>
                <div className="oc-foot">
                  <span className="muted mono">linked →</span>
                  {(o.epics || []).map(eId => {
                    const ep = EPICS.find(x => x.id === eId);
                    return (
                      <button key={eId} className="chip-mono"
                        onClick={() => ep && onOpenEpic(ep)}

function GuardrailsView({ onOpenDoc }) {
  const rules = window.GUARDRAILS || [];

  const [cat, setCat] = useState("all");
  const [q, setQ] = useState("");
  const filtered = rules.filter(r =>
    (cat === "all" || r.category === cat) &&
    (!q || (r.rule + " " + r.id + " " + r.rationale).toLowerCase().includes(q.toLowerCase()))
  );
  return (
    <div className="view guardrails-view" data-screen-label="Guardrails">
      <div className="view-head">
        <div>
          <div className="eyebrow">guardrails registry</div>

            <span className="sep">·</span>
            <span>{cats.length} categories</span>
            <span className="sep">·</span>
            <span>source <span className="mono">/guardrails/registry.md</span></span>
          </div>
        </div>
        <div className="view-filters">
          <input type="text" placeholder="filter…" value={q} onChange={e => setQ(e.target.value)} />
        </div>
      </div>

      <div className="guard-cats">
        <button className={"gc-filter " + (cat === "all" ? "active" : "")} onClick={() => setCat("all")}>all ({rules.length})</button>
        {cats.map(c => (
          <button key={c}
            className={"gc-filter " + (cat === c ? "active" : "")}
            onClick={() => setCat(c)}>
            {c} ({rules.filter(r => r.category === c).length})
          </button>
        ))}
      </div>

      <table className="guard-table">
        <thead>
          <tr>
            <th style={{width: 90}}>ID</th>
            <th style={{width: 130}}>category</th>
            <th>Rule</th>

              path: `/guardrails/${r.id}.md`,
              title: `${r.id} · ${r.rule}`,
              md: `# ${r.id}\n\n**Category.** ${r.category}\n\n## Rule\n${r.rule}\n\n## Rationale\n${r.rationale}\n\n## Enforcement\n${r.enforcement}\n\n## Linked\n${(r.refs||[]).map(x=>"- "+x).join("\n") || "—"}\n`,
            })} style={{ cursor: "pointer" }}>
              <td className="mono" style={{fontWeight:600, color:"var(--ink)"}}>{r.id}</td>
              <td><span className={"gcat c-" + r.category.replace(/\s+/g, "-")}>{r.category}</span></td>

      </table>

  );
}

function StoryMapView({ onOpenDoc, onOpenEpic }) {
  const themes = window.STORY_THEMES || [];
  const [open, setOpen] = useState(() => new Set(themes.flatMap(t => t.epics.map(e => e.id))));
  const toggle = (id) => setOpen(s => {
    const n = new Set(s);
    if (n.has(id)) n.delete(id); else n.add(id);
    return n;
  });
  return (
    <div className="view storymap-view" data-screen-label="Story map">
      <div className="view-head">
        <div>
          <div className="eyebrow">story map</div>
          <h2>Themes → epics → stories.</h2>
          <div className="view-meta">
            <span>{themes.length} themes</span>
            <span className="sep">·</span>
            <span>{themes.reduce((n,t)=>n+t.epics.length,0)} epics</span>
            <span className="sep">·</span>
            <span>source <span className="mono">/story-map/themes/*.md</span></span>
          </div>
        </div>
      </div>

      <div className="sm-themes">
        {themes.map(t => (
          <div key={t.id} className="sm-theme">
            <div className="sm-th">
              <h3>{t.name}</h3>
              <div className="sm-th-meta">{t.epics.length} epics · {t.epics.reduce((n,e)=>n+e.stories.length,0)} stories</div>
            </div>
            <div className="sm-epics">
              {t.epics.map(ep => {
                const isOpen = open.has(ep.id);
                const epic = EPICS.find(e => e.id === ep.linkEpicId);
                return (
                  <div key={ep.id} className="sm-epic">
                    <div className="sm-ep-head" onClick={() => toggle(ep.id)}>
                      <span className="sm-ep-id">{ep.id}</span>
                      <span className="sm-ep-name">{ep.name}</span>
                      <span className="sm-ep-risk mono" data-r={ep.risk}>{ep.risk}</span>
                    </div>
                    {isOpen && (
                      <ul className="sm-stories">
                        {ep.stories.map(s => (
                          <li key={s.id} className="sm-story"
                            onClick={() => epic ? onOpenEpic(epic) : openMd(onOpenDoc, {
                              key: s.id, path: `/story-map/${s.id}.md`, title: `${s.id} · ${s.title}`,
                              md: `# ${s.id} · ${s.title}\n\n${s.acceptance || ""}`,
                            })}>
                            <div className="smS-head">
                              <span className={"smS-state " + s.state}>{s.state}</span>
                              <span className="smS-id mono">{s.id}</span>
                              <span style={{flex:1}}>{s.title}</span>
                              {s.state === "blocked" && <span className="smS-blk mono">{s.blocker}</span>}
                            </div>
                            <div className="smS-phase mono">phase {s.phase || "—"}{s.acceptance ? " · " + s.acceptance : ""}</div>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function setHtmlAttr(k, v) { document.documentElement.setAttribute(k, v); }

function App() {
  const d = window.TWEAK_DEFAULTS || {};
  const [theme, setTheme]     = useState(d.theme     || "light");
  const [density, setDensity] = useState(d.density   || "comfortable");
  const [layout, setLayout]   = useState(d.layout    || "swimlane");
  const [sideTab, setSideTab] = useState(d.sideTab   || "artefacts");
  const [topView, setTopView] = useState(d.topView   || "pipeline");
  const [selectedEpic, setSelectedEpic] = useState(null);
  const [viewDoc, setViewDoc] = useState(null);   // { key, path, title, sha, md, ... }
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { setHtmlAttr("data-theme", theme); }, [theme]);
  useEffect(() => { setHtmlAttr("data-density", density); }, [density]);
  useEffect(() => { setHtmlAttr("data-layout", layout); }, [layout]);

  const persist = (edits) => {
    try { window.parent.postMessage({ type:"__edit_mode_set_keys", edits }, "*"); } catch(_) {}
  };
  const update = (k, v, setter) => { setter(v); persist({ [k]: v }); };

  // edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      const t = e.data?.type;
      if (t === "__activate_edit_mode") setTweaksOpen(true);
      if (t === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "t" && !e.metaKey && !e.ctrlKey) {
        if (document.activeElement?.tagName !== "INPUT") setTweaksOpen(v => !v);
      }
      if (e.key === "Escape") { setSelectedEpic(null); setTweaksOpen(false); setViewDoc(null); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const epicsByCycle = useMemo(() => {
    const m = {};
    for (const e of EPICS) (m[e.cycleId] ||= []).push(e);
    return m;
  }, []);

  useEffect(() => {
    const handler = (e) => setViewDoc(e.detail);
    window.addEventListener("mdv-jump", handler);
    return () => window.removeEventListener("mdv-jump", handler);
  }, []);

  return (
    <div className="app" data-screen-label={"Repo · " + topView}>
      <TopBar />
      <TopTabs view={topView} onView={(v) => update("topView", v, setTopView)} />
      {topView === "pipeline" && <PhaseHeader />}
      <main className="body" data-top={topView}>
        {topView === "pipeline" && (
          <>
            <section className="swim-col" data-screen-label="Portfolio swimlane">
              {layout === "swimlane" && CYCLES.map(c => (
                <CycleGroup
                  key={c.id}
                  cycle={c}
                  epics={epicsByCycle[c.id] || []}
                  selected={selectedEpic?.id}
                  onSelect={setSelectedEpic}
                  onOpenDoc={setViewDoc}
                />
              ))}
              {layout === "kanban" && <Kanban onSelect={setSelectedEpic} onOpenDoc={setViewDoc} />}
            </section>
            <SideColumn
              sideTab={sideTab}
              onTab={(v) => update("sideTab", v, setSideTab)}
              onOpenDoc={setViewDoc}
            />
          </>
        )}
        {topView === "outcomes"   && <OutcomesView onOpenDoc={setViewDoc} onOpenEpic={setSelectedEpic} />}
        {topView === "governance" && <GovernanceView onOpenDoc={setViewDoc} />}
        {topView === "guardrails" && <GuardrailsView onOpenDoc={setViewDoc} />}
        {topView === "storymap"   && <StoryMapView onOpenDoc={setViewDoc} onOpenEpic={setSelectedEpic} />}
        {topView === "benefits"   && <BenefitsView onOpenDoc={setViewDoc} onOpenEpic={setSelectedEpic} />}
        {topView === "fleet"      && <FleetView onOpenDoc={setViewDoc} />}
      </main>
      <FooterBar />

      <Drawer epic={selectedEpic} onClose={() => setSelectedEpic(null)} onOpenDoc={setViewDoc} />
      <MdViewer doc={viewDoc} onClose={() => setViewDoc(null)} />

      <Tweaks
        open={tweaksOpen}
        onClose={() => setTweaksOpen(false)}
        theme={theme}       setTheme={(v) => update("theme", v, setTheme)}
        density={density}   setDensity={(v) => update("density", v, setDensity)}
        layout={layout}     setLayout={(v) => update("layout", v, setLayout)}
      />
    </div>
  );
}

function CycleGroup({ cycle, epics, selected, onSelect, onOpenDoc }) {
  const allStories = epics.flatMap(e => e.stories);
  const done = allStories.filter(s => s.state === "done").length;
  const flight = allStories.filter(s => s.state === "current").length;
  const blk = allStories.filter(s => s.state === "blocked").length;
  const review = allStories.filter(s => s.state === "review").length;

  // dot indicator per phase
  const phaseDots = PHASES.map(p => {
    const ss = allStories.filter(s => s.phase === p.key);
    if (ss.length === 0) return "empty";
    if (ss.some(s => s.state === "blocked")) return "blk";
    if (ss.some(s => s.state === "current") || ss.some(s => s.state === "review")) return "cur";
    if (ss.every(s => s.state === "done")) return "done";
    return "cur";
  });

  return (
    <div className="cycle-group">
      <div className="cycle-head">
        <div className="ch-left">
          <span className="ch-tag">{cycle.tag}</span>
          <span className="ch-name">{cycle.name}</span>
        </div>
        <div className="ch-right">
          <span className="stat ok"><span className="n">{done}</span><span>done</span></span>
          <span className="stat flight"><span className="n">{flight}</span><span>in flight</span></span>
          {review > 0 && <span className="stat"><span className="n">{review}</span><span>review</span></span>}
          {blk > 0 && <span className="stat bk"><span className="n">{blk}</span><span>blocked</span></span>}
          <span className="phase-ind" title="phase coverage">
            {phaseDots.map((d, i) => (
              <span key={i} className={`dot ${d === "empty" ? "" : d}`}
                    title={`${PHASES[i].name} · ${d}`} />
            ))}
          </span>
          <span className="muted">· {cycle.note}</span>
        </div>
      </div>
      {epics.map(epic => (
        <EpicRow
          key={epic.id}
          cycle={cycle}
          epic={epic}
          selected={selected === epic.id}
          onSelect={onSelect}
          onOpenDoc={onOpenDoc}
        />
      ))}
    </div>
  );
}

function EpicRow({ cycle, epic, selected, onSelect, onOpenDoc }) {
  const total = epic.stories.length;
  const done = epic.stories.filter(s => s.state === "done").length;
  const curN = epic.stories.filter(s => s.state === "current").length;
  const blkN = epic.stories.filter(s => s.state === "blocked").length;

  const openEpicDoc = (e) => { e.stopPropagation(); onOpenDoc(docForEpic(epic)); };
  const openStoryDoc = (e, s) => { e.stopPropagation(); onOpenDoc(docForStory(s, epic)); };

  return (
    <div className={`epic-row ${selected ? "selected" : ""}`} onClick={() => onSelect(epic)}>
      <div className="e-left" data-clickable="true" onClick={openEpicDoc} title="Open epic doc">
        <div className="e-id">
          <span>{epic.id}</span>
          <span className="risk" data-r={epic.risk}>{epic.risk}</span>
        </div>
        <div className="e-name">{epic.name}</div>
        <div className="e-foot">
          <span>{done}/{total}</span>
          <span className="spark" aria-hidden>
            {Array.from({ length: total }).map((_, i) => {
              const s = epic.stories[i];
              const cls = s.state === "done" ? "d" : s.state === "current" ? "c" : s.state === "blocked" ? "b" : "";
              return <div key={i} className={cls} />;
            })}
          </span>
          {blkN > 0 && <span style={{color:"var(--fail)"}}>{blkN} blk</span>}
        </div>
      </div>
      {PHASES.map(p => {
        const here = epic.stories.filter(s => s.phase === p.key);
        const cls = here.length ? `has-content ${p.loop}` : "empty";
        const isCur = cycle.currentPhase === p.key;
        return (
          <div key={p.key}
               className={`cell ${cls} ${isCur ? "cur-col" : ""}`}
               data-loop={p.loop}>
            {here.map(s => (
              <span key={s.id}
                    className={`story ${s.state}`}
                    data-clickable="true"
                    onClick={(e) => openStoryDoc(e, s)}
                    title={`${s.id}${s.name ? " · " + s.name : ""} · ${s.state}${s.blockerId ? " · " + s.blockerId : ""}${s.prUrl ? " · PR" : ""}${s.dodStatus === "complete" ? " · DoD ✓" : ""} · click to open doc`}>
                {s.state === "blocked" && <span className="dot-b" />}
                {s.id}
                {s.dodStatus === "complete" && <span style={{fontSize:9, marginLeft:2, opacity:0.7}}>✓</span>}
                {s.prUrl && <span style={{fontSize:9, marginLeft:2, opacity:0.7}}>⬤</span>}
              </span>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Kanban view
// ──────────────────────────────────────────────────────────────
function Kanban({ onSelect, onOpenDoc }) {
  // Group by phase, items are { epic, stories[] }
  const byPhase = {};
  for (const epic of EPICS) {
    for (const s of epic.stories) {
      (byPhase[s.phase] ||= []).push({ epic, story: s });
    }
  }
  // Collapse per (phase, epic) — one card per epic per phase
  const cards = {};
  for (const [phase, items] of Object.entries(byPhase)) {
    const map = {};
    for (const it of items) (map[it.epic.id] ||= { epic: it.epic, stories: [] }).stories.push(it.story);
    cards[phase] = Object.values(map);
  }

  return (
    <div className="kanban">
      {PHASES.map(p => {
        const arr = cards[p.key] || [];
        const n = arr.reduce((a, c) => a + c.stories.length, 0);
        return (
          <div key={p.key} className="k-col">
            <div className="k-head" data-loop={p.loop}>
              <div className="k-idx">{p.i} · {p.loop}</div>
              <div className="k-name">{p.name}</div>
              <div className="k-n">{arr.length} epic · {n} story</div>
            </div>
            <div className="k-body">
              {arr.map(c => (
                <div key={c.epic.id}
                     className="k-card"
                     data-cycle={c.epic.cycleId}
                     onClick={() => onSelect(c.epic)}>
                  <div className="kc-epic">{c.epic.id} · {CYCLES.find(x => x.id === c.epic.cycleId).tag}</div>
                  <div className="kc-name">{c.epic.name}</div>
                  <div className="kc-stories">
                    {c.stories.map(s => (
                      <span key={s.id}
                            className={`story ${s.state}`}
                            data-clickable="true"
                            onClick={(e) => { e.stopPropagation(); onOpenDoc(docForStory(s, c.epic)); }}
                            title={`${s.id}${s.name ? " · " + s.name : ""} · click to open doc`}>
                        {s.state === "blocked" && <span className="dot-b" />}
                        {s.id}
                        {s.dodStatus === "complete" && <span style={{fontSize:9, marginLeft:2, opacity:0.7}}>✓</span>}
                      </span>
                    ))}
                  </div>
                  <button className="view-link"
                          style={{marginTop:8}}
                          onClick={(e) => { e.stopPropagation(); onOpenDoc(docForEpic(c.epic)); }}>
                    view epic doc ↗
                  </button>
                </div>
              ))}
              {arr.length === 0 && (
                <div style={{padding:"18px 6px",fontFamily:"var(--font-mono)",fontSize:10,color:"var(--ink-4)",letterSpacing:"0.08em"}}>— no epics here —</div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Side column: Artefacts + Blockers tabs
// ──────────────────────────────────────────────────────────────
function SideColumn({ sideTab, onTab, onOpenDoc }) {
  return (
    <aside className="side-col">
      <div className="side-tabs">
        <button className={sideTab === "artefacts" ? "active" : ""} onClick={() => onTab("artefacts")}>
          Artefacts <span className="n">{ARTEFACTS.length}</span>
        </button>
        <button className={sideTab === "blockers" ? "active" : ""} onClick={() => onTab("blockers")}>
          Blockers <span className="n" style={{color:"var(--fail)"}}>{BLOCKERS.length}</span>
        </button>
      </div>
      {sideTab === "artefacts" && <ArtefactsPanel onOpenDoc={onOpenDoc} />}
      {sideTab === "blockers"  && <BlockersPanel />}
    </aside>
  );
}

function ArtefactsPanel({ onOpenDoc }) {
  // Group by cycle for scannability
  const groups = {};
  for (const a of ARTEFACTS) (groups[a.cycle] ||= []).push(a);

  return (
    <div className="side-body">
      {Object.entries(groups).map(([cycle, items]) => (
        <div key={cycle}>
          <div className="artefacts-head">
            <span>/artefacts/{cycle}/</span>
            <span>{items.length} md</span>
          </div>
          {items.map((a) => {
            const phase = PHASES[PHASE_IDX[a.phase]];
            return (
              <div key={cycle + a.file}
                   className="artefact-row"
                   onClick={() => onOpenDoc(docForArtefact(a))}
                   title={`/artefacts/${a.cycle}/${a.file} · click to open`}>
                <div className="a-path">
                  <span className="fn">{a.file}</span>
                  <span className="cy"> · {phase?.name}</span>
                </div>
                <div className="a-meta">
                  <span className="st {a.status}" style={{
                    borderColor: a.status === "signed" ? "color-mix(in oklch, var(--pass) 40%, var(--rule))" :
                                 a.status === "draft"  ? "color-mix(in oklch, var(--gate) 40%, var(--rule))" :
                                 a.status === "live"   ? "color-mix(in oklch, var(--inner) 40%, var(--rule))" :
                                                         "color-mix(in oklch, var(--fail) 40%, var(--rule))",
                    color: a.status === "signed" ? "var(--pass)" :
                           a.status === "draft"  ? "var(--gate)" :
                           a.status === "live"   ? "var(--inner)" :
                                                   "var(--fail)"
                  }}>{a.status}</span>
                  <span className="sha">sha {a.sha}</span>
                  <div style={{marginTop:3}}>{a.touched}</div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function BlockersPanel() {
  const sorted = [...BLOCKERS].sort((a, b) => parseInt(b.age) - parseInt(a.age));
  return (
    <div className="side-body">
      <div className="blockers-head">
        <span>age-sorted · oldest first</span>
        <span>{BLOCKERS.length}</span>
      </div>
      {sorted.map(b => {
        const cycle = CYCLES.find(c => c.id === b.cycleId);
        return (
          <div key={b.id} className="blocker-row">
            <div className="b-head">
              <span className="b-id">⚠ {b.id}</span>
              <span className="b-age">{b.age} · {b.severity}</span>
            </div>
            <div className="b-reason">{b.title}</div>
            <div className="b-affect">
              <span className="lbl">affects</span>
              {b.affects.map(s => <span key={s} className="story blocked"><span className="dot-b" />{s}</span>)}
              <span className="lbl" style={{marginLeft:6}}>· cycle</span>
              <span className="mono">{cycle?.tag}</span>
            </div>
            <div className="b-affect" style={{marginTop:3}}>
              <span className="lbl">owner</span>
              <span className="mono">{b.owner}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Drawer — per-epic drill-down
// ──────────────────────────────────────────────────────────────
function Drawer({ epic, onClose, onOpenDoc }) {
  if (!epic) return <div className="drawer-backdrop" />;
  const cycle = CYCLES.find(c => c.id === epic.cycleId);
  const artefacts = ARTEFACTS.filter(a => a.cycleId === epic.cycleId);
  const blockers = BLOCKERS.filter(b => b.affects.some(s => epic.stories.map(x => x.id).includes(s)));

  const phaseCounts = {};
  for (const s of epic.stories) phaseCounts[s.phase] = (phaseCounts[s.phase] || 0) + 1;

  return (
    <>
      <div className={`drawer-backdrop ${epic ? "open" : ""}`} onClick={onClose} />
      <aside className={`drawer ${epic ? "open" : ""}`}>
        <div className="drawer-head">
          <div>
            <div className="d-eyebrow">
              <span>{cycle.tag} · {epic.id}</span>
              <span>·</span>
              <span>risk {epic.risk}</span>
              <span>·</span>
              <span>{epic.stories.length} stories</span>
            </div>
            <h3>{epic.name}</h3>
          </div>
          <button className="drawer-close" onClick={onClose}>close · esc</button>
        </div>

        <div className="drawer-body">
          <section>
            <h4>Stories by phase</h4>
            <div className="mini-table">
              {PHASES.filter(p => phaseCounts[p.key]).map(p => {
                const here = epic.stories.filter(s => s.phase === p.key);
                return (
                  <div key={p.key} className="mt-row">
                    <div className="mt-k">{p.i} · {p.loop}</div>
                    <div className="mt-v">
                      <div className="mono" style={{fontSize:10,color:"var(--ink-3)",marginBottom:3}}>{p.name}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {here.map(s => (
                          <span key={s.id}
                                className={`story ${s.state}`}
                                data-clickable="true"
                                onClick={(e) => { e.stopPropagation(); onOpenDoc(docForStory(s, epic)); }}
                                title={`${s.id}${s.name ? " · " + s.name : ""} · click to open story doc`}>
                            {s.state === "blocked" && <span className="dot-b" />}
                            {s.id}
                          </span>
                        ))}
                      </div>
                    </div>
                    <div className="mt-meta">{here.length}</div>
                  </div>
                );
              })}
            </div>
          </section>

          <section>
            <h4>Cycle artefacts · {cycle.cycle || cycle.tag}</h4>
            <div className="mini-table">
              {artefacts.map(a => (
                <div key={a.file} className="mt-row artefact-row" onClick={() => onOpenDoc(docForArtefact(a))}>
                  <div className="mt-k">{PHASES[PHASE_IDX[a.phase]]?.name}</div>
                  <div className="mt-v">{a.file} <span className="view-link" style={{marginLeft:6}}>open ↗</span></div>
                  <div className="mt-meta">{a.status} · {a.sha}</div>
                </div>
              ))}
              {artefacts.length === 0 && (
                <div className="mt-row"><div className="mt-v muted" style={{gridColumn:"1 / -1"}}>no artefacts registered</div></div>
              )}
            </div>
          </section>

          {blockers.length > 0 && (
            <section>
              <h4>Blockers affecting this epic</h4>
              <div className="mini-table">
                {blockers.map(b => (
                  <div key={b.id} className="mt-row">
                    <div className="mt-k" style={{color:"var(--fail)"}}>{b.id}</div>
                    <div className="mt-v">{b.title}</div>
                    <div className="mt-meta">{b.age}</div>
                  </div>
                ))}
              </div>
            </section>
          )}
        </div>

        <div className="drawer-foot">
          <div className="muted mono" style={{fontSize:10,letterSpacing:"0.08em"}}>
            drill deeper →
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={onClose}>close</button>
            <a className="btn primary" href={`pipeline.html?feature=${encodeURIComponent(epic.cycleId)}`}>Open feature dashboard →</a>
          </div>
        </div>
      </aside>
    </>
  );
}

// ──────────────────────────────────────────────────────────────
// MdViewer — renders a markdown document in a right-side drawer
// ──────────────────────────────────────────────────────────────
function MdViewer({ doc, onClose }) {
  const open = !!doc;
  const [fetchedMd, setFetchedMd] = useState(null);
  const [fetchState, setFetchState] = useState("idle"); // idle | loading | done
  const [artefactList, setArtefactList] = useState([]); // available artefact paths
  const [activeArtefact, setActiveArtefact] = useState(null);

  // Fetch real .md artefacts when doc opens
  useEffect(() => {
    if (!doc) { setFetchedMd(null); setFetchState("idle"); setArtefactList([]); setActiveArtefact(null); return; }
    const AF = window.ArtefactFetcher;
    if (!AF || !doc.featureSlug) { setFetchState("done"); return; }

    setFetchState("loading");
    // Build artefact paths: story-specific + feature-level
    const paths = [];
    if (doc.storySlug) {
      AF.storyPaths(doc.featureSlug, doc.storySlug).forEach(p => paths.push(p));
    }
    AF.featurePaths(doc.featureSlug).forEach(p => paths.push(p));

    // Fetch all in parallel, keep the ones that resolve
    Promise.all(paths.map(p =>
      AF.fetch(p.path).then(content => content ? { ...p, content } : null)
    )).then(results => {
      const available = results.filter(Boolean);
      setArtefactList(available);
      // Auto-fetch the primary artefact (first story path that exists)
      if (available.length > 0 && doc.storySlug) {
        const primary = available.find(a => a.path.includes(doc.storySlug));
        if (primary) { setFetchedMd(primary.content); setActiveArtefact(primary.path); }
      }
      setFetchState("done");
    });
  }, [doc?.key]);

  const displayMd = activeArtefact && fetchedMd ? fetchedMd + "\n\n---\n\n" + (doc?.md || "") : (doc?.md || "");
  const html = useMemo(() => doc ? (window.renderMarkdown?.(displayMd) || "") : "", [doc, displayMd]);

  const loadArtefact = (a) => {
    setActiveArtefact(a.path);
    setFetchedMd(a.content);
  };

  // list of every doc in same cycle for prev/next nav
  const sibling = useMemo(() => {
    if (!doc) return { list: [], idx: -1 };
    const list = ARTEFACTS
      .filter(a => a.cycleId === doc.cycleId)
      .map(a => docForArtefact(a));
    const idx = list.findIndex(d => d.key === doc.key);
    return { list, idx };
  }, [doc]);

  const jump = (delta) => {
    const { list, idx } = sibling;
    if (idx < 0 || list.length === 0) return;
    const next = (idx + delta + list.length) % list.length;
    window.dispatchEvent(new CustomEvent("mdv-jump", { detail: list[next] }));
  };

  const statusColor = doc && (
    doc.status === "signed" ? "var(--pass)" :
    doc.status === "draft"  ? "var(--gate)" :
    doc.status === "live"   ? "var(--inner)" :
    doc.status === "done"   ? "var(--pass)" :
    doc.status === "current" ? "var(--inner)" :
    doc.status === "blocked" ? "var(--fail)" :
    "var(--ink-3)"
  );

  return (
    <>
      <div className={`mdv-backdrop ${open ? "open" : ""}`} onClick={onClose} />
      <aside className={`mdv ${open ? "open" : ""}`} aria-hidden={!open}>
        {doc && (
          <>
            <div className="mdv-head">
              <div className="mdv-title">
                <span>{doc.title}</span>
                <span className="path">{doc.path}</span>
              </div>
              <span className="mdv-sha" style={{color: statusColor, borderColor: `color-mix(in oklch, ${statusColor} 40%, var(--rule))`}}>
                {doc.status}
              </span>
              <button className="mdv-close" onClick={onClose}>close · esc</button>
            </div>
            {artefactList.length > 0 && (
              <div className="mdv-artefact-nav" style={{
                display:"flex", gap:4, padding:"6px 16px", borderBottom:"1px solid var(--rule)",
                background:"var(--paper-2)", flexWrap:"wrap", fontSize:11,
                fontFamily:"var(--font-mono)", letterSpacing:"0.04em",
              }}>
                <span style={{color:"var(--ink-3)", marginRight:4}}>artefacts:</span>
                {artefactList.map(a => (
                  <button key={a.path}
                    onClick={() => loadArtefact(a)}
                    style={{
                      background: activeArtefact === a.path ? "var(--ink)" : "var(--paper-3)",
                      color: activeArtefact === a.path ? "var(--paper)" : "var(--ink-2)",
                      border: "1px solid var(--rule)", padding: "2px 8px", cursor: "pointer",
                      fontFamily: "var(--font-mono)", fontSize: 10, borderRadius: 2,
                    }}>
                    {a.label}
                  </button>
                ))}
              </div>
            )}
            <div className="mdv-body" key={doc.key + (activeArtefact || "")}>
              {fetchState === "loading" && (
                <div style={{padding:16, color:"var(--ink-3)", fontFamily:"var(--font-mono)", fontSize:11}}>
                  Loading artefacts…
                </div>
              )}
              <article className="md" dangerouslySetInnerHTML={{ __html: html }} />
            </div>
            <div className="mdv-foot">
              <div>sha · {doc.sha}</div>
              <div className="nav-btns">
                {sibling.list.length > 1 && (
                  <>
                    <button className="mdv-close" onClick={() => jump(-1)}>← prev artefact</button>
                    <button className="mdv-close" onClick={() => jump(+1)}>next artefact →</button>
                  </>
                )}
              </div>
            </div>
          </>
        )}
      </aside>
    </>
  );
}

// ──────────────────────────────────────────────────────────────
function FooterBar() {
  return (
    <footer>
      <div className="mono">state · workspace/state.json + 3 mocked cycles</div>
      <div className="legend">
        <span className="item"><span className="sw outer" /> outer</span>
        <span className="item"><span className="sw inner" /> inner</span>
        <span className="item"><span className="sw gate" /> gate</span>
        <span className="item"><span className="sw improve" /> improve</span>
        <span className="item"><span className="sw blk" /> blocked</span>
      </div>
      <div style={{textAlign:"right"}}>
        <span className="muted">click an epic row · </span>
        <span className="kbd">t</span>
        <span className="muted"> tweaks · </span>
        <span className="kbd">esc</span>
      </div>
    </footer>
  );
}

// ──────────────────────────────────────────────────────────────
function Tweaks({ open, onClose, theme, setTheme, density, setDensity, layout, setLayout }) {
  const Seg = ({ value, onChange, options }) => (
    <div className="seg">
      {options.map(o => (
        <button key={o.v} className={value === o.v ? "active" : ""} onClick={() => onChange(o.v)}>{o.l}</button>
      ))}
    </div>
  );
  return (
    <div className={`tweaks ${open ? "open" : ""}`}>
      <header>
        <span>Tweaks</span>
        <button style={{appearance:"none",border:0,background:"transparent",color:"var(--ink-3)",cursor:"pointer"}} onClick={onClose}>×</button>
      </header>
      <div className="row">
        <label>Layout</label>
        <Seg value={layout} onChange={setLayout} options={[{v:"swimlane",l:"Swimlane"},{v:"kanban",l:"Kanban"}]} />
      </div>
      <div className="row">
        <label>Theme</label>
        <Seg value={theme} onChange={setTheme} options={[{v:"light",l:"Light"},{v:"dark",l:"Dark"}]} />
      </div>
      <div className="row">
        <label>Density</label>
        <Seg value={density} onChange={setDensity} options={[{v:"comfortable",l:"Comfort"},{v:"compact",l:"Compact"}]} />
      </div>
    </div>
  );
}

const __root = ReactDOM.createRoot(document.getElementById("root"));
let __appKey = 0;
__root.render(<App key={__appKey} />);
window.addEventListener('pipeline-loaded', () => {
  if (window.CYCLES) { CYCLES.length = 0; window.CYCLES.forEach(c => CYCLES.push(c)); }
  if (window.EPICS)  { EPICS.length  = 0; window.EPICS.forEach(e => EPICS.push(e)); }
  __root.render(<App key={++__appKey} />);
});
</script>
